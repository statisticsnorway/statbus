name: Push master -> ops/standalone/deploy/rune-no
on:
  # Allow manual deployment in github
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
      with:
        ref: 'master'
        ssh-key: ${{ secrets.SSH_KEY }}
    - name: Push for deployment
      run: |
        git push --force origin HEAD:ops/standalone/deploy/rune-no
