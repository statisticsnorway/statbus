# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "dev.statbus.org<-ops/cloud/deploy/dev"
on:
  workflow_dispatch:
  push:
    branches:
      - "ops/cloud/deploy/dev"

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for CI Images to succeed on this commit
        run: |
          SHA="${{ github.sha }}"
          TIMEOUT=900
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(gh run list --repo "${{ github.repository }}" --workflow=ci-images.yaml --commit="$SHA" --json status,conclusion --jq '.[0]')
            CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion // ""')
            if [ "$CONCLUSION" = "success" ]; then exit 0; fi
            if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "CI Images failed for $SHA — aborting deploy"
              exit 1
            fi
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done
          echo "Timed out waiting for CI Images after 15 minutes"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy via upgrade service
        # SSH to statbus_dev@niue and trigger the upgrade service through
        # `./sb upgrade apply-latest`. The server-side sshdo allowlist
        # constrains what can run over this channel; `./sb upgrade
        # apply-latest` is explicitly permitted.
        #
        # Refspec self-heal (`CleanStaleRefspecs`) is still covered by unit
        # tests in `cli/internal/upgrade/refspec_test.go`; the earlier
        # workflow-level regression test is retired because sshdo
        # (correctly) blocks the seed step's `git config --add` — the
        # safer gate is to keep the allowlist tight, not to loosen it for
        # a CI probe.
        #
        # Diagnostics kept: `set -x` echoes each local command, SSH
        # captures both stdout and stderr, and failure paths emit
        # `::error::` annotations so the root cause shows up in the
        # GitHub Actions log instead of a bare "exit 1".
        run: |
          set -x
          install -m 600 /dev/stdin /tmp/key <<< "${{ secrets.SSH_KEY }}"
          trap 'rm -f /tmp/key' EXIT

          ssh_dev() {
            ssh -i /tmp/key -o StrictHostKeyChecking=no -o BatchMode=yes \
              statbus_dev@niue.statbus.org "$@" 2>&1
          }

          echo "::group::Run apply-latest on statbus_dev"
          ssh_dev "cd ~/statbus && ./sb upgrade apply-latest" \
            || { echo "::error::apply-latest failed on remote"; exit 1; }
          echo "::endgroup::"
