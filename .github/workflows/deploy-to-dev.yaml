# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "dev.statbus.org<-devops/deploy-to-dev"
on:
  workflow_dispatch:
  push:
    branches:
      - "devops/deploy-to-dev"

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger upgrade daemon
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: niue.statbus.org
          username: statbus_dev
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 5m
          envs: VERSION
          script: |
            cd ~/statbus
            if [ -x ./sb ] && systemctl is-active --quiet statbus-upgrade@statbus_dev.service 2>/dev/null; then
              echo "Upgrade daemon is active, sending NOTIFY..."
              echo "NOTIFY upgrade_check;" | ./sb psql
              echo "Done. Daemon will discover and apply new releases."
            else
              echo "No upgrade daemon, falling back to deploy.sh..."
              ~/statbus/devops/deploy.sh
            fi
        env:
          VERSION: ${{ github.sha }}
