# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "dev.statbus.org<-ops/cloud/deploy/dev"
on:
  workflow_dispatch:
  push:
    branches:
      - "ops/cloud/deploy/dev"

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for CI Images to succeed on this commit
        run: |
          SHA="${{ github.sha }}"
          TIMEOUT=900
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(gh run list --repo "${{ github.repository }}" --workflow=ci-images.yaml --commit="$SHA" --json status,conclusion --jq '.[0]')
            CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion // ""')
            if [ "$CONCLUSION" = "success" ]; then exit 0; fi
            if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "CI Images failed for $SHA — aborting deploy"
              exit 1
            fi
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done
          echo "Timed out waiting for CI Images after 15 minutes"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy via upgrade service (with refspec self-heal regression test)
        # Inject a stale devops/* refspec BEFORE running apply-latest. If the
        # deployed binary's CleanStaleRefspecs works, apply-latest succeeds
        # and a post-run check confirms the stale refspec is gone. If the
        # cleanup regresses, apply-latest fails with "couldn't find remote
        # ref refs/heads/devops/..." and the workflow goes red — loud
        # failure, exact regression fingerprint.
        #
        # Verbosity: `set -x` echoes each local command; each `ssh_dev` call
        # is a single-line remote string (no backslash-newline folding
        # inside the double-quoted arg, which was silently short-circuiting
        # earlier runs), and every SSH invocation captures both stdout and
        # stderr so a remote failure surfaces its error text instead of a
        # bare "exit 1".
        run: |
          set -x
          install -m 600 /dev/stdin /tmp/key <<< "${{ secrets.SSH_KEY }}"
          trap 'rm -f /tmp/key' EXIT

          ssh_dev() {
            ssh -i /tmp/key -o StrictHostKeyChecking=no -o BatchMode=yes \
              statbus_dev@niue.statbus.org "$@" 2>&1
          }

          STALE='+refs/heads/devops/deploy-to-dev:refs/remotes/origin/devops/deploy-to-dev'

          echo "::group::Seed stale refspec to exercise self-heal"
          ssh_dev "cd ~/statbus && git config --add remote.origin.fetch '$STALE' && git config --get-all remote.origin.fetch" \
            || { echo "::error::Seed step failed (see output above)"; exit 1; }
          echo "::endgroup::"

          echo "::group::Run apply-latest (must self-heal the stale refspec)"
          ssh_dev "cd ~/statbus && ./sb upgrade apply-latest" \
            || { echo "::error::apply-latest failed on remote"; exit 1; }
          echo "::endgroup::"

          echo "::group::Assert stale refspec is gone"
          REMAINING=$(ssh_dev "cd ~/statbus && git config --get-all remote.origin.fetch" | grep 'devops/' || true)
          if [ -n "$REMAINING" ]; then
            echo "::error::stale devops/* refspec was not removed by apply-latest:"
            echo "$REMAINING"
            exit 1
          fi
          echo "OK: no devops/* refspecs remain"
          echo "::endgroup::"
