# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Install Test

# End-to-end test of the installation path.
# Verifies two things that are liable to break separately:
#   1. ops/setup-ubuntu-lts-24.sh Stage 7 (stage_service_account) — creates
#      the `statbus` service account with the right groups and linger state.
#   2. `./sb install` + `docker compose --profile all up` — the application
#      stack reaches a healthy state with the upgrade table present.
# Runs on push to master AND on workflow_dispatch. Also runs on schedule
# (daily) so moving-ref consumers (install-verified) stay reasonably fresh.
on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '27 5 * * *'   # 05:27 UTC daily — cheap freshness check

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  ORG: statisticsnorway

jobs:
  setup-script-stage-7:
    # Verify that setup-ubuntu-lts-24.sh Stage 7 creates the statbus service
    # account correctly when run non-interactively. We don't run stages 0-6
    # on the runner itself (they'd reconfigure SSH, apt sources, etc — noisy
    # and potentially fragile). Just Stage 7 via SKIP_STAGES.
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run setup.sh Stage 7 only (service-account creation)
        run: |
          set -euxo pipefail
          # Seed the env file so --non-interactive has what it needs.
          sudo mkdir -p /root
          sudo tee /root/.setup-ubuntu.env <<'EOF' >/dev/null
          ADMIN_EMAIL="ci@example.invalid"
          GITHUB_USERS=""
          EXTRA_LOCALES=""
          SERVICE_USER="statbus"
          EOF
          sudo chmod +x ops/setup-ubuntu-lts-24.sh
          sudo SKIP_STAGES="0 1 2 3 4 5 6" ops/setup-ubuntu-lts-24.sh --non-interactive

      - name: Verify Stage 7 outcomes
        run: |
          set -euxo pipefail
          # User exists with /home/statbus
          getent passwd statbus | grep -q ':/home/statbus:'
          # docker group present and statbus is in it
          getent group docker >/dev/null
          id -nG statbus | tr ' ' '\n' | grep -qx docker
          # .ssh dir created with correct mode
          sudo test -d /home/statbus/.ssh
          # Linger enabled
          loginctl show-user statbus -p Linger | grep -q 'Linger=yes'

  install-stack:
    # Exercise ./sb install + docker compose up in development mode. This
    # part does NOT run setup.sh (the runner is not a fresh box), but it
    # catches regressions in the stack itself (migrations, docker-compose
    # wiring, config generator).
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build sb binary
        working-directory: cli
        run: |
          CGO_ENABLED=0 go build -trimpath -o ../sb .

      - name: Run install (non-interactive)
        env:
          DEPLOYMENT_SLOT_NAME: Test
          DEPLOYMENT_SLOT_CODE: test
          DEPLOYMENT_SLOT_PORT_OFFSET: "1"
          CADDY_DEPLOYMENT_MODE: development
          SITE_DOMAIN: localhost
        run: |
          cat > .env.config <<CFG
          DEPLOYMENT_SLOT_NAME=$DEPLOYMENT_SLOT_NAME
          DEPLOYMENT_SLOT_CODE=$DEPLOYMENT_SLOT_CODE
          DEPLOYMENT_SLOT_PORT_OFFSET=$DEPLOYMENT_SLOT_PORT_OFFSET
          CADDY_DEPLOYMENT_MODE=$CADDY_DEPLOYMENT_MODE
          SITE_DOMAIN=$SITE_DOMAIN
          CFG

          ./sb config generate
          docker compose --profile all up -d --build

          for i in $(seq 1 30); do
            if docker compose exec db pg_isready -U postgres 2>/dev/null; then
              echo "DB ready after ${i}s"
              break
            fi
            sleep 1
          done

          ./sb migrate up --verbose

      - name: Verify services healthy
        run: |
          docker compose ps --format json | jq -e '.[] | select(.State != "running")' && exit 1 || true
          docker compose exec db pg_isready -U postgres
          echo "SELECT COUNT(*) FROM public.upgrade;" | ./sb psql
          # jsonb_stats is the canary for the postgres/Dockerfile pgrx copy
          # stages: if default_version isn't substituted, CREATE EXTENSION
          # would have failed earlier during migrations, and this line would
          # also fail.
          echo "SELECT extname, extversion FROM pg_extension WHERE extname = 'jsonb_stats';" | ./sb psql
          echo "All services healthy"

      - name: Cleanup
        if: always()
        run: |
          docker compose --profile all down -v || true

  bootstrap-script:
    # Exercise install.sh end-to-end against a pinned version. install.sh is
    # the public bootstrap (curl -fsSL https://statbus.org/install.sh | bash)
    # whose pre-./sb-install logic — binary download + version pinning + git
    # clone — was previously NEVER CI-tested. install-verified gates on
    # install-test, so without this job changes to install.sh could pass
    # install-verified despite breaking the bootstrap. Discovered 2026-04-22
    # during the rc.44/rc.45 cycle.
    #
    # We test the --version path (pre-./sb-install logic). The --prerelease
    # resolver path is exercised by tests/units in install.sh's caller; a
    # future iteration of this job can add a matrix dimension for
    # --prerelease + --prerelease-with-forced-fallback once stable.
    #
    # ./sb install in fresh non-interactive mode will fail (no config) and
    # that's expected — install.sh's `|| true` swallows it. We assert on
    # the artifacts install.sh OWNS (the binary, the cloned repo, the
    # checked-out tag), not on ./sb install's success.
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh end-to-end against pinned version
        env:
          # Bump as the latest published RC advances. Just needs to be a tag
          # with a published sb-linux-amd64 binary asset.
          TARGET_VERSION: v2026.04.0-rc.45
        run: |
          set -uxo pipefail
          # Use the LOCAL install.sh from this checkout (the one being tested),
          # NOT the public statbus.org/install.sh (that would test what's
          # already on master, defeating the point of pre-merge CI).
          #
          # install.sh installs into $HOME/statbus = /home/runner/statbus on
          # the runner — empty, fresh-install path. We tolerate ./sb install
          # failure (no .env.config in fresh non-interactive mode); we're
          # testing install.sh's bootstrap logic, not ./sb install itself
          # (install-stack job above covers ./sb install).
          bash install.sh --version "$TARGET_VERSION" || INSTALL_SH_RC=$?
          echo "install.sh exit code: ${INSTALL_SH_RC:-0} (non-zero is expected — ./sb install needs config)"

          # Assert install.sh's owned artifacts:
          test -x "$HOME/statbus/sb" || { echo "FAIL: $HOME/statbus/sb missing or not executable"; exit 1; }

          SB_VERSION_OUT=$("$HOME/statbus/sb" --version 2>&1 | head -1)
          echo "sb --version: $SB_VERSION_OUT"
          echo "$SB_VERSION_OUT" | grep -qF "${TARGET_VERSION#v}" \
              || { echo "FAIL: sb binary version doesn't match $TARGET_VERSION"; exit 1; }

          test -d "$HOME/statbus/.git" || { echo "FAIL: $HOME/statbus/.git missing"; exit 1; }
          HEAD_TAG=$(cd "$HOME/statbus" && git describe --tags --exact-match HEAD 2>&1)
          echo "git HEAD tag: $HEAD_TAG"
          echo "$HEAD_TAG" | grep -qF "$TARGET_VERSION" \
              || { echo "FAIL: git HEAD doesn't match $TARGET_VERSION"; exit 1; }

          echo "install.sh bootstrap path validated for $TARGET_VERSION"
