# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy via upgrade service

# Hybrid deployment: SSH to server, trigger upgrade service via NOTIFY.
# The service handles: pull images, stop services, backup, migrate, restart, health check.
# This replaces the branch-based deploy workflow for servers running the upgrade service.
#
# Usage:
#   - Manual trigger in GitHub Actions UI
#   - Select target server and version/SHA to deploy
#   - Service receives NOTIFY and executes the upgrade

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target server (user@host)'
        required: true
        type: choice
        # statbus_no@niue was removed 2026-04-21 — Norway now served from
        # rune.statbus.org (standalone). Deploys for Norway run via
        # deploy-to-rune-no.yaml, not this workflow.
        options:
          - statbus_dev@niue.statbus.org
          - statbus_demo@niue.statbus.org
          - statbus_tcc@niue.statbus.org
          - statbus_ma@niue.statbus.org
          - statbus_ug@niue.statbus.org
          - statbus_et@niue.statbus.org
          - statbus_jo@niue.statbus.org
          - statbus@rune.statbus.org
      version:
        description: 'Version tag (e.g., v2026.03.0) or commit SHA (e.g., sha-abc1234f). Leave empty to just check for new releases.'
        required: false
        type: string
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'apply'
        options:
          - apply    # Deploy specific version/SHA
          - check    # Poll GitHub for new releases

concurrency:
  group: deploy-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Validate inputs
        run: |
          ACTION="${{ github.event.inputs.action }}"
          VERSION="${{ github.event.inputs.version }}"
          if [ "$ACTION" = "apply" ] && [ -z "$VERSION" ]; then
            echo "::error::Version is required for 'apply' action"
            exit 1
          fi
          if [ -n "$VERSION" ]; then
            # Validate version format
            if ! echo "$VERSION" | grep -qE '^(v[0-9]{4}\.[0-9]{2}\.[0-9]+(-[a-zA-Z0-9.]+)?|sha-[a-f0-9]{7,40})$'; then
              echo "::error::Invalid version format: $VERSION (expected v2026.03.0 or sha-abc1234f)"
              exit 1
            fi
          fi

      - name: Parse target
        id: target
        run: |
          TARGET="${{ github.event.inputs.target }}"
          USERNAME="${TARGET%%@*}"
          HOST="${TARGET##*@}"
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"

      - name: Resolve commit SHA for the requested version
        id: sha
        if: github.event.inputs.action == 'apply'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ "$VERSION" == sha-* ]]; then
            # Edge-channel SHA; strip the prefix.
            SHA="${VERSION#sha-}"
          else
            # Tag — resolve to the commit it points to.
            SHA=$(gh api "repos/${{ github.repository }}/git/refs/tags/$VERSION" --jq '.object.sha' 2>/dev/null || true)
            if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
              echo "::warning::could not resolve $VERSION to a commit SHA — skipping ci-images gate"
              echo "sha=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Tag objects dereference one more level.
            TYPE=$(gh api "repos/${{ github.repository }}/git/refs/tags/$VERSION" --jq '.object.type' 2>/dev/null || echo "commit")
            if [ "$TYPE" = "tag" ]; then
              SHA=$(gh api "repos/${{ github.repository }}/git/tags/$SHA" --jq '.object.sha')
            fi
          fi
          echo "Resolved $VERSION -> $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for CI Images to succeed on this commit
        if: github.event.inputs.action == 'apply' && steps.sha.outputs.sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          TIMEOUT=900
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(gh run list --repo "${{ github.repository }}" --workflow=ci-images.yaml --commit="$SHA" --json status,conclusion --jq '.[0]' 2>/dev/null)
            if [ -z "$STATUS" ] || [ "$STATUS" = "null" ]; then
              echo "No ci-images run found yet for $SHA. Waiting..."
            else
              CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion // ""')
              if [ "$CONCLUSION" = "success" ]; then
                echo "ci-images green for $SHA — proceeding"
                exit 0
              fi
              if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
                echo "::error::ci-images is $CONCLUSION for $SHA. Refusing to deploy a broken build."
                echo "::error::Fix master and re-run, or bypass by deploying a commit with green ci-images."
                exit 1
              fi
              # in_progress / queued — keep waiting
            fi
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done
          echo "::error::Timed out waiting for ci-images on $SHA after 15 minutes"
          exit 1

      - name: Trigger upgrade service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.username }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/statbus
            ACTION="${{ github.event.inputs.action }}"
            VERSION="${{ github.event.inputs.version }}"

            if [ "$ACTION" = "check" ]; then
              echo "Sending NOTIFY upgrade_check..."
              echo "NOTIFY upgrade_check;" | ./sb psql
              echo "Done. Service will poll GitHub for new releases."
            elif [ "$ACTION" = "apply" ]; then
              echo "Sending NOTIFY upgrade_apply, '$VERSION'..."
              echo "NOTIFY upgrade_apply, '$VERSION';" | ./sb psql
              echo "Done. Service will execute upgrade to $VERSION shortly."
            fi

      - name: Summary
        run: |
          ACTION="${{ github.event.inputs.action }}"
          VERSION="${{ github.event.inputs.version }}"
          TARGET="${{ github.event.inputs.target }}"
          echo "## Upgrade Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: $TARGET" >> $GITHUB_STEP_SUMMARY
          echo "- **Action**: $ACTION" >> $GITHUB_STEP_SUMMARY
          if [ -n "$VERSION" ]; then
            echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The upgrade service on the target server will execute the upgrade." >> $GITHUB_STEP_SUMMARY
          echo "Monitor progress via the admin UI or systemd journal." >> $GITHUB_STEP_SUMMARY
