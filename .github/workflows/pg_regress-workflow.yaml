name: pg_regress
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI Images"]
    types: [completed]
  pull_request:
    branches-ignore:
      - 'ops/**'

jobs:
  pg_regress:
    # Skip if CI Images failed (only applies to workflow_run trigger)
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: statbus_test
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Determine ref and sha
      id: ref
      run: |
        if [ "${{ github.event_name }}" = "workflow_run" ]; then
          echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        fi
    - name: Run tests on remote server
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: niue.statbus.org
        username: statbus_test
        key: ${{ secrets.SSH_KEY }}
        command_timeout: 60m
        script: cd statbus && git fetch origin && git checkout -- . && git checkout ${{ steps.ref.outputs.sha }} && ./dev.sh continous-integration-test
