# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Install Verified

# Advances a moving git tag `install-verified` to the commit SHA on every
# master push that passes BOTH ci-images.yaml AND install-test.yaml. Consumers
# (install.sh --prerelease) can resolve via this tag to pick the latest commit
# that actually builds AND installs end-to-end, instead of blindly picking the
# newest release tag that may not have passed install-test.
#
# The moving tag approach is:
#   - Zero external infrastructure (no resolver endpoint, no JSON file).
#   - Cheap for consumers to query via `gh api /repos/.../git/refs/tags/install-verified`.
#   - Degrades gracefully — if the tag is missing or points at something
#     ancient, install.sh should fall back to the newest prerelease release.
on:
  workflow_run:
    workflows:
      - CI Images
      - Install Test
    types:
      - completed
    branches:
      - master

permissions:
  contents: write   # required to move the tag

jobs:
  advance-tag:
    # Only run when the triggering workflow succeeded on master.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Require the sibling workflow to also be green on this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          TRIGGERED_BY: ${{ github.event.workflow.name }}
        run: |
          set -euo pipefail
          # We only advance install-verified when BOTH ci-images AND
          # install-test are green for the same SHA. The trigger ran once
          # for each — we need to check the OTHER workflow here.
          case "$TRIGGERED_BY" in
            "CI Images")       PEER_WORKFLOW="install-test.yaml" ;;
            "Install Test")    PEER_WORKFLOW="ci-images.yaml"    ;;
            *)
              echo "::error::Unexpected trigger workflow: $TRIGGERED_BY"
              exit 1
              ;;
          esac

          PEER_STATUS=$(gh run list --repo "${{ github.repository }}" \
            --workflow="$PEER_WORKFLOW" --commit="$SHA" \
            --json status,conclusion --jq '.[0]')
          if [ -z "$PEER_STATUS" ] || [ "$PEER_STATUS" = "null" ]; then
            echo "Peer workflow ($PEER_WORKFLOW) has not run for $SHA yet — deferring. Install-verified will advance when the other side also lands."
            exit 0
          fi
          PEER_CONCLUSION=$(echo "$PEER_STATUS" | jq -r '.conclusion // ""')
          case "$PEER_CONCLUSION" in
            success)
              echo "Both $TRIGGERED_BY and $PEER_WORKFLOW are green for $SHA — advancing."
              ;;
            "")
              echo "Peer workflow is still running ($PEER_WORKFLOW on $SHA) — deferring."
              exit 0
              ;;
            *)
              echo "Peer workflow is $PEER_CONCLUSION ($PEER_WORKFLOW on $SHA) — NOT advancing."
              exit 0
              ;;
          esac

      - name: Move install-verified tag
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "install-verified-bot"
          git config user.email "install-verified-bot@users.noreply.github.com"
          # Force-move the tag; bare `git tag -f` + force-push works across
          # repos without needing workflow-write branch permissions.
          git tag -f install-verified "$SHA"
          git push --force origin "refs/tags/install-verified:refs/tags/install-verified"
          echo "install-verified -> $SHA"
