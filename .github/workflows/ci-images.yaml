name: CI Images

# Build and push SHA-tagged images on master merge.
# Cloud deployments pull these instead of building on each host.
#
# Multi-arch: builds natively on amd64 and arm64 runners (no QEMU
# cross-compilation — too slow and unreliable for heavy images like db).
# A final manifest job merges per-arch images into multi-arch tags.
on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: statisticsnorway

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        service:
          - {name: app, context: ./app, file: ./app/Dockerfile}
          - {name: worker, context: ./cli, file: ./cli/Dockerfile}
          - {name: db, context: ./postgres, file: ./postgres/Dockerfile}
          - {name: proxy, context: ./caddy, file: ./caddy/Dockerfile}
        platform:
          - {runner: ubuntu-24.04, arch: amd64}
          - {runner: ubuntu-24.04-arm, arch: arm64}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so `git describe --tags` finds the nearest tag.
          # Default shallow checkout has no tag refs and would return only
          # the bare SHA, defeating the point of the describe-based tag.
          fetch-depth: 0

      - name: Compute describe tag
        id: describe
        # Must match exactly what `./sb config generate` writes into .env as
        # VERSION — that's the string docker compose resolves in
        # `image: .../statbus-${service}:${VERSION}` at upgrade time. Keeping
        # these in sync lets commit-based upgrades pull CI-built images
        # instead of falling through to a local source build.
        # See cli/internal/config/config.go (computeDerived: Version).
        run: echo "tag=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.file }}
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:sha-${{ github.sha }}-${{ matrix.platform.arch }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:${{ steps.describe.outputs.tag }}-${{ matrix.platform.arch }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:buildcache-${{ matrix.platform.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:buildcache-${{ matrix.platform.arch }},mode=max

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        service: [app, worker, db, proxy]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute describe tag
        id: describe
        run: echo "tag=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          for TAG in "sha-${{ github.sha }}" "${{ steps.describe.outputs.tag }}"; do
            docker buildx imagetools create \
              --tag ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG} \
              ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG}-amd64 \
              ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG}-arm64
          done
