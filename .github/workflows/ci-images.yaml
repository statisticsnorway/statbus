name: CI Images

# Build and push SHA-tagged images on master merge.
# Cloud deployments pull these instead of building on each host.
on:
  push:
    branches: [master]

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: statisticsnorway

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - service: app
            context: ./app
            file: ./app/Dockerfile
          - service: worker
            context: ./cli
            file: ./cli/Dockerfile
          - service: db
            context: ./postgres
            file: ./postgres/Dockerfile
          - service: proxy
            context: ./caddy
            file: ./caddy/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with SHA tag
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
