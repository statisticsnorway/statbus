name: CI Images

# Build and push SHA-tagged images on master merge.
# Cloud deployments pull these instead of building on each host.
on:
  push:
    branches: [master]

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: statisticsnorway

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - service: app
            context: ./app
            file: ./app/Dockerfile
          - service: worker
            context: ./cli
            file: ./cli/Dockerfile
          - service: db
            context: ./postgres
            file: ./postgres/Dockerfile
          - service: proxy
            context: ./caddy
            file: ./caddy/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so `git describe --tags` finds the nearest tag.
          # Default shallow checkout has no tag refs and would return only
          # the bare SHA, defeating the point of the describe-based tag.
          fetch-depth: 0

      - name: Compute describe tag
        id: describe
        # Must match exactly what `./sb config generate` writes into .env as
        # VERSION — that's the string docker compose resolves in
        # `image: .../statbus-${service}:${VERSION}` at upgrade time. Keeping
        # these in sync lets commit-based upgrades pull CI-built images
        # instead of falling through to a local source build.
        # See cli/internal/config/config.go (computeDerived: Version).
        run: echo "tag=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with SHA + describe tags
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          # Two tags — both point at the same image manifest:
          #   sha-<full40>   — immutable, used by manifest-inspect
          #                    verification and by any code that wants to
          #                    pin to an exact commit.
          #   <git describe> — matches VERSION in .env at runtime
          #                    (e.g. "v2026.03.1-9-gc817e84c"). This is what
          #                    docker compose substitutes into the image ref
          #                    when upgrading; without it, commit-based
          #                    upgrades fall back to building from source.
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${{ steps.describe.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:buildcache,mode=max
