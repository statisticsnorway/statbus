# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Install Recovery Harness

# Install Recovery Harness — RC-time end-to-end RECOVERY gate via Hetzner
# Cloud VMs. Sister to test-install.yaml (which runs only scenario 0-happy-install / the
# happy-install baseline). Where test-install validates "fresh install works",
# THIS workflow validates "install converges to a coherent terminal state
# from every named failure-injection class."
#
# Triggers on prerelease tag push (`v*-rc.*`) and manual dispatch. The full
# scenario catalogue lives in `test/install-recovery/scenarios/` — see
# `test/install-recovery/README.md` for the per-class breakdown and the
# pairing with `cli/internal/inject/` injection sites.
#
# Why a real VM per scenario and not parallel GHA runners: every scenario
# either restarts systemd-user units, uses Docker named volumes, or
# orchestrates failure-injection that requires a long-lived /etc + ~/statbus
# state. A throwaway VM per scenario is the only shape that matches the
# install ladder's assumptions about its host. Cost: cx23 in fsn1/hel1 is
# €0.0072/hr, billed at the 1-hour Hetzner minimum, so each scenario is
# ~€0.0072 regardless of wall-clock. ~28 scenarios × €0.0072 ≈ €0.20/run.
#
# ARCHITECTURE — matrix, one VM per scenario, parallel (STATBUS-025):
# The suite USED to run every scenario serially in ONE job. At ~28 scenarios ×
# ~13-20 min that exceeds GitHub's hard 360-min job ceiling → the job is
# CANCELLED, and `cancelled` is never `success`, so the stable gate
# (release.CheckWorkflowAtCommit) could NEVER go green even on an all-pass
# suite. Now restructured into three job stages:
#   1. discover — enumerate scenarios → JSON matrix + build the `sb` binary
#      ONCE and upload it as an artifact (preserves the one-build-for-all
#      property; every scenario pins to the exact tag-commit binary).
#   2. run-scenario — a matrix job per scenario: download the binary, provision
#      its OWN Hetzner VM, run the ONE scenario, upload its log. max-parallel
#      bounds concurrency to the Hetzner quota; per-job timeout ~45 min.
#   3. cleanup — a FINAL global statbus-recovery-* sweep (needs all matrix
#      jobs, if: always()).
# Wall-clock ≈ ceil(28 / max-parallel) × ~15-20 min ≈ ~60-80 min, comfortably
# under the 6h ceiling, so the workflow can report a real success conclusion.
#
# Relationship to other CI workflows:
#   - `images.yaml` — builds Docker images and the `sb` binary
#     artifacts on master push.
#   - `test-hardening.yaml` — cheap in-runner subset (setup.sh Stage 7,
#     `./sb install` against the runner's docker, install.sh bootstrap).
#   - `test-install.yaml` — single-scenario happy-install Hetzner gate.
#   - `install-recovery-harness.yaml` — THIS workflow, full scenario
#     catalogue: every C-class with a paired scenario gets exercised on
#     its own VM. Fired by `./sb release stable` pre-flight via
#     `release.CheckWorkflowAtCommit(WorkflowInstallRecoveryHarness, sha)`.
#
# See doc/release-workflow-gates.md for the full gate-pattern reference,
# the any-green semantics, and the `SKIP_INSTALL_RECOVERY=1` operator
# bypass.

on:
  push:
    tags:
      - 'v*-rc.*'
  workflow_dispatch:
    inputs:
      scenarios:
        description: 'Space-separated scenario selectors (e.g. "0-happy-upgrade 3-postswap-migrate-killed-after-commit") — leave blank to run all'
        required: false
        default: ''

# Don't cancel a run that's already provisioned VMs — cancellation would
# skip every scenario's cleanup trap and orphan ~17 Hetzner instances at
# once (billing the next hour for each). Queue subsequent triggers behind
# the live one. Scenario-level `bootstrap_install_test_vm` refuse-on-
# existing check in vm-bootstrap.sh is the second line of defence against
# name collisions.
concurrency:
  group: install-recovery-harness
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  discover:
    name: Discover scenarios + build sb binary
    runs-on: ubuntu-24.04
    # Generous: covers checkout + build-sb + enumerate (~few min) PLUS the
    # wait-for-per-commit-images preflight (bounded at IMAGES_WAIT_BUDGET_S = 40m).
    timeout-minutes: 50
    outputs:
      # JSON array of scenario base names (the matrix domain) and its length.
      matrix: ${{ steps.scenarios.outputs.matrix }}
      count: ${{ steps.scenarios.outputs.count }}
    steps:
      - name: Checkout
        # fetch-depth: 0 — build-sb stamps the LDFLAGS version from
        # `git describe --tags` + the 40-char HEAD commit, so it needs tags
        # and history. Cheap on the GHA runner.
        #
        # ref: github.sha PINS this checkout to the run's triggering commit.
        # CRITICAL: the binary built here stamps cmd.commit=<this HEAD>, and the
        # run-scenario job (separate checkout) stages it then `git checkout`s its
        # OWN HEAD as the upgrade target. If the two checkouts resolved to
        # different commits (workflow_dispatch defaults to the branch TIP at
        # checkout time, which drifts when a backlog auto-commit lands on master
        # between the two jobs), the staged binary's commit ≠ the VM's git HEAD →
        # the staleness guard on `./sb upgrade service` (selfheal=true) fires →
        # RebuildAndReexec runs `make -C cli build` → fails on the toolchain-less
        # VM → exit 2 → the unit dies ~3s after restart. github.sha is constant
        # across all jobs in a run, so pinning both checkouts to it makes the
        # binary and the scenario-under-test the SAME commit by construction
        # (restores the single-checkout invariant the old serial job had).
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Go
        # go-version-file pins to cli/go.mod's `go` directive — single
        # source of truth, mirrors test-install.yaml + test-hardening.yaml.
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build sb binary (linux/amd64) — ONCE for every scenario
        # `./dev.sh build-sb linux/amd64` writes `sb-linux-amd64` to the repo
        # root and stamps LDFLAGS version + 40-char commit so the binary's
        # --version matches the tag. Built once here and shared with every
        # matrix job via the artifact below — preserves the one-build-for-all
        # property the serial job had, and pins all scenarios to this exact
        # tag-commit binary.
        run: ./dev.sh build-sb linux/amd64

      - name: Upload sb binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sb-linux-amd64
          path: sb-linux-amd64
          retention-days: 14
          if-no-files-found: error

      - name: Enumerate scenarios into the matrix
        id: scenarios
        # run.sh --print-selected is the SINGLE source of truth for scenario
        # selection: it applies the same known-RED (HARNESS_SKIP_DEFAULT)
        # exclusion and the same selector matching a local run uses, then
        # prints the chosen base names without provisioning anything. We just
        # JSON-encode that list. The `scenarios` dispatch input narrows the set
        # (single-scenario re-runs); empty input (the tag-push gate) ⇒ the full
        # default suite. A bad selector makes run.sh exit non-zero ⇒ this step
        # fails loudly rather than silently producing an empty matrix.
        env:
          SCENARIOS_INPUT: ${{ github.event.inputs.scenarios }}
        run: |
          set -euo pipefail
          # SCENARIOS_INPUT is deliberately UNQUOTED: a space-separated selector
          # string (e.g. "0-happy-upgrade 5-install-seed-on-populated") must word-split
          # into separate positional args to run.sh. Empty input → no args → full
          # suite. shellcheck can't see this is intentional, so silence SC2086.
          # shellcheck disable=SC2086
          selected="$(./dev.sh test-install-recovery --print-selected ${SCENARIOS_INPUT})"
          matrix="$(printf '%s\n' "$selected" | jq -R . | jq -s -c 'map(select(length > 0))')"
          count="$(printf '%s\n' "$selected" | grep -c . || true)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count scenario(s) for the matrix:"
          printf '%s\n' "$selected"

      - name: Wait for the per-commit service images (Images workflow)
        # Each scenario upgrades to the commit-under-test, whose applyPostSwap runs
        # `docker compose pull --profile all` — that needs the per-commit SERVICE
        # images statbus-{app,worker,db,proxy}:<commit_short> (docker-compose.{app,
        # worker}.yml + postgres/ + caddy/ all interpolate ${COMMIT_SHORT}). Those
        # are built ONLY by the master-push Images workflow (images.yaml triggers on
        # push:[master] + workflow_dispatch — no tags, no feature branches), and the
        # seed/manifest jobs land late in that run. So a harness run dispatched right
        # after a push RACES the build, and a non-master ref never triggers it at all.
        #
        # Gate the matrix here: poll ghcr until all four exist (bounded). Present →
        # fan out. Absent past the budget → fail discover LOUDLY with an actionable
        # message, so the operator gets ONE clear "images not ready" here instead of
        # a cryptic per-scenario "manifest unknown" mid-upgrade across the matrix.
        #
        # Note: we deliberately do NOT gate on statbus-seed — the seed is an
        # optional speed shortcut (install.go runSeedRestore degrades to a full
        # migration replay), and dev.sh's preamble seed pull is made non-fatal.
        env:
          REGISTRY: ghcr.io
          ORG: statisticsnorway
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          DOCKER_CLI_EXPERIMENTAL: enabled
          # Budget ~40 min: a cold Images run takes ~20-30 min; the headroom
          # absorbs a slow build without stranding the harness indefinitely.
          IMAGES_WAIT_BUDGET_S: "2400"
          IMAGES_WAIT_INTERVAL_S: "30"
        run: |
          set -euo pipefail
          commit_short="$(git rev-parse --short=8 HEAD)"
          echo "Commit-under-test (short): $commit_short"
          echo "${GH_TOKEN}" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin

          services="app worker db proxy"
          start=$SECONDS
          while :; do
            missing=""
            for svc in $services; do
              ref="${REGISTRY}/${ORG}/statbus-${svc}:${commit_short}"
              if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
                missing="${missing} statbus-${svc}:${commit_short}"
              fi
            done
            if [ -z "$missing" ]; then
              echo "All per-commit service images present for ${commit_short} (app, worker, db, proxy)."
              break
            fi
            elapsed=$(( SECONDS - start ))
            if [ "$elapsed" -ge "$IMAGES_WAIT_BUDGET_S" ]; then
              echo "::error title=Per-commit images not published::statbus images for ${commit_short} missing after $((IMAGES_WAIT_BUDGET_S/60))m:${missing}"
              {
                echo "The install-recovery harness upgrades every scenario to this commit, which needs"
                echo "the per-commit service images statbus-{app,worker,db,proxy}:${commit_short}."
                echo "These are built only by the Images workflow (images.yaml — master-push + workflow_dispatch)."
                echo "Fix:"
                echo "  - master commit: wait for the Images run at this SHA to finish, then re-run this harness."
                echo "  - non-master ref (e.g. a RED branch): build its images first, then re-run the harness —"
                echo "      gh workflow run images.yaml --ref <your-branch-or-sha>"
              } >&2
              exit 1
            fi
            echo "Waiting for:${missing} (elapsed ${elapsed}s / ${IMAGES_WAIT_BUDGET_S}s) — re-checking in ${IMAGES_WAIT_INTERVAL_S}s..."
            sleep "$IMAGES_WAIT_INTERVAL_S"
          done

      - name: Verify baseline release images are published
        # Most scenarios install an OLDER release (INSTALL_VERSION, e.g. v2026.05.2 /
        # v2026.05.4) as the pre-upgrade baseline before upgrading to HEAD. That
        # install pulls the baseline's per-commit images statbus-{app,worker,db,proxy}
        # :<commit_short>. Unlike the HEAD images (Images is still building them → we
        # WAIT above), these are OLD releases whose Images run finished long ago — if
        # an image is absent now it has been GC'd by image-cleanup.yaml, and waiting
        # won't bring it back. So CHECK ONCE and FAIL LOUD with a republish hint,
        # instead of letting ~22 scenarios each silently fall back to a ~35-min LOCAL
        # image build that blows the per-scenario budget.
        #
        # Tags are ANNOTATED: deref with ^{} to get the COMMIT the image is tagged by
        # (`git rev-parse v2026.05.2` returns the tag object, NOT the commit).
        env:
          REGISTRY: ghcr.io
          ORG: statisticsnorway
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail
          echo "${GH_TOKEN}" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin

          # Distinct baseline versions the scenarios pin (INSTALL_VERSION default).
          versions="$(grep -rhoE 'INSTALL_VERSION:-v[0-9][0-9a-z.-]*' test/install-recovery/scenarios/*.sh \
                        | sed 's/.*INSTALL_VERSION:-//' | sort -u)"
          if [ -z "$versions" ]; then
            echo "No pinned baseline versions found in scenarios — nothing to verify."
            exit 0
          fi

          services="app worker db proxy"
          missing=""
          for ver in $versions; do
            short="$(git rev-parse --short=8 "${ver}^{}" 2>/dev/null || true)"   # ^{} : annotated-tag → commit
            if [ -z "$short" ]; then
              echo "::warning::baseline tag ${ver} not resolvable locally (tags fetched?) — skipping its image check"
              continue
            fi
            echo "Baseline ${ver} → commit ${short}:"
            for svc in $services; do
              if docker manifest inspect "${REGISTRY}/${ORG}/statbus-${svc}:${short}" >/dev/null 2>&1; then
                echo "  ok       statbus-${svc}:${short}"
              else
                echo "  MISSING  statbus-${svc}:${short}"
                missing="${missing} ${ver}(statbus-${svc}:${short})"
              fi
            done
          done

          if [ -n "$missing" ]; then
            echo "::error title=Baseline release images missing::${missing}"
            {
              echo "One or more scenarios install a baseline release whose per-commit images are no"
              echo "longer in ghcr (GC'd by image-cleanup.yaml). The install would otherwise fall"
              echo "back to a ~35-min LOCAL image build per scenario — failing loud here instead."
              echo "Fix: republish the baseline image(s), then re-run this harness —"
              for ver in $versions; do echo "      gh workflow run images.yaml --ref ${ver}"; done
              echo "Durable fix: stop image-cleanup.yaml from GC'ing release-baseline images (STATBUS image-retention)."
            } >&2
            exit 1
          fi
          echo "All baseline release images present — scenarios will pull (not build)."

  run-scenario:
    name: ${{ matrix.scenario }}
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-24.04
    # Per-scenario ceiling. Most scenarios finish in 12-20 min; the
    # populated-DB / worker-contention / systemd-supervised ones can stretch
    # toward 30 min on slow hardware. Raised 45→120 (STATBUS-025 follow-on):
    # when a per-commit image isn't published (e.g. statbus-proxy missing for
    # the install version), `./sb install` / the HEAD upgrade fall back to a
    # LOCAL image build (~35 min each for the Next.js/caddy proxy), which blew
    # the old 45-min budget before the scenario even reached its assertion.
    # 120 absorbs an install-side build + the scenario + a possible HEAD-side
    # build. The durable fix (pull, never build → STATBUS-056 + proxy publish)
    # brings this back down; until then the headroom prevents false timeouts.
    timeout-minutes: 120
    strategy:
      # fail-fast: false is LOAD-BEARING — a sibling scenario failing must NOT
      # cancel the others. Cancellation would (a) lose the other scenarios'
      # verdicts and (b) skip their cleanup traps, orphaning live VMs.
      fail-fast: false
      # max-parallel bounds concurrent VMs to the Hetzner project quota.
      # CORRECTION (2026-06-15, run 27583439253): the prior "no hard per-project
      # server limit" claim (STATBUS-025 AC#3) was FALSE. 8 concurrent cx23 + the
      # niue prod host hit BOTH "server limit reached" AND "Primary IP limit
      # exceeded" (resource_limit_exceeded) — all 28 scenarios failed at VM
      # creation (vm-bootstrap.sh:402), not in the test. Each VM consumes a server
      # slot + a primary IPv4/IPv6. Lowered to 3 as a stopgap; the REAL fix is
      # raising the Hetzner project's server + primary-IP quota (account action),
      # then this can go back up. STATBUS-025 AC#3 reopened.
      max-parallel: 3
      matrix:
        scenario: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        # fetch-depth: 0 — the scenario's host-side commit computations
        # (HARNESS_ROOT rev-parse, pending-migration counts) need full history.
        # ref: github.sha — MUST match the discover job's checkout so the staged
        # sb binary's stamped commit == this checkout's HEAD (the scenario's
        # upgrade target). See the discover job's checkout for the full rationale
        # (staleness-guard self-heal on a commit mismatch kills the unit).
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download sb binary artifact
        # The single binary built by `discover`. No Go toolchain here:
        # vm-bootstrap.sh only rebuilds when STATBUS_SB_BINARY is unset/missing,
        # so a present artifact means zero host-side `go` in matrix jobs.
        uses: actions/download-artifact@v4
        with:
          name: sb-linux-amd64
          path: .

      - name: Restore execute bit on sb binary
        # actions/upload-artifact does not preserve the POSIX execute bit.
        run: chmod +x sb-linux-amd64

      - name: Install hcloud CLI
        # Pinned binary from GitHub releases. Hetzner does NOT operate a signed
        # apt repo for the hcloud CLI itself (verified 2026-05-20), so the
        # canonical install on Linux is the GitHub release tarball. Pin the
        # version so a runner upgrade doesn't change observed behaviour.
        env:
          HCLOUD_CLI_VERSION: "1.64.1"
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/hetznercloud/cli/releases/download/v${HCLOUD_CLI_VERSION}/hcloud-linux-amd64.tar.gz" \
            -o /tmp/hcloud.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/hcloud.tar.gz hcloud
          rm /tmp/hcloud.tar.gz
          hcloud version

      - name: Install CI SSH private key
        # The matching public key is registered in the Hetzner project as SSH
        # key "statbus-ci" — vm-bootstrap.sh references it by name via the
        # HCLOUD_SSH_KEY env (set in the run step). The private key here is what
        # the runner uses to SSH into the provisioned VM after Hetzner injects
        # the public key at boot.
        env:
          STATBUS_CI_SSH_PRIVATE_KEY: ${{ secrets.STATBUS_CI_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STATBUS_CI_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -lf ~/.ssh/id_ed25519 \
            | awk '{ print "SSH key fingerprint:", $2 }'

      - name: Run scenario on its own Hetzner VM
        # Runs exactly ONE scenario by its base-name selector. run.sh provisions
        # a fresh cx23 named statbus-recovery-<scenario>, runs it, and writes
        # tmp/install-recovery-<scenario>.log. STATBUS_SB_BINARY pins the VM to
        # the artifact binary (no in-VM rebuild). HCLOUD_SSH_KEY=statbus-ci
        # pairs with the private key written above.
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_SSH_KEY: statbus-ci
          STATBUS_SB_BINARY: ${{ github.workspace }}/sb-linux-amd64
          # Passed via env (not interpolated into the shell) — the
          # GitHub-recommended pattern; SCENARIO is a controlled in-repo
          # filename, but this keeps the run block injection-free by construction.
          SCENARIO: ${{ matrix.scenario }}
        run: |
          set -euo pipefail
          echo "Running scenario: $SCENARIO"
          ./dev.sh test-install-recovery "$SCENARIO"

      - name: Upload scenario log
        # Per-job artifact (unique name — upload-artifact@v4 forbids duplicate
        # names across concurrent jobs). Globs both the scenario log and its
        # vm-bootstrap log for this scenario.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-recovery-log-${{ matrix.scenario }}
          path: tmp/install-recovery-${{ matrix.scenario }}*.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Reap THIS scenario's VM (defense in depth)
        # THE STATBUS-025 TRAP: the per-job reap must delete ONLY this job's own
        # VM. A global `statbus-recovery-*` sweep here would murder sibling
        # matrix jobs' LIVE VMs mid-run. The scenario's own `trap cleanup_vm`
        # already deletes on normal exit; this is the net for when the trap
        # can't fire (GHA cancellation, runner SIGKILL, early script bug). The
        # cross-job global sweep lives only in the final `cleanup` job.
        # Best-effort: never fails the job (pass/fail was decided by the run).
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SCENARIO: ${{ matrix.scenario }}
        run: |
          vm="statbus-recovery-${SCENARIO}"
          if ! command -v hcloud >/dev/null 2>&1; then
            echo "hcloud CLI not installed — skipping reap of $vm"
            exit 0
          fi
          if hcloud server describe "$vm" >/dev/null 2>&1; then
            echo "Reaping own VM: $vm"
            hcloud server delete "$vm" || true
          else
            echo "Own VM $vm already gone (scenario trap cleaned up) — nothing to reap."
          fi
          exit 0

  cleanup:
    name: Reap orphan VMs (final global sweep)
    needs: [discover, run-scenario]
    # Runs after every matrix job regardless of their outcome (or if the matrix
    # was skipped). This is the ONLY place the cross-job global
    # statbus-recovery-* sweep is safe — no sibling VM is live once all matrix
    # jobs have finished. Catches orphans from any job that died before its
    # own per-job reap.
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Install hcloud + reap any leftover statbus-recovery-* VMs
        # ONE fully best-effort step that ALWAYS exits 0 — this housekeeping job
        # must never fail the workflow conclusion (the gate reads that
        # conclusion; a flaky hcloud download here must not red an all-green
        # scenario matrix). It also can't MASK a real failure: a failed scenario
        # reds its OWN run-scenario job, which the workflow conclusion ANDs in.
        #
        # Scope: only servers whose names start with the harness prefix
        # `statbus-recovery-`. Other VMs in the same Hetzner project (production
        # hosts, niue, etc.) are NOT prefixed that way, so this filter is safe
        # by construction.
        env:
          HCLOUD_CLI_VERSION: "1.64.1"
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set +e
          curl -fsSL \
            "https://github.com/hetznercloud/cli/releases/download/v${HCLOUD_CLI_VERSION}/hcloud-linux-amd64.tar.gz" \
            -o /tmp/hcloud.tar.gz \
            && sudo tar -C /usr/local/bin -xzf /tmp/hcloud.tar.gz hcloud
          if ! command -v hcloud >/dev/null 2>&1; then
            echo "hcloud CLI unavailable — skipping global reap (best-effort)."
            exit 0
          fi
          orphans=$(hcloud server list --output noheader --output columns=name 2>/dev/null \
            | grep '^statbus-recovery-' || true)
          if [ -z "$orphans" ]; then
            echo "No orphan VMs to reap."
            exit 0
          fi
          echo "Orphan VMs found — reaping:"
          echo "$orphans"
          echo "$orphans" | xargs -r -n1 hcloud server delete
          exit 0
