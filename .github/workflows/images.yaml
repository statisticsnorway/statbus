name: Images

# Build and push SHA-tagged images on master merge.
# Cloud deployments pull these instead of building on each host.
#
# Multi-arch: builds natively on amd64 and arm64 runners (no QEMU
# cross-compilation — too slow and unreliable for heavy images like db).
# A final manifest job merges per-arch images into multi-arch tags.
#
# Tag-parity contract: a single `describe` job computes
# `git describe --tags --always` once and feeds it to all per-arch
# build jobs AND the manifest job. This guarantees that amd64 and
# arm64 builds carry identical tags so the manifest merge step finds
# both architectures under the same reference.
on:
  push:
    branches: [master]
  # Intentionally NO `tags: ['v*']` trigger here: every release tag points
  # at a commit that's already been built by the master-push run above,
  # so a tag-push trigger would be duplicate work AND would stall
  # release verify-images on a fresh tag-push run after the master-push run
  # already proved the artifact built. workflow_dispatch remains as a
  # manual safety valve for commits not reached via master push.
  workflow_dispatch:

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: statisticsnorway

jobs:
  describe:
    runs-on: ubuntu-24.04
    outputs:
      commit_short: ${{ steps.compute.outputs.commit_short }}
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so `git rev-parse --short=8 HEAD` works even
          # on shallow clones (rare here, defensive).
          fetch-depth: 0
      - id: compute
        # Rc.63: images tagged by commit_short only. The describe job
        # computes once and propagates via needs.describe.outputs for
        # per-arch parity.
        run: |
          COMMIT_SHORT=$(git rev-parse --short=8 HEAD)
          echo "Computed commit_short: $COMMIT_SHORT"
          echo "commit_short=$COMMIT_SHORT" >> "$GITHUB_OUTPUT"

  build:
    needs: describe
    strategy:
      fail-fast: false
      matrix:
        service:
          - {name: app, context: ./app, file: ./app/Dockerfile}
          - {name: worker, context: ./cli, file: ./cli/Dockerfile}
          - {name: db, context: ./postgres, file: ./postgres/Dockerfile}
          - {name: proxy, context: ./caddy, file: ./caddy/Dockerfile}
          # statbus-sb: minimal distroless image carrying only the sb binary.
          # Makes sb commit-addressable alongside the service images so that
          # "a commit is installable iff its images built" includes sb.
          # Build context is ./cli — sb needs only cli/ source + go.mod (both under cli/).
          - {name: sb, context: ./cli, file: ./cli/Dockerfile.sb}
        platform:
          - {runner: ubuntu-24.04, arch: amd64}
          - {runner: ubuntu-24.04-arm, arch: arm64}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          # We don't `git describe` here anymore (parity is guaranteed by
          # the describe job above), but checkout is still needed for the
          # build context.
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v3
        with:
          # Route Docker Hub pulls through Google's public mirror to absorb
          # transient "registry-1.docker.io: context deadline exceeded" errors.
          # BuildKit tries the mirror first; if it fails or is absent it falls
          # back to Docker Hub automatically — no change to what is built.
          config-inline: |
            [registry."docker.io"]
              mirrors = ["https://mirror.gcr.io"]

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.file }}
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:${{ needs.describe.outputs.commit_short }}-${{ matrix.platform.arch }}
          # Pass VERSION + COMMIT build-args for services that use them
          # (currently sb only; the four service images don't use ARGs).
          build-args: |
            VERSION=${{ needs.describe.outputs.commit_short }}
            COMMIT=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:buildcache-${{ matrix.platform.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:buildcache-${{ matrix.platform.arch }},mode=max

  manifest:
    needs: [describe, build]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        service: [app, worker, db, proxy, sb]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (commit_short)
        # Rc.63: images tagged by commit_short only. One multi-arch
        # manifest per image combines the per-arch builds pushed by the
        # build job.
        run: |
          TAG="${{ needs.describe.outputs.commit_short }}"
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG} \
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG}-amd64 \
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG}-arm64

  seed:
    # statbus-seed: the pre-upgrade seed dump, shipped as a commit-tagged image
    # (replaces the db-seed git branch transport). SEPARATE job, not a `build`
    # matrix row, because it is:
    #   - amd64-only — the `-Fc` logical dump is architecture-portable (restores
    #     onto an either-arch runtime), so an emulated-arm64 migrate is pure waste;
    #   - `--target seed` from postgres/Dockerfile (the seed-builder stage runs
    #     the real sb seed code in-build);
    #   - multi-context — needs the migrations dir + the statbus-sb image;
    #   - ordered AFTER the sb image manifest exists (statbus-sb:<sha> is pulled
    #     as a build-context).
    needs: [describe, manifest]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["https://mirror.gcr.io"]
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # STATBUS-116 AC#1 — resolve the incremental base (Fork-A ancestor-walk),
      # GATED on the repo/workflow variable SEED_INCREMENTAL_ENABLED (default
      # false/unset). DEFAULT → an EMPTY prior context + SEED_INCREMENTAL=0 → the
      # seed build does a full from-empty rebuild, byte-identical to pre-AC#1.
      # THE FLIP = setting the repo variable SEED_INCREMENTAL_ENABLED=true (an
      # instant, revertible on/off — no commit needed to disable). The enabled
      # path's machinery is committed + GATED here (STATBUS-116 D4): the `prior`
      # step deepens history on-demand (`git fetch --unshallow`) and extracts the
      # `sb` binary from the statbus-sb image, both INSIDE the enabled branch so
      # the disabled default is byte-identical to before (the checkout stays
      # fetch-depth:1). AC#3 drift bound = the depth cap (MaxIncrementalDepth=5);
      # AC#6 Part 2 (post-fix real-seed multi-delta green) is the deferred
      # confirming run — the King ruled flip-early to exercise the code.
      - name: Resolve incremental prior seed (gated; empty by default)
        id: prior
        run: |
          set -euo pipefail
          dir="$RUNNER_TEMP/prior-seed"
          mkdir -p "$dir"
          if [ "${{ vars.SEED_INCREMENTAL_ENABLED }}" != "true" ]; then
            echo "seed incremental DISABLED (SEED_INCREMENTAL_ENABLED != true) — full rebuild, empty prior context"
            echo "dir=$dir" >> "$GITHUB_OUTPUT"
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # --- Enabled path (reached ONLY when SEED_INCREMENTAL_ENABLED=true; the
          #     gate above `exit 0`s the disabled default before any of this). ---
          # The Fork-A ancestor-walk needs full first-parent history, but the
          # checkout above is deliberately left at fetch-depth:1 so the DISABLED
          # path is byte-identical to before — deepen on-demand here instead.
          git fetch --prune --unshallow || git fetch --prune --depth=100
          # Put the sb binary on the runner. It lives at /sb in the distroless
          # statbus-sb:<commit_short> image (postgres/Dockerfile:470-471), which
          # this seed job already depends on (build-context, below). docker create
          # + cp — no run (STATBUS-116 AC#1 select-prior host machinery).
          cid="$(docker create "${{ env.REGISTRY }}/${{ env.ORG }}/statbus-sb:${{ needs.describe.outputs.commit_short }}")"
          docker cp "$cid:/sb" ./sb
          docker rm "$cid"
          chmod +x ./sb
          # Walk ancestry for the closest published seed and docker-cp it into the
          # prior context. Falls back to full (empty dir) when no ancestor seed exists.
          tag="$(./sb db seed select-prior || true)"
          if [ -z "$tag" ]; then
            echo "no published ancestor seed found — full rebuild"
            echo "dir=$dir" >> "$GITHUB_OUTPUT"
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "incremental base: $tag"
          cid="$(docker create "$tag")"
          docker cp "$cid:/seed.pg_dump" "$dir/seed.pg_dump"
          docker cp "$cid:/seed.json"    "$dir/seed.json"
          docker rm "$cid"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          echo "enabled=1" >> "$GITHUB_OUTPUT"
      - name: Build and push statbus-seed (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./postgres
          file: ./postgres/Dockerfile
          target: seed
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-seed:${{ needs.describe.outputs.commit_short }}
          # migrations as a named context (off the main context); sb pulled from
          # its just-published image. Same flags as the local `./sb build seed`.
          build-contexts: |
            migrations=./migrations
            dbseed=./dbseed
            statbus-sb=docker-image://${{ env.REGISTRY }}/${{ env.ORG }}/statbus-sb:${{ needs.describe.outputs.commit_short }}
            prior-seed=${{ steps.prior.outputs.dir }}
          # Full 40-char SHA: feeds seed.json's CommitSHA (the seed-builder has
          # no .git) and matches the statbus-sb image's own ldflag identity.
          # SEED_INCREMENTAL is 0 unless the gated `prior` step enabled it.
          build-args: |
            COMMIT=${{ github.sha }}
            SEED_INCREMENTAL=${{ steps.prior.outputs.enabled }}
          # Reuse the db image's pg-runtime-base layers (same Dockerfile/context)
          # so the seed build SKIPS the ~20-min extension compile.
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-db:buildcache-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-seed:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-seed:buildcache-amd64,mode=max
