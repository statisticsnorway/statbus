# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Docker Periodic Maintenance
on:
  # Allow manual deployment in github
  workflow_dispatch:
  schedule:
    # Weekly night to Sunday
    - cron: '17 3 * * 0'

concurrency: docker

jobs:
  docker:
    name: Remove obsolete docker artifacts
    # STATBUS-069/191 phase 3: runs on the niue self-hosted runner — the SSH now
    # originates on the box (host-gateway to niue's own sshd), not Azure. No PR
    # trigger carries these labels (fork-PR safety): this workflow is
    # workflow_dispatch + schedule only.
    runs-on: [self-hosted, niue]
    permissions:
      contents: read
    steps:
    - name: Docker maintenance
      # Raw ssh, not appleboy/ssh-action: the runner has no docker socket
      # (doc-026 §2) so a Docker CONTAINER action cannot execute on it. devops is a
      # free admin shell (bare authorized_keys, not n-gated) — the login shell
      # starts at $HOME, so ./bin/... resolves under /home/devops exactly as the
      # appleboy `script:` did.
      run: |
        install -m 600 /dev/stdin /tmp/key <<< "${{ secrets.SSH_KEY }}"
        known="$HOME/_work/.known_hosts"   # pinned in the runner-work volume (doc-026 delta 8)
        ssh -i /tmp/key \
          -o StrictHostKeyChecking=accept-new \
          -o "UserKnownHostsFile=$known" \
          devops@niue.statbus.org \
          "./bin/github-run.sh docker-maintenance"
        rm -f /tmp/key
