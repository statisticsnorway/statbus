name: Push master -> devops/deploy-to-dev
on:
  # Manual only — dev is the RC testing ground.
  # Auto-deploy from master is disabled to allow controlled RC testing.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
      with:
        ref: 'master'
        ssh-key: ${{ secrets.SSH_KEY }}
    - name: Push for deployment
      run: |
        git push --force origin HEAD:devops/deploy-to-dev
