name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: statisticsnorway

jobs:
  metadata:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          # Rc.63: canonical commit identity is TWO names that each track
          # one git command:
          #   commit_sha   = `git rev-parse HEAD`           → 40-char equality form,
          #                                                   fed to cmd.commit ldflag
          #                                                   for equality against
          #                                                   public.upgrade.commit_sha.
          #   commit_short = `git rev-parse --short=8 HEAD` → 8-char display form,
          #                                                   and the canonical Docker
          #                                                   image tag (no "sha-"
          #                                                   prefix, no version_tag
          #                                                   variant; images are
          #                                                   tagged by commit identity
          #                                                   only).
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short=8 HEAD)
          VERSION=${GITHUB_REF_NAME#v}
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_short=$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          echo "version_tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Detect pre-release
          if [[ "$GITHUB_REF_NAME" =~ -(rc|beta|alpha)\. ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
    outputs:
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      commit_short: ${{ steps.meta.outputs.commit_short }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}

  build-images:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        service:
          - {name: app, context: ./app, file: ./app/Dockerfile}
          - {name: worker, context: ./cli, file: ./cli/Dockerfile}
          - {name: db, context: ./postgres, file: ./postgres/Dockerfile}
          - {name: proxy, context: ./caddy, file: ./caddy/Dockerfile}
        platform:
          - {runner: ubuntu-24.04, arch: amd64}
          - {runner: ubuntu-24.04-arm, arch: arm64}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.file }}
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:${{ needs.metadata.outputs.commit_short }}-${{ matrix.platform.arch }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:buildcache-${{ matrix.platform.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service.name }}:buildcache-${{ matrix.platform.arch }},mode=max

  image-manifest:
    needs: [metadata, build-images]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        service: [app, worker, db, proxy]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (commit_short)
        # Rc.63: images tagged by commit_short only. The release tag
        # variant was dropped — consumers resolve release→commit_short
        # via the published release's manifest.json (see assets below).
        run: |
          TAG="${{ needs.metadata.outputs.commit_short }}"
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG} \
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG}-amd64 \
            ${{ env.REGISTRY }}/${{ env.ORG }}/statbus-${{ matrix.service }}:${TAG}-arm64

  build-binaries:
    runs-on: ubuntu-24.04
    needs: metadata
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build cross-platform binaries
        working-directory: cli
        run: |
          VERSION=${{ needs.metadata.outputs.version }}
          # cmd.commit ldflag receives the 40-char canonical commit_sha
          # so it can be equality-compared against public.upgrade.commit_sha
          # (also 40 chars) in the upgrade service's ground-truth check.
          # Display-only sites use ShortForDisplay(commit) — see
          # cli/cmd/root.go's --version printer. The 8-char commit_short
          # is used for Docker image tags (above), not binaries.
          COMMIT=${{ needs.metadata.outputs.commit_sha }}
          LDFLAGS="-s -w -X 'github.com/statisticsnorway/statbus/cli/cmd.version=${VERSION}' -X 'github.com/statisticsnorway/statbus/cli/cmd.commit=${COMMIT}'"

          mkdir -p dist
          for PAIR in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS=${PAIR%/*}
            ARCH=${PAIR#*/}
            CGO_ENABLED=0 GOOS=$OS GOARCH=$ARCH \
              go build -trimpath -ldflags "$LDFLAGS" -o "dist/sb-${OS}-${ARCH}" .
          done

      - name: Compute checksums
        working-directory: cli/dist
        run: sha256sum sb-* > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: cli/dist/

  create-release:
    runs-on: ubuntu-24.04
    needs: [metadata, image-manifest, build-binaries]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Detect migrations
        id: migrations
        run: |
          # Check if any migration files were added since the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NEW_MIGRATIONS=$(git diff --name-only "$PREV_TAG"..HEAD -- 'migrations/*.up.sql' 'migrations/*.up.psql' | wc -l | tr -d ' ')
          else
            NEW_MIGRATIONS=$(find migrations -name '*.up.sql' -o -name '*.up.psql' 2>/dev/null | wc -l | tr -d ' ')
          fi
          if [ "$NEW_MIGRATIONS" -gt 0 ]; then
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected $NEW_MIGRATIONS new migration(s)"

      - name: Generate release manifest
        # Rc.63: images are tagged by commit_short only. The manifest
        # carries the full commit_sha (equality) AND commit_short
        # (pull tag), so consumers can resolve both without inspection.
        run: |
          cat > dist/release-manifest.json <<MANIFEST
          {
            "version": "${{ needs.metadata.outputs.version }}",
            "commit_sha": "${{ needs.metadata.outputs.commit_sha }}",
            "commit_short": "${{ needs.metadata.outputs.commit_short }}",
            "prerelease": ${{ needs.metadata.outputs.prerelease }},
            "has_migrations": ${{ steps.migrations.outputs.has_migrations }},
            "images": {
              "app": "${{ env.REGISTRY }}/${{ env.ORG }}/statbus-app:${{ needs.metadata.outputs.commit_short }}",
              "db": "${{ env.REGISTRY }}/${{ env.ORG }}/statbus-db:${{ needs.metadata.outputs.commit_short }}",
              "worker": "${{ env.REGISTRY }}/${{ env.ORG }}/statbus-worker:${{ needs.metadata.outputs.commit_short }}",
              "proxy": "${{ env.REGISTRY }}/${{ env.ORG }}/statbus-proxy:${{ needs.metadata.outputs.commit_short }}"
            },
            "binaries": {
              "linux-amd64": { "url": "https://github.com/${{ env.ORG }}/statbus/releases/download/${{ needs.metadata.outputs.version_tag }}/sb-linux-amd64", "sha256": "$(sha256sum dist/sb-linux-amd64 | cut -d' ' -f1)" },
              "linux-arm64": { "url": "https://github.com/${{ env.ORG }}/statbus/releases/download/${{ needs.metadata.outputs.version_tag }}/sb-linux-arm64", "sha256": "$(sha256sum dist/sb-linux-arm64 | cut -d' ' -f1)" },
              "darwin-amd64": { "url": "https://github.com/${{ env.ORG }}/statbus/releases/download/${{ needs.metadata.outputs.version_tag }}/sb-darwin-amd64", "sha256": "$(sha256sum dist/sb-darwin-amd64 | cut -d' ' -f1)" },
              "darwin-arm64": { "url": "https://github.com/${{ env.ORG }}/statbus/releases/download/${{ needs.metadata.outputs.version_tag }}/sb-darwin-arm64", "sha256": "$(sha256sum dist/sb-darwin-arm64 | cut -d' ' -f1)" }
            }
          }
          MANIFEST

      - name: Fetch seed assets
        # Fetch from the SHA-named seed/<short-sha> branch written by
        # `./sb db seed create`. SHA-based naming (rather than tag-based)
        # removes the chicken-and-egg between tag-at-HEAD and seed-create:
        # every seed is keyed by the project commit it pins to, known at
        # create time, independent of whether that commit has been tagged yet.
        #
        # Short-SHA length (8) matches the canonical commit_short and
        # seedSHALen in cli/cmd/seed.go.
        #
        # The commit_sha check below is the workflow-side guard complementing
        # the release preflight's same check: even if the operator forgot to
        # regenerate before tagging, the release workflow refuses to publish
        # a seed that doesn't pin to this commit.
        run: |
          SHORT_SHA="${GITHUB_SHA:0:8}"
          git fetch --depth=1 origin "seed/${SHORT_SHA}"
          git checkout FETCH_HEAD -- seed.pg_dump seed.json
          SEED_SHA=$(jq -r '.commit_sha' seed.json)
          if [ "$SEED_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::Seed commit_sha does not match release commit"
            echo "  seed.json:   $SEED_SHA"
            echo "  release SHA: $GITHUB_SHA"
            echo "  Regenerate with: ./dev.sh update-seed  (on the release commit), re-tag, re-push."
            exit 1
          fi
          mv seed.pg_dump seed.json dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(
            "${{ needs.metadata.outputs.version_tag }}"
            --generate-notes
            dist/sb-linux-amd64
            dist/sb-linux-arm64
            dist/sb-darwin-amd64
            dist/sb-darwin-arm64
            dist/checksums.txt
            dist/release-manifest.json
            dist/seed.pg_dump
            dist/seed.json
          )
          if [ "${{ needs.metadata.outputs.prerelease }}" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${ARGS[@]}"

      - name: Notify Slack
        if: success()
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          VERSION_TAG: ${{ needs.metadata.outputs.version_tag }}
        run: |
          if [ -z "$SLACK_TOKEN" ]; then echo "SLACK_TOKEN not set, skipping"; exit 0; fi
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION_TAG}"
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-type: application/json; charset=utf-8" \
            -d "{\"channel\": \"statbus-utvikling\", \"text\": \"Release ${VERSION_TAG} published: ${RELEASE_URL}\"}"
