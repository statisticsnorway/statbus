# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "ug.statbus.org<-devops/deploy-to-ug"
on:
  workflow_dispatch:
  push:
    branches:
      - "devops/deploy-to-ug"

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      - name: Detect version
        id: version
        run: |
          TAG=$(git tag --points-at ${{ github.sha }} | grep '^v' | head -1)
          if [ -n "$TAG" ]; then
            echo "version=$TAG" >> $GITHUB_OUTPUT
          else
            echo "version=sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      - name: Deploy via upgrade daemon
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: niue.statbus.org
          username: statbus_ug
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/statbus
            ./sb upgrade apply "${{ steps.version.outputs.version }}"
