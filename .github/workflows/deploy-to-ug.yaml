# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "ug.statbus.org<-ops/cloud/deploy/ug"
on:
  workflow_dispatch:
  push:
    branches:
      - "ops/cloud/deploy/ug"

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy via upgrade daemon
        run: |
          install -m 600 /dev/stdin /tmp/key <<< "${{ secrets.SSH_KEY }}"
          ssh -i /tmp/key -o StrictHostKeyChecking=no \
            statbus_ug@niue.statbus.org \
            "cd ~/statbus && ./sb upgrade apply-latest"
          rm -f /tmp/key
