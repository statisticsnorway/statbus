# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Fast Tests

# Fast Tests — pg_regress fast suite, gated to run AFTER the Images build.
#
# Trigger model (mirrors pg_regress.yaml):
#   - workflow_run on "Images" completion (fires for master pushes once Images
#     finishes): reuse the commit_short-tagged images Images just published —
#     PULL them, no local rebuild — and fetch the published seed image (which
#     also exercises the image-based seed-consume path end-to-end). Gated on
#     Images concluding 'success'.
#   - pull_request: Images doesn't run for PRs, so build images locally and seed
#     via FULL_REPLAY (STATBUS_DB_SEED_NO_FETCH=1).
#   - workflow_dispatch: manual; same build-local path as PRs.
#
# Why after Images (not parallel): the previous `push: master` trigger ran
# concurrently with images.yaml, so `docker compose pull` raced the not-yet-
# published images (and, lacking a GHCR login, failed auth) and fell back to a
# ~5-min local `up -d --build`. Sequencing behind Images + authenticating lets
# the pull hit, removing the rebuild.
#
# Self-contained on the GHA runner: checkout → build sb → docker compose up →
# migrate-and-test fast. No external servers / SSH.
#
# Release gate wiring (see doc/release-workflow-gates.md): the stable-release
# pre-flight (`./sb release stable`) gates on this workflow being green at the
# RC's commit, via release.WorkflowFastTests in cli/internal/release/
# workflow_check.go. SKIP_FAST_TESTS=1 is the surgical operator bypass. A run
# still exists per master commit — workflow_run fires once Images completes for
# that commit (the RC tags a master commit).
#
# Relationship to pg_regress.yaml: pg_regress SSHes to niue.statbus.org and runs
# the FULL suite (incl 4xx/5xx imports) on a provisioned server — complementary,
# deeper, external-server-dependent. This is the lightweight always-available
# gate: fast suite only, in-runner, no external dependencies.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Images"]
    types: [completed]
  pull_request:
    branches-ignore:
      - 'ops/**'

# Per-commit (workflow_run) / per-ref (PR) groups. Never cancel a master result
# (each commit's run is the stamped verdict); cancel superseded PR runs.
concurrency:
  group: fast-tests-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: read

jobs:
  fast-tests:
    name: pg_regress fast suite
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Skip if Images failed (only applies to the workflow_run trigger).
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Determine sha
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On the workflow_run path github.sha is the workflow file's commit, not
          # the tested one — check out the build's head_sha explicitly.
          ref: ${{ steps.ref.outputs.sha }}
          # fetch-depth: 0 so `git describe --tags` in ldflags stamping resolves
          # to a meaningful version string (not just the short SHA fallback).
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build sb binary
        working-directory: cli
        run: |
          set -euxo pipefail
          _VERSION=$(git -C .. describe --tags --always --match 'v[0-9]*' 2>/dev/null | sed 's/^v//' || echo "dev")
          _COMMIT=$(git -C .. rev-parse HEAD)
          CGO_ENABLED=0 go build \
            -ldflags "-X 'github.com/statisticsnorway/statbus/cli/cmd.version=${_VERSION}' -X 'github.com/statisticsnorway/statbus/cli/cmd.commit=${_COMMIT}'" \
            -trimpath -o ../sb .

      - name: Generate config
        # Matches the slot-1 development slot used by test-hardening.yaml's
        # install-stack job — same env shape, no port conflicts if both happen
        # to share a runner (different jobs; they don't). config generate writes
        # .env including COMMIT_SHORT (= git rev-parse --short=8 HEAD), which is
        # the image tag the compose files reference.
        env:
          DEPLOYMENT_SLOT_NAME: CI
          DEPLOYMENT_SLOT_CODE: ci
          DEPLOYMENT_SLOT_PORT_OFFSET: "1"
          CADDY_DEPLOYMENT_MODE: development
          SITE_DOMAIN: localhost
        run: |
          set -euxo pipefail
          cat > .env.config <<CFG
          DEPLOYMENT_SLOT_NAME=$DEPLOYMENT_SLOT_NAME
          DEPLOYMENT_SLOT_CODE=$DEPLOYMENT_SLOT_CODE
          DEPLOYMENT_SLOT_PORT_OFFSET=$DEPLOYMENT_SLOT_PORT_OFFSET
          CADDY_DEPLOYMENT_MODE=$CADDY_DEPLOYMENT_MODE
          SITE_DOMAIN=$SITE_DOMAIN
          CFG
          ./sb config generate

      - name: Log in to GHCR
        # Only the workflow_run path pulls published images + the seed image;
        # PR/dispatch build locally and seed via FULL_REPLAY.
        if: github.event_name == 'workflow_run'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start services
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Images concluded success (job-level if gates on it). Reuse the
            # commit_short-tagged images it published — pull (authed above), no
            # local build. Strict: a pull failure fails the job rather than
            # silently rebuilding.
            docker compose pull --quiet
            docker compose --profile all up -d
          else
            # PR / manual dispatch: Images doesn't run — build locally.
            docker compose --profile all up -d --build
          fi

      - name: Wait for DB
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if docker compose exec db pg_isready -U postgres 2>/dev/null; then
              echo "DB ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: DB not ready after 60s"
          docker compose logs db | tail -30
          exit 1

      - name: Run fast test suite
        # workflow_run: fetch the published seed image (statbus-seed:<commit_short>)
        # — ~30s restore, and exercises the image-based seed-consume path end-to-end.
        # PR / dispatch: no published seed for this commit, so FULL_REPLAY from
        # on-disk migrations (STATBUS_DB_SEED_NO_FETCH=1, ~3 min).
        #
        # migrate-and-test fast: bootstraps statbus_seed, creates
        # statbus_test_template (fast clone), runs pg_regress on all tests except
        # 4xx/5xx (large imports). Exits non-zero on any failure — no `|| true`.
        env:
          STATBUS_DB_SEED_NO_FETCH: ${{ github.event_name == 'workflow_run' && '0' || '1' }}
        run: |
          set -euxo pipefail
          ./dev.sh migrate-and-test fast

      - name: Daemon floor oracle
        # STATBUS-182: the empirical daemon-floor oracle's STANDING HOME. Provisions a
        # DB at EXACTLY DaemonSchemaFloor and PREPAREs every daemon boot/recovery query
        # against it — a green master proves the floor is sufficient. The floor now lags
        # the tree by design (the first lag was the STATBUS-178 import migration), so this
        # must run standing, forever. The floor value is DERIVED from the single source of
        # truth cli/internal/migrate/daemon_floor.go's DaemonSchemaFloor, never hardcoded
        # (TestFloorOracleWiredInCI asserts this wiring in the pure Go lane).
        run: |
          set -euxo pipefail
          FLOOR=$(grep -oE 'DaemonSchemaFloor[[:space:]]+int64[[:space:]]*=[[:space:]]*[0-9]+' cli/internal/migrate/daemon_floor.go | grep -oE '[0-9]+$')
          [ -n "$FLOOR" ] || { echo "::error::could not derive DaemonSchemaFloor from cli/internal/migrate/daemon_floor.go"; exit 1; }
          echo "Derived DaemonSchemaFloor=$FLOOR"
          # A bare template_statbus lacks the per-DB auth schema, so migrate.Up cannot run
          # on it directly (the refuted self-provisioning note in daemon_floor_empirical_test.go).
          # Reuse the seed-baseline primitive (`db seed create-db` = template_statbus + auth
          # grants) against a DEDICATED db name via a SCOPED POSTGRES_SEED_DB override, so the
          # real statbus_seed the pg_regress flow built stays untouched; reverted right after.
          ORIG_SEED=$(./sb dotenv -f .env get POSTGRES_SEED_DB || true)
          ./sb dotenv -f .env set POSTGRES_SEED_DB statbus_floor
          ./sb db seed create-db                        # statbus_floor at baseline (auth schema, no migrations)
          ./sb migrate up --target seed --to "$FLOOR"   # → EXACTLY the floor (NOT HEAD)
          ./sb dotenv -f .env set POSTGRES_SEED_DB "${ORIG_SEED:-statbus_seed}"
          # Point the oracle at the floor DB and run it STRICT (no continue-on-error). The
          # test's non-vacuity guard FAILS unless MAX(db.migration.version) == the floor.
          # -x off around the DSN so the generated PGPASSWORD never lands in the CI log.
          set +x
          eval "$(./sb config show --postgres)"
          export STATBUS_FLOOR_TEST_DSN="postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/statbus_floor?sslmode=${PGSSLMODE:-disable}"
          set -x
          ( cd cli && go test ./internal/migrate/ -run TestDaemonFloorSchemaSufficient -count=1 -v )

      - name: Show regression diffs on failure
        if: failure()
        run: |
          docker compose exec --workdir /statbus db \
            cat /statbus/test/regression.diffs 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: docker compose --profile all down -v || true
