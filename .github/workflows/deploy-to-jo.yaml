# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "jo.statbus.org<-devops/deploy-to-jo"
on:
  workflow_dispatch:
  push:
    branches:
      - "devops/deploy-to-jo"

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy via upgrade daemon
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: niue.statbus.org
          username: statbus_jo
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/statbus
            SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-8)"
            ./sb upgrade apply "${SHA_TAG}"
