# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Notify cloud services
on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["Release"]
    types: [completed]

# Notify all cloud installations that a new release is available.
# Triggers AFTER the Release workflow completes, so the GitHub release
# exists when services check. Each server's upgrade service will discover the
# release and make it available in the admin UI. This is discovery
# only — not a forced upgrade. Admins or deploy branches decide when
# to apply.
#
# STATBUS-069 phase 3 (doc-026 §3 step 2): the notify legs run on the niue
# self-hosted runner instead of ubuntu-latest. Two changes from the pre-runner
# form:
#   1. `notify` runs on [self-hosted, niue] — the SSH now originates on the box
#      (via the Docker host gateway to niue's own sshd), not from Azure.
#   2. The SSH step is a raw `ssh` run step, not appleboy/ssh-action (a Docker
#      CONTAINER action that cannot run on the socketless runner — doc-026 §2/
#      delta 8). Host, user, key, and command are identical to today: the command
#      is the exact sshdo-allowlisted path ~/statbus/ops/ci-notify.sh
#      (ops/niue/sshdoers pins that byte-string; sshdo rejects anything else).
#
# STATBUS-069 (AC#5): the self-hosted `notify` legs are GATED by the hosted
# `runner-online` canary below — a job that SSHes to niue and runs the sshdo-allowlisted,
# root-provisioned health probe (/usr/local/sbin/statbus-runner-health). `notify`
# `needs:` it, so when the runner is offline the canary reds and the notify legs SKIP —
# a LOUD red on the next push — instead of queueing silently for up to 24h. The probe
# uses a DEDICATED key (secret RUNNER_HEALTH_SSH_KEY, revocable server-side, no PAT — the
# withdrawn runner-status-PAT canary's replacement, architect ruling, doc-026 delta 9)
# and the repo-pinned host key (ops/niue/known_hosts, StrictHostKeyChecking=yes — the
# canary job carries the full note on why accept-new is banned and why a key rotation
# reds it).
# Residuals (doc-026, accepted): crowdsec may occasionally ban the hosted canary's IP →
# ONE false-red push, self-correcting; a runner locally-green but dropped by GitHub is
# bounded by the notify legs themselves failing on the next push.
# Rollback: drop `needs: runner-online` + delete the runner-online job (notify runs
# ungated, pre-canary behavior); or revert `notify` runs-on to ubuntu-latest and restore
# the appleboy step (git history / ops/github-runner/).

jobs:
  # STATBUS-069 canary: SSH to niue as the dedicated probe user and run the
  # root-provisioned health probe. Reds (skipping the notify legs) when the runner is
  # offline, so an offline runner is a loud red on the next push, not a silent 24h queue.
  runner-online:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Check out (for the repo-pinned known_hosts)
        # SHA-pinned (doc-026 delta 4): this job handles a secret (RUNNER_HEALTH_SSH_KEY)
        # on a hosted runner, so a mutable-tag supply-chain edit is a key-exfiltration
        # vector. actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Probe that the niue self-hosted runner is healthy
        env:
          RUNNER_HEALTH_SSH_KEY: ${{ secrets.RUNNER_HEALTH_SSH_KEY }}
        run: |
          set -euo pipefail
          keyfile="$(mktemp)"; chmod 600 "$keyfile"
          printf '%s\n' "$RUNNER_HEALTH_SSH_KEY" > "$keyfile"
          trap 'rm -f "$keyfile"' EXIT
          # The probe is the root-provisioned, sshdo-allowlisted command
          # /usr/local/sbin/statbus-runner-health (STATBUS-069, K2-provisioned): it prints a
          # ONE-LINE verdict and exits 0 HEALTHY / nonzero naming the failed layer. ssh
          # relays that stdout into THIS job log, so a red canary names WHY. On nonzero the
          # step (set -e) fails → this job reds → the notify legs `needs:` it and SKIP.
          #
          # HOST KEY: the repo-pinned ops/niue/known_hosts + StrictHostKeyChecking=yes — NOT
          # accept-new (architect ruling, 069 comment #17). A hosted runner is a fresh VM
          # every run, so accept-new would be trust-on-first-use EVERY run (no verification),
          # and a MITM faking a HEALTHY verdict is the exact false-green this canary exists to
          # kill. CONSEQUENCE: a niue host-key ROTATION reds this canary (and skips the notify
          # legs) until ops/niue/known_hosts is updated to the new key — the system working.
          ssh -i "$keyfile" \
            -o UserKnownHostsFile=ops/niue/known_hosts \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            github-runner@niue.statbus.org \
            /usr/local/sbin/statbus-runner-health

  notify:
    needs: runner-online
    runs-on: [self-hosted, niue]
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # statbus_no was removed 2026-04-21 when Norway migrated to rune.statbus.org
        # (standalone, not multi-tenant cloud). Standalone hosts have their own
        # deploy workflow (ops/standalone/deploy/<host>-<slot>) and don't need
        # notify-all-clouds, which is niue-specific.
        server:
          - statbus_dev
          - statbus_demo
          - statbus_tcc
          - statbus_ma
          - statbus_ug
          - statbus_et
          - statbus_jo
    steps:
      - name: Notify ${{ matrix.server }}
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          keyfile="$(mktemp)"; chmod 600 "$keyfile"
          printf '%s\n' "$SSH_KEY" > "$keyfile"
          trap 'rm -f "$keyfile"' EXIT
          known="$HOME/_work/.known_hosts"   # persists in the runner-work volume
          # The command is the exact sshdo-allowlisted path (ops/niue/sshdoers);
          # ci-notify.sh is `exec ./sb upgrade check`. sshdo matches the byte-string,
          # so this must stay verbatim — an inlined `./sb upgrade check` is rejected.
          # shellcheck disable=SC2088  # the literal '~' is load-bearing: it must go
          # over the wire UNEXPANDED to match the sshdoers byte-string exactly; the
          # remote sshd runs it via `sh -c` (sshdo shell_exec), which expands it there.
          # Do NOT change to $HOME — that would expand to the runner's home, not the slot's.
          timeout 40s ssh -i "$keyfile" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=accept-new \
            -o "UserKnownHostsFile=$known" \
            "${{ matrix.server }}@niue.statbus.org" \
            '~/statbus/ops/ci-notify.sh'
