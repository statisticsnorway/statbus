# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Notify cloud services
on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["Release"]
    types: [completed]

# Notify all cloud installations that a new release is available.
# Triggers AFTER the Release workflow completes, so the GitHub release
# exists when services check. Each server's upgrade service will discover the
# release and make it available in the admin UI. This is discovery
# only — not a forced upgrade. Admins or deploy branches decide when
# to apply.
#
# STATBUS-069 phase 3 (doc-026 §3 step 2): the notify legs run on the niue
# self-hosted runner instead of ubuntu-latest. Two changes from the pre-runner
# form:
#   1. `notify` runs on [self-hosted, niue] — the SSH now originates on the box
#      (via the Docker host gateway to niue's own sshd), not from Azure.
#   2. The SSH step is a raw `ssh` run step, not appleboy/ssh-action (a Docker
#      CONTAINER action that cannot run on the socketless runner — doc-026 §2/
#      delta 8). Host, user, key, and command are identical to today: the command
#      is the exact sshdo-allowlisted path ~/statbus/ops/ci-notify.sh
#      (ops/niue/sshdoers pins that byte-string; sshdo rejects anything else).
#
# INTERIM (STATBUS-069): the hosted `runner-online` canary that gated these legs
# was REMOVED. It needed a runner-status PAT, and that ask was withdrawn (the King
# challenged it; the architect ruling replaced doc-026 delta 9). A gate whose
# precondition will never exist can only stay red and skip every notify leg, so it
# is gone until its architect-ruled replacement — an sshdo health-probe canary —
# lands. While the canary is absent notify runs ungated: if the runner is offline
# the legs queue silently (the pre-canary behavior), a risk accepted only while the
# runner is confirmed up.
# Rollback is one line: revert `notify` runs-on back to ubuntu-latest and restore
# the appleboy step (see git history / ops/github-runner/).

jobs:
  notify:
    runs-on: [self-hosted, niue]
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # statbus_no was removed 2026-04-21 when Norway migrated to rune.statbus.org
        # (standalone, not multi-tenant cloud). Standalone hosts have their own
        # deploy workflow (ops/standalone/deploy/<host>-<slot>) and don't need
        # notify-all-clouds, which is niue-specific.
        server:
          - statbus_dev
          - statbus_demo
          - statbus_tcc
          - statbus_ma
          - statbus_ug
          - statbus_et
          - statbus_jo
    steps:
      - name: Notify ${{ matrix.server }}
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          keyfile="$(mktemp)"; chmod 600 "$keyfile"
          printf '%s\n' "$SSH_KEY" > "$keyfile"
          trap 'rm -f "$keyfile"' EXIT
          known="$HOME/_work/.known_hosts"   # persists in the runner-work volume
          # The command is the exact sshdo-allowlisted path (ops/niue/sshdoers);
          # ci-notify.sh is `exec ./sb upgrade check`. sshdo matches the byte-string,
          # so this must stay verbatim — an inlined `./sb upgrade check` is rejected.
          # shellcheck disable=SC2088  # the literal '~' is load-bearing: it must go
          # over the wire UNEXPANDED to match the sshdoers byte-string exactly; the
          # remote sshd runs it via `sh -c` (sshdo shell_exec), which expands it there.
          # Do NOT change to $HOME — that would expand to the runner's home, not the slot's.
          timeout 40s ssh -i "$keyfile" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=accept-new \
            -o "UserKnownHostsFile=$known" \
            "${{ matrix.server }}@niue.statbus.org" \
            '~/statbus/ops/ci-notify.sh'
