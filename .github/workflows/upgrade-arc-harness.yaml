# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Upgrade Arc Harness

# Upgrade Arc Harness — the REAL-upgrade-arc framework (STATBUS-071, doc-012).
#
# Stop FABRICATING crash states. Make the real system produce them via a real
# arc: install A → upgrade to a defective B → service rolls back → upgrade to a
# fixed C. Every upgrade is driven through the public.upgrade scheduling row
# (register + schedule, STATBUS-086) — the Albania web-UI mechanism — and the
# box must apply/recover AUTONOMOUSLY.
#
# === INCREMENTS LANDED: skeleton (§9 a+b) + working (§9 c) + failing (§9 d) ===
# `scenario` selects the arc: working = re-stamp (the MANY who succeeded); failing
# = fail→rollback→fix + the 3-dim clean-slate fingerprint (the FEW who failed).
# construct branches V by scenario; run-arc dispatches ./arcs/${scenario}-arc.sh.
#   construct  → push a test/* defect→fixed branch pair off A, then dispatch
#                images.yaml per branch (Q1: a GITHUB_TOKEN push does NOT trigger
#                downstream workflows, so the branch push alone won't build images
#                — we explicitly `gh workflow run images.yaml --ref <branch>`;
#                images.yaml itself is UNCHANGED, no test/** push trigger).
#                B adds a genuine migration V (succeeds); C amends V in place →
#                the runtime channel-bless re-stamps content_hash (STATBUS-102).
#   image-wait → reuse the install-recovery discover-gate poll: wait until all 5
#                per-commit images (app, worker, db, proxy, sb) exist at BOTH
#                B_short and C_short.
#   run-arc    → on a fresh Hetzner VM: install A=base_sha (install_statbus_at_sha)
#                → register/schedule B (V applies, content_hash H_B) → register/
#                schedule C (eager hash check sees the amendment → RE-STAMPS to
#                H_C, no re-run). Driven entirely by the upgrade SERVICE (Albania
#                autonomous; no quiesce, no ./sb install).
#   teardown   → if:always() — delete the two test/* branches. Image cleanup is
#                deferred to the weekly image-cleanup.yaml GC (Q2): commit_short-
#                tagged test images are content-unique, never enter the release
#                path, and are GC'd as orphans — so no explicit delete needed yet.
#
# NEXT (doc-012 §9 d): the 3-dim clean-slate fingerprint + the hanging→hanging-
# fixed fail→rollback→fix arc; then §9 (5) reshapes the kill scenarios.

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: 'Base commit A to branch the arc off (blank = this run''s SHA).'
        required: false
        default: ''
      scenarios:
        description: 'Space-separated arc selectors (e.g. "working failing postswap-after-commit-kill") — blank or "all" runs EVERY arcs/*-arc.sh on its own Hetzner VM in parallel (the 5e full-suite matrix). One construct builds the shared working+failing fixtures once; each arc rides the right lineage.'
        required: false
        default: ''

concurrency:
  group: upgrade-arc-harness
  cancel-in-progress: false

permissions:
  contents: write   # push + delete the throwaway test/* branch fixtures
  actions: write    # gh workflow run images.yaml --ref <branch>
  packages: read    # docker manifest inspect (image-wait)

jobs:
  construct:
    name: Construct branch fixtures + dispatch image builds
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      base_sha: ${{ steps.fixtures.outputs.base_sha }}
      base_short: ${{ steps.fixtures.outputs.base_short }}
      v_version: ${{ steps.fixtures.outputs.v_version }}
      v_version_2: ${{ steps.fixtures.outputs.v_version_2 }}
      v_version_3: ${{ steps.fixtures.outputs.v_version_3 }}
      arc_pubkey: ${{ steps.fixtures.outputs.arc_pubkey }}
      # §7 shared-fixture (STATBUS-071 5d-d): ONE working pair + ONE failing pair
      # cover ALL arcs (kill/stall arcs ride working; failing + rollback-restore
      # ride failing). The arc's contract lives in its inject class + asserts, not
      # the B-fixture — so 2 image sets replace the old ~14 per-scenario sets.
      working_b_branch: ${{ steps.fixtures.outputs.working_b_branch }}
      working_c_branch: ${{ steps.fixtures.outputs.working_c_branch }}
      working_b_short: ${{ steps.fixtures.outputs.working_b_short }}
      working_c_short: ${{ steps.fixtures.outputs.working_c_short }}
      working_b_full: ${{ steps.fixtures.outputs.working_b_full }}
      working_c_full: ${{ steps.fixtures.outputs.working_c_full }}
      failing_b_branch: ${{ steps.fixtures.outputs.failing_b_branch }}
      failing_c_branch: ${{ steps.fixtures.outputs.failing_c_branch }}
      failing_b_short: ${{ steps.fixtures.outputs.failing_b_short }}
      failing_c_short: ${{ steps.fixtures.outputs.failing_c_short }}
      failing_b_full: ${{ steps.fixtures.outputs.failing_b_full }}
      failing_c_full: ${{ steps.fixtures.outputs.failing_c_full }}
      # oom (STATBUS-096): single-phase — B only. postswap-migration-oom-arc.sh
      # is the sole rider; no C is built or dispatched.
      oom_b_branch: ${{ steps.fixtures.outputs.oom_b_branch }}
      oom_b_short: ${{ steps.fixtures.outputs.oom_b_short }}
      oom_b_full: ${{ steps.fixtures.outputs.oom_b_full }}
      # ceiling (STATBUS-095 piece 2): single-phase — B only.
      # postswap-migration-ceiling-arc.sh is the sole rider; no C.
      ceiling_b_branch: ${{ steps.fixtures.outputs.ceiling_b_branch }}
      ceiling_b_short: ${{ steps.fixtures.outputs.ceiling_b_short }}
      ceiling_b_full: ${{ steps.fixtures.outputs.ceiling_b_full }}
      # healthpark (STATBUS-145, doc-029): TWO-phase like working/failing — B
      # parks (health-past-warmup, at-target); C is a real fix release (a NEW
      # migration V3) dispatched while B's row sits parked. postswap-health-
      # park-arc.sh is the sole rider.
      healthpark_b_branch: ${{ steps.fixtures.outputs.healthpark_b_branch }}
      healthpark_c_branch: ${{ steps.fixtures.outputs.healthpark_c_branch }}
      healthpark_b_short: ${{ steps.fixtures.outputs.healthpark_b_short }}
      healthpark_c_short: ${{ steps.fixtures.outputs.healthpark_c_short }}
      healthpark_b_full: ${{ steps.fixtures.outputs.healthpark_b_full }}
      healthpark_c_full: ${{ steps.fixtures.outputs.healthpark_c_full }}
      # codeonly (STATBUS-071 arm ii): SINGLE-PHASE (B only, like oom/ceiling) — B
      # carries NO migration, so it stays at-target at the pre-pull check and PARKS
      # on a resource shortfall. un-park-to-completion-arc.sh is the sole rider.
      codeonly_b_branch: ${{ steps.fixtures.outputs.codeonly_b_branch }}
      codeonly_b_short: ${{ steps.fixtures.outputs.codeonly_b_short }}
      codeonly_b_full: ${{ steps.fixtures.outputs.codeonly_b_full }}
      # crollback (STATBUS-071 C-rollback resurrection leg): TWO-PHASE like
      # healthpark — B parks at-target, C displaces B then FAILS + rolls back onto
      # B. c-rollback-resurrection-arc.sh is the sole rider (needs B_SHORT too: its
      # park-reason regex names B's short SHA, same as health-park).
      crollback_b_branch: ${{ steps.fixtures.outputs.crollback_b_branch }}
      crollback_c_branch: ${{ steps.fixtures.outputs.crollback_c_branch }}
      crollback_b_short: ${{ steps.fixtures.outputs.crollback_b_short }}
      crollback_c_short: ${{ steps.fixtures.outputs.crollback_c_short }}
      crollback_b_full: ${{ steps.fixtures.outputs.crollback_b_full }}
      crollback_c_full: ${{ steps.fixtures.outputs.crollback_c_full }}
    steps:
      - name: Checkout (full history — branch fixtures are real commits off A)
        uses: actions/checkout@v4
        with:
          # Default token is persisted by checkout so the pushes below authenticate.
          fetch-depth: 0

      - name: Build the shared working + failing fixture pairs off A
        id: fixtures
        env:
          # base_sha input wins; blank → this run's triggering SHA.
          BASE_SHA_INPUT: ${{ github.event.inputs.base_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Single source of truth for B/C branch construction (STATBUS-118).
          # All inline logic (key gen + write_working_v + write_failing_v + build_pair
          # + push) has moved to the library; this step drives it.
          . test/install-recovery/lib/upgrade-target.sh

          base_sha="${BASE_SHA_INPUT:-${GITHUB_SHA}}"

          # STATBUS-153: fetch-depth: 0 on the checkout above (present since this
          # workflow's first commit) is NOT sufficient on its own — wave-5 dispatch
          # 28984225540 (2026-07-09) died here with a bare `fatal: unable to read
          # tree` because master had advanced past base_sha between dispatch and
          # job start, and the checkout's own history did not reach back to it (the
          # exact mechanism observed, not theorized: GitHub resolves the checkout's
          # ref at job-start, not at dispatch-request time). An EXPLICIT fetch of
          # the exact base_sha closes the gap regardless of how the checkout landed,
          # and turns a genuinely unreachable SHA into a NAMED error instead of a
          # bare git-internals message surfacing later, opaquely, at first read.
          if ! git fetch origin "$base_sha" 2>/tmp/base_sha_fetch_err.log; then
            echo "::error title=arc-fixture-shallow-fetch: base SHA unreachable::base_sha=${base_sha} could not be fetched from origin — it is likely genuinely unreachable (a deleted branch, a GC'd/pruned object, or a typo in the dispatch input), not a transient checkout-depth gap. git fetch said: $(cat /tmp/base_sha_fetch_err.log)" >&2
            exit 1
          fi

          base_short="$(git rev-parse --short=8 "$base_sha")"
          echo "A (base) = ${base_sha}"

          # Ephemeral SSH signing key: B/C are CI commits → unsigned → the daemon's
          # MANDATORY verifyCommitSignature rejects them. Sign B+C with a throwaway
          # key; the arc's install trusts its PUBLIC key via UPGRADE_TRUSTED_SIGNER_arc
          # (install_statbus_at_sha). Production never carries that var, so its
          # verification is untouched — the gate stays mandatory AND is now actually
          # exercised by the arc. Principal is KEY-based, not committer-email-matched
          # (proven in prod: UPGRADE_TRUSTED_SIGNER_jhf verifies non-jhf-committer
          # commits). Key generation is OWNED BY the library (construct_upgrade_target):
          # the first call generates+exports ARC_SIGNING_KEY; the second call inherits
          # it → ONE key / ONE pubkey guaranteed by the code, not by the caller. No
          # manual ssh-keygen or export needed here. Private key discarded with runner.

          # Build the working + failing fixture pairs off A (library sets caller-scope
          # vars B_BRANCH/B_FULL/B_SHORT/C_BRANCH/C_FULL/C_SHORT/V_VERSION/V_VERSION_2/
          # ARC_PUBKEY; each call also pushes its 2 branches to origin via git push -f).
          # ONE working pair + ONE failing pair cover every arc (§7 shared-fixture):
          # kill/stall arcs ride working; the failing + rollback-restore arcs ride
          # failing. The per-scenario contract is the arc's inject class + asserts.
          construct_upgrade_target "$base_sha" working
          working_b_branch="$B_BRANCH"; working_b_short="$B_SHORT"; working_b_full="$B_FULL"
          working_c_branch="$C_BRANCH"; working_c_short="$C_SHORT"; working_c_full="$C_FULL"

          construct_upgrade_target "$base_sha" failing
          failing_b_branch="$B_BRANCH"; failing_b_short="$B_SHORT"; failing_b_full="$B_FULL"
          failing_c_branch="$C_BRANCH"; failing_c_short="$C_SHORT"; failing_c_full="$C_FULL"

          # oom (STATBUS-096): single-phase, B only — construct_upgrade_target's
          # oom spec builds a C branch too (identical commit, unused) for
          # uniformity, but only B is pushed/dispatched/waited-on below.
          construct_upgrade_target "$base_sha" oom
          oom_b_branch="$B_BRANCH"; oom_b_short="$B_SHORT"; oom_b_full="$B_FULL"

          # ceiling (STATBUS-095 piece 2): single-phase, B only — same shape as oom.
          construct_upgrade_target "$base_sha" ceiling
          ceiling_b_branch="$B_BRANCH"; ceiling_b_short="$B_SHORT"; ceiling_b_full="$B_FULL"

          # healthpark (STATBUS-145, doc-029): TWO-phase like working/failing —
          # B parks, C is a real fix release (a NEW migration V3).
          construct_upgrade_target "$base_sha" healthpark
          healthpark_b_branch="$B_BRANCH"; healthpark_b_short="$B_SHORT"; healthpark_b_full="$B_FULL"
          healthpark_c_branch="$C_BRANCH"; healthpark_c_short="$C_SHORT"; healthpark_c_full="$C_FULL"

          # codeonly (STATBUS-071 arm ii): single-phase, B only — construct's
          # codeonly spec writes NO migration (a non-migration marker), so B is
          # at-target at the pre-pull check. C is left identical to B (unused),
          # same shape as oom/ceiling; only B is dispatched/waited-on below.
          construct_upgrade_target "$base_sha" codeonly
          codeonly_b_branch="$B_BRANCH"; codeonly_b_short="$B_SHORT"; codeonly_b_full="$B_FULL"

          # crollback (STATBUS-071 C-rollback resurrection leg): two-phase — B parks
          # (healthpark's B), C = failing V3 that displaces B then rolls back onto it.
          construct_upgrade_target "$base_sha" crollback
          crollback_b_branch="$B_BRANCH"; crollback_b_short="$B_SHORT"; crollback_b_full="$B_FULL"
          crollback_c_branch="$C_BRANCH"; crollback_c_short="$C_SHORT"; crollback_c_full="$C_FULL"

          # ARC_PUBKEY set (and exported) by the library on the first call above.
          {
            echo "base_sha=${base_sha}"
            echo "base_short=${base_short}"
            echo "v_version=${V_VERSION}"
            echo "v_version_2=${V_VERSION_2}"
            echo "v_version_3=${V_VERSION_3}"
            echo "arc_pubkey=${ARC_PUBKEY}"
            echo "working_b_branch=${working_b_branch}"
            echo "working_c_branch=${working_c_branch}"
            echo "working_b_short=${working_b_short}"
            echo "working_c_short=${working_c_short}"
            echo "working_b_full=${working_b_full}"
            echo "working_c_full=${working_c_full}"
            echo "failing_b_branch=${failing_b_branch}"
            echo "failing_c_branch=${failing_c_branch}"
            echo "failing_b_short=${failing_b_short}"
            echo "failing_c_short=${failing_c_short}"
            echo "failing_b_full=${failing_b_full}"
            echo "failing_c_full=${failing_c_full}"
            echo "oom_b_branch=${oom_b_branch}"
            echo "oom_b_short=${oom_b_short}"
            echo "oom_b_full=${oom_b_full}"
            echo "ceiling_b_branch=${ceiling_b_branch}"
            echo "ceiling_b_short=${ceiling_b_short}"
            echo "ceiling_b_full=${ceiling_b_full}"
            echo "healthpark_b_branch=${healthpark_b_branch}"
            echo "healthpark_c_branch=${healthpark_c_branch}"
            echo "healthpark_b_short=${healthpark_b_short}"
            echo "healthpark_c_short=${healthpark_c_short}"
            echo "healthpark_b_full=${healthpark_b_full}"
            echo "healthpark_c_full=${healthpark_c_full}"
            echo "codeonly_b_branch=${codeonly_b_branch}"
            echo "codeonly_b_short=${codeonly_b_short}"
            echo "codeonly_b_full=${codeonly_b_full}"
            echo "crollback_b_branch=${crollback_b_branch}"
            echo "crollback_c_branch=${crollback_c_branch}"
            echo "crollback_b_short=${crollback_b_short}"
            echo "crollback_c_short=${crollback_c_short}"
            echo "crollback_b_full=${crollback_b_full}"
            echo "crollback_c_full=${crollback_c_full}"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch images.yaml for all 11 fixture branches (push does not trigger; dispatch does)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKING_B_BRANCH: ${{ steps.fixtures.outputs.working_b_branch }}
          WORKING_C_BRANCH: ${{ steps.fixtures.outputs.working_c_branch }}
          FAILING_B_BRANCH: ${{ steps.fixtures.outputs.failing_b_branch }}
          FAILING_C_BRANCH: ${{ steps.fixtures.outputs.failing_c_branch }}
          OOM_B_BRANCH: ${{ steps.fixtures.outputs.oom_b_branch }}
          CEILING_B_BRANCH: ${{ steps.fixtures.outputs.ceiling_b_branch }}
          HEALTHPARK_B_BRANCH: ${{ steps.fixtures.outputs.healthpark_b_branch }}
          HEALTHPARK_C_BRANCH: ${{ steps.fixtures.outputs.healthpark_c_branch }}
          CODEONLY_B_BRANCH: ${{ steps.fixtures.outputs.codeonly_b_branch }}
          CROLLBACK_B_BRANCH: ${{ steps.fixtures.outputs.crollback_b_branch }}
          CROLLBACK_C_BRANCH: ${{ steps.fixtures.outputs.crollback_c_branch }}
        run: |
          set -euo pipefail
          # images.yaml is UNCHANGED — its workflow_dispatch is the public entry
          # point; building per branch tags statbus-{app,worker,db,proxy}:<short>.
          #
          # RETRY: GitHub ref propagation is eventually-consistent. A
          # `gh workflow run --ref <branch>` fired ~one step after the push can
          # transiently fail "No ref found for: <branch>". A single attempt under
          # `set -e` would be a FLAKY RED *and* would skip image-wait (an
          # inconclusive oracle run). Retry until the ref is visible; fail loud
          # only after the budget.
          dispatch_images() {
            local ref="$1" attempt
            for attempt in 1 2 3 4 5; do
              if gh workflow run images.yaml --ref "$ref"; then
                echo "Dispatched images.yaml for ${ref} (attempt ${attempt})."
                return 0
              fi
              echo "  dispatch for ${ref} failed (attempt ${attempt}/5) — ref not propagated yet? retrying in 5s..."
              sleep 5
            done
            echo "::error title=images.yaml dispatch failed::could not dispatch for ${ref} after 5 attempts" >&2
            return 1
          }
          dispatch_images "$WORKING_B_BRANCH"
          dispatch_images "$WORKING_C_BRANCH"
          dispatch_images "$FAILING_B_BRANCH"
          dispatch_images "$FAILING_C_BRANCH"
          dispatch_images "$OOM_B_BRANCH"
          dispatch_images "$CEILING_B_BRANCH"
          dispatch_images "$HEALTHPARK_B_BRANCH"
          dispatch_images "$HEALTHPARK_C_BRANCH"
          dispatch_images "$CODEONLY_B_BRANCH"
          dispatch_images "$CROLLBACK_B_BRANCH"
          dispatch_images "$CROLLBACK_C_BRANCH"

  image-wait:
    name: Wait for per-commit images (A + B + C)
    needs: construct
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Poll ghcr until all images exist at base_short, B_short AND C_short
        # Mirrors install-recovery-harness.yaml's discover-gate poll, generalized
        # over ALL THREE commit_shorts. The B/C images are built by the images.yaml
        # runs construct dispatched (cold ~20-30 min). A's images (base_short) are
        # built by the master push, normally ready — but install_statbus_at_sha
        # pulls A's service images + procures statbus-sb:<base_short>, so gating on
        # them removes the install-A race window.
        env:
          REGISTRY: ghcr.io
          ORG: statisticsnorway
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          DOCKER_CLI_EXPERIMENTAL: enabled
          IMAGES_WAIT_BUDGET_S: "2400"
          IMAGES_WAIT_INTERVAL_S: "30"
          SHORTS: "${{ needs.construct.outputs.base_short }} ${{ needs.construct.outputs.working_b_short }} ${{ needs.construct.outputs.working_c_short }} ${{ needs.construct.outputs.failing_b_short }} ${{ needs.construct.outputs.failing_c_short }} ${{ needs.construct.outputs.oom_b_short }} ${{ needs.construct.outputs.ceiling_b_short }} ${{ needs.construct.outputs.healthpark_b_short }} ${{ needs.construct.outputs.healthpark_c_short }} ${{ needs.construct.outputs.codeonly_b_short }} ${{ needs.construct.outputs.crollback_b_short }} ${{ needs.construct.outputs.crollback_c_short }}"
        run: |
          set -euo pipefail
          echo "${GH_TOKEN}" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin
          echo "Waiting for images at commit_shorts: ${SHORTS}"

          # 'sb' included: the arc's toolchain-free binary procurement
          # (install_statbus_at_sha + the daemon's buildBinaryOnDisk→ProcureShort)
          # pulls statbus-sb:<short>; without it the box falls back to a slow
          # in-container build.
          services="app worker db proxy sb"
          start=$SECONDS
          while :; do
            missing=""
            for short in $SHORTS; do
              for svc in $services; do
                ref="${REGISTRY}/${ORG}/statbus-${svc}:${short}"
                if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
                  missing="${missing} statbus-${svc}:${short}"
                fi
              done
            done
            if [ -z "$missing" ]; then
              echo "All per-commit service images present for: ${SHORTS}."
              break
            fi
            elapsed=$(( SECONDS - start ))
            if [ "$elapsed" -ge "$IMAGES_WAIT_BUDGET_S" ]; then
              echo "::error title=Arc images not published::missing after $((IMAGES_WAIT_BUDGET_S/60))m:${missing}"
              {
                echo "construct pushed the test/* branches and dispatched images.yaml per branch,"
                echo "but the per-commit service images are not all in ghcr yet."
                echo "Check the Images runs: gh run list --workflow=images.yaml"
              } >&2
              exit 1
            fi
            echo "Waiting for:${missing} (elapsed ${elapsed}s / ${IMAGES_WAIT_BUDGET_S}s) — re-checking in ${IMAGES_WAIT_INTERVAL_S}s..."
            sleep "$IMAGES_WAIT_INTERVAL_S"
          done

  discover:
    name: Discover arc scenarios
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      # JSON array of arc scenario names (the matrix domain) + its length.
      matrix: ${{ steps.scenarios.outputs.matrix }}
      count: ${{ steps.scenarios.outputs.count }}
    steps:
      - name: Checkout
        # ref: github.sha — pin to the run's commit so the arc set matches the
        # construct/run-arc checkouts (same invariant as install-recovery discover).
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Enumerate arc scenarios into the matrix
        id: scenarios
        # Single source of truth: every arcs/<scenario>-arc.sh IS a scenario.
        # Blank or "all" → the full suite (the 5e matrix); a space-separated
        # selector narrows it (single-arc re-runs). An unknown selector fails
        # LOUD rather than silently producing an empty matrix.
        env:
          SCENARIOS_INPUT: ${{ github.event.inputs.scenarios }}
        run: |
          set -euo pipefail
          all="$(for f in test/install-recovery/arcs/*-arc.sh; do b="$(basename "$f")"; echo "${b%-arc.sh}"; done | sort)"
          sel="$(printf '%s' "${SCENARIOS_INPUT:-}" | tr -s ' ' ' ' | sed 's/^ *//; s/ *$//')"
          if [ -z "$sel" ] || [ "$sel" = "all" ]; then
            selected="$all"
          else
            selected=""
            for want in $sel; do
              if printf '%s\n' "$all" | grep -qxF "$want"; then
                selected="${selected}${want}"$'\n'
              else
                echo "::error title=Unknown arc scenario::no test/install-recovery/arcs/${want}-arc.sh" >&2
                echo "Available arcs:" >&2; printf '%s\n' "$all" | sed 's/^/  /' >&2
                exit 1
              fi
            done
          fi
          matrix="$(printf '%s\n' "$selected" | jq -R . | jq -s -c 'map(select(length > 0))')"
          count="$(printf '%s\n' "$selected" | grep -c . || true)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count arc(s) for the matrix:"
          printf '%s\n' "$selected"

  run-arc:
    name: ${{ matrix.scenario }}
    needs: [construct, image-wait, discover]
    if: ${{ needs.discover.outputs.count != '0' }}
    strategy:
      # fail-fast: false is LOAD-BEARING (STATBUS-025) — a sibling arc failing
      # must NOT cancel the others (lose verdicts + skip cleanup traps → orphan VMs).
      fail-fast: false
      # max-parallel bounds concurrent VMs to the Hetzner project quota (same
      # limit install-recovery-harness hit at 8 → 3).
      max-parallel: 3
      matrix:
        scenario: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-24.04
    # Per-arc ceiling: install A + two real upgrades (A→B applies V, B→C
    # re-stamps) on a fresh VM. Matches install-recovery's per-scenario budget.
    timeout-minutes: 120
    steps:
      - name: Checkout
        # ref github.sha so the arc script + lib match the run's commit.
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build sb binary (linux/amd64)
        # bootstrap_install_test_vm's no-version path needs an sb binary for
        # /tmp/sb; install_statbus_at_sha then docker-procures base_sha's binary
        # on the VM (the authoritative one). Built once here.
        run: ./dev.sh build-sb linux/amd64

      - name: Install hcloud CLI
        env:
          HCLOUD_CLI_VERSION: "1.64.1"
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/hetznercloud/cli/releases/download/v${HCLOUD_CLI_VERSION}/hcloud-linux-amd64.tar.gz" \
            -o /tmp/hcloud.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/hcloud.tar.gz hcloud
          rm /tmp/hcloud.tar.gz
          hcloud version

      - name: Install CI SSH private key
        env:
          STATBUS_CI_SSH_PRIVATE_KEY: ${{ secrets.STATBUS_CI_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STATBUS_CI_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -lf ~/.ssh/id_ed25519 | awk '{ print "SSH key fingerprint:", $2 }'

      - name: Resolve fixture lineage for the scenario
        # §7 shared-fixture: each arc rides ONE of the 5 shared lineages. The
        # failing + rollback-restore + restore-broke-reattempt arcs need the
        # FAILING pair (RAISE → rollback; restore-broke-reattempt rides BOTH
        # B and C — content is irrelevant to either of its kill sites, which
        # both fire before the migration ever runs, but a distinct SECOND
        # commit is required since commit_sha is UNIQUE and phase (i) leaves
        # B terminal);
        # postswap-migration-oom needs its own OOM V (a real, long-running
        # statement to kill mid-run — STATBUS-096); postswap-migration-ceiling
        # needs its own CEILING V (a real, long-running statement OUR OWN
        # STATBUS_MIGRATE_UP_TIMEOUT kills — STATBUS-095 piece 2); postswap-
        # health-park needs its own HEALTHPARK V pair (V1/V2 break auth_status
        # past warmup; C=V3 is a real fix release — STATBUS-145, doc-029);
        # every other (kill/stall) arc rides the WORKING V. Map scenario→lineage
        # and export the chosen pair's B/C refs to $GITHUB_ENV for the run step
        # (the arc reads B_FULL/C_FULL/B_BRANCH/C_BRANCH from the environment).
        # The oom and ceiling lineages export B_FULL/B_BRANCH only — both are
        # single-phase (no C) and neither arc references C_FULL/C_BRANCH
        # (mirrors rollback-kill-arc.sh's own B-only shape). healthpark ALSO
        # exports B_SHORT (postswap-health-park-arc.sh's park-reason regex
        # names the short SHA) — the only lineage that needs it.
        env:
          SCENARIO: ${{ matrix.scenario }}
          WORKING_B_FULL: ${{ needs.construct.outputs.working_b_full }}
          WORKING_C_FULL: ${{ needs.construct.outputs.working_c_full }}
          WORKING_B_BRANCH: ${{ needs.construct.outputs.working_b_branch }}
          WORKING_C_BRANCH: ${{ needs.construct.outputs.working_c_branch }}
          FAILING_B_FULL: ${{ needs.construct.outputs.failing_b_full }}
          FAILING_C_FULL: ${{ needs.construct.outputs.failing_c_full }}
          FAILING_B_BRANCH: ${{ needs.construct.outputs.failing_b_branch }}
          FAILING_C_BRANCH: ${{ needs.construct.outputs.failing_c_branch }}
          OOM_B_FULL: ${{ needs.construct.outputs.oom_b_full }}
          OOM_B_BRANCH: ${{ needs.construct.outputs.oom_b_branch }}
          CEILING_B_FULL: ${{ needs.construct.outputs.ceiling_b_full }}
          CEILING_B_BRANCH: ${{ needs.construct.outputs.ceiling_b_branch }}
          HEALTHPARK_B_FULL: ${{ needs.construct.outputs.healthpark_b_full }}
          HEALTHPARK_C_FULL: ${{ needs.construct.outputs.healthpark_c_full }}
          HEALTHPARK_B_BRANCH: ${{ needs.construct.outputs.healthpark_b_branch }}
          HEALTHPARK_C_BRANCH: ${{ needs.construct.outputs.healthpark_c_branch }}
          HEALTHPARK_B_SHORT: ${{ needs.construct.outputs.healthpark_b_short }}
          CODEONLY_B_FULL: ${{ needs.construct.outputs.codeonly_b_full }}
          CODEONLY_B_BRANCH: ${{ needs.construct.outputs.codeonly_b_branch }}
          CROLLBACK_B_FULL: ${{ needs.construct.outputs.crollback_b_full }}
          CROLLBACK_C_FULL: ${{ needs.construct.outputs.crollback_c_full }}
          CROLLBACK_B_BRANCH: ${{ needs.construct.outputs.crollback_b_branch }}
          CROLLBACK_C_BRANCH: ${{ needs.construct.outputs.crollback_c_branch }}
          CROLLBACK_B_SHORT: ${{ needs.construct.outputs.crollback_b_short }}
        run: |
          set -euo pipefail
          case "$SCENARIO" in
            failing|postswap-rollback-restore-watchdog|restore-broke-reattempt) lineage=failing ;;
            postswap-migration-oom)                     lineage=oom ;;
            postswap-migration-ceiling)                 lineage=ceiling ;;
            postswap-health-park)                        lineage=healthpark ;;
            un-park-to-completion)                       lineage=codeonly ;;
            c-rollback-resurrection)                     lineage=crollback ;;
            cross-version-rename-handoff)               lineage=crossversion ;;
            *)                                          lineage=working ;;
          esac
          echo "Scenario '${SCENARIO}' → fixture lineage '${lineage}'"
          if [ "$lineage" = failing ]; then
            {
              echo "B_FULL=${FAILING_B_FULL}"
              echo "C_FULL=${FAILING_C_FULL}"
              echo "B_BRANCH=${FAILING_B_BRANCH}"
              echo "C_BRANCH=${FAILING_C_BRANCH}"
            } >> "$GITHUB_ENV"
          elif [ "$lineage" = oom ]; then
            {
              echo "B_FULL=${OOM_B_FULL}"
              echo "B_BRANCH=${OOM_B_BRANCH}"
            } >> "$GITHUB_ENV"
          elif [ "$lineage" = ceiling ]; then
            {
              echo "B_FULL=${CEILING_B_FULL}"
              echo "B_BRANCH=${CEILING_B_BRANCH}"
            } >> "$GITHUB_ENV"
          elif [ "$lineage" = healthpark ]; then
            {
              echo "B_FULL=${HEALTHPARK_B_FULL}"
              echo "C_FULL=${HEALTHPARK_C_FULL}"
              echo "B_BRANCH=${HEALTHPARK_B_BRANCH}"
              echo "C_BRANCH=${HEALTHPARK_C_BRANCH}"
              echo "B_SHORT=${HEALTHPARK_B_SHORT}"
            } >> "$GITHUB_ENV"
          elif [ "$lineage" = codeonly ]; then
            # STATBUS-071 arm ii — single-phase (B only, no C). B carries NO
            # migration, so it is at-target at the pre-pull check and PARKS on a
            # resource shortfall (un-park-to-completion-arc.sh declares only
            # BASE_SHA/B_FULL/B_BRANCH; it never references C).
            {
              echo "B_FULL=${CODEONLY_B_FULL}"
              echo "B_BRANCH=${CODEONLY_B_BRANCH}"
            } >> "$GITHUB_ENV"
          elif [ "$lineage" = crollback ]; then
            # STATBUS-071 C-rollback resurrection leg — two-phase. B parks at-target
            # (healthpark's B); C displaces B then FAILS + rolls back onto B. The arc
            # reads B_FULL/C_FULL/B_BRANCH/C_BRANCH and B_SHORT (its park-reason regex
            # names B's short SHA, same as health-park).
            {
              echo "B_FULL=${CROLLBACK_B_FULL}"
              echo "C_FULL=${CROLLBACK_C_FULL}"
              echo "B_BRANCH=${CROLLBACK_B_BRANCH}"
              echo "C_BRANCH=${CROLLBACK_C_BRANCH}"
              echo "B_SHORT=${CROLLBACK_B_SHORT}"
            } >> "$GITHUB_ENV"
          elif [ "$lineage" = crossversion ]; then
            # STATBUS-164 half #2 cross-version arc — the ONLY arc whose base is NOT
            # the run SHA: it pins a FIXED pre-rename release commit (rc.05
            # 730b5001c — an ancestor of the rename commit 0e04a9613, where the source
            # still stamps "post_swap") and targets the run's OWN post-rename commit,
            # so the exit-42 handoff crosses the rename boundary. No construct lineage:
            # both images already exist (A = the rc.05 release image; the target = the
            # run's per-commit build == base_short). Update the pin only if rc.05's
            # image is GC'd (then a newer STILL-pre-rename release).
            {
              echo "PRE_RENAME_BASE_SHA=${PRE_RENAME_BASE_SHA:-730b5001c099a660dc8ce28d9bf8167781704695}"
              echo "TARGET_SHA=${GITHUB_SHA}"
              echo "TARGET_BRANCH=${GITHUB_REF_NAME}"
            } >> "$GITHUB_ENV"
          else
            {
              echo "B_FULL=${WORKING_B_FULL}"
              echo "C_FULL=${WORKING_C_FULL}"
              echo "B_BRANCH=${WORKING_B_BRANCH}"
              echo "C_BRANCH=${WORKING_C_BRANCH}"
            } >> "$GITHUB_ENV"
          fi

      - name: Run the arc on its own Hetzner VM
        # Drives install A(base_sha) → register/schedule B → register/schedule C
        # entirely through the daemon (Albania autonomous; no quiesce, no ./sb
        # install). VM prefix statbus-arc-* is DISJOINT from install-recovery's
        # statbus-recovery-* so neither harness's sweep touches the other's VMs.
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_SSH_KEY: statbus-ci
          # The shared _check_name_safety guard (vm-bootstrap.sh) keys on
          # HCLOUD_NAME_PREFIX (default 'statbus-recovery-') and REFUSES any other
          # VM name — so bootstrap_install_test_vm + cleanup_vm reject our disjoint
          # 'statbus-arc-*' names unless we override it here. Override → the guard,
          # create, and cleanup all accept statbus-arc-* (still disjoint from
          # install-recovery's statbus-recovery-*).
          HCLOUD_NAME_PREFIX: statbus-arc-
          STATBUS_SB_BINARY: ${{ github.workspace }}/sb-linux-amd64
          # Ephemeral arc-signer pubkey → install_statbus_at_sha trusts it so the
          # daemon's verifyCommitSignature accepts the (signed) B/C commits.
          SB_ARC_TRUSTED_SIGNER: ${{ needs.construct.outputs.arc_pubkey }}
          BASE_SHA: ${{ needs.construct.outputs.base_sha }}
          # B_FULL / C_FULL / B_BRANCH / C_BRANCH (and, for healthpark, B_SHORT)
          # are exported to $GITHUB_ENV by the "Resolve fixture lineage" step above
          # (scenario→working|failing|oom|ceiling|healthpark pair).
          V_VERSION: ${{ needs.construct.outputs.v_version }}
          V_VERSION_2: ${{ needs.construct.outputs.v_version_2 }}
          V_VERSION_3: ${{ needs.construct.outputs.v_version_3 }}
          SCENARIO: ${{ matrix.scenario }}
        run: |
          set -euo pipefail
          arc="test/install-recovery/arcs/${SCENARIO}-arc.sh"
          [ -f "$arc" ] || { echo "::error::no arc script for scenario '${SCENARIO}' ($arc)"; exit 1; }
          chmod +x sb-linux-amd64 "$arc"
          # VM name: no run_id — the concurrency group (cancel-in-progress:false)
          # serializes whole runs, and matrix.scenario is unique within a run, so
          # statbus-arc-<scenario> can't collide (mirrors install-recovery's
          # statbus-recovery-<scenario>). Keeps the name well under Hetzner's 63ch.
          "./${arc}" "statbus-arc-${SCENARIO}"

      - name: Upload arc log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-arc-log-${{ matrix.scenario }}-${{ github.run_id }}
          path: |
            tmp/install-recovery-*.log
            tmp/arc-schema-*.sql
          retention-days: 14
          if-no-files-found: ignore

      - name: Reap THIS arc's VM (defense in depth)
        # THE STATBUS-025 TRAP: in a matrix, the per-job reap must delete ONLY this
        # job's OWN VM — a global statbus-arc-* sweep here would murder sibling
        # matrix jobs' LIVE VMs mid-run. The arc script's `trap cleanup_vm` reaps on
        # normal exit; this is the net for when the trap can't fire (cancellation,
        # runner SIGKILL). The cross-job global sweep lives only in `cleanup`.
        # Best-effort, always exit 0 — pass/fail was decided by the arc run.
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SCENARIO: ${{ matrix.scenario }}
        run: |
          vm="statbus-arc-${SCENARIO}"
          if command -v hcloud >/dev/null 2>&1 && hcloud server describe "$vm" >/dev/null 2>&1; then
            echo "Reaping own VM: $vm"
            hcloud server delete "$vm" || true
          else
            echo "$vm already gone (arc trap cleaned up) or hcloud absent — nothing to reap."
          fi
          exit 0

  teardown:
    name: Teardown (delete test/* branches)
    needs: [construct, image-wait, run-arc]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout (for the git push --delete credentials)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Delete the throwaway test/* branches (idempotent, best-effort)
        # Recompute the branch names from the inputs + run_id so teardown deletes
        # them even if construct partially failed (its outputs may be empty). The
        # IMAGES are left to the weekly image-cleanup.yaml GC (Q2): they are
        # commit_short-tagged, content-unique, never release-tagged → harmless
        # short-lived orphans the digest-aware GC reclaims. ALWAYS exits 0 — a
        # missing branch (already deleted / never pushed) must not red the run.
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          # §7 shared-fixture: 4 branches (working + failing) × (migration +
          # fixed-migration), recomputed from run_id so teardown works even if
          # construct partially failed (its outputs may be empty).
          for lineage in working failing; do
            for suffix in migration fixed-migration; do
              br="test/upgrade-arc-${lineage}-${suffix}-${RUN_ID}"
              if git ls-remote --exit-code --heads origin "$br" >/dev/null 2>&1; then
                echo "Deleting $br"
                git push origin --delete "$br" || echo "  (delete failed — best-effort; weekly sweep is the backstop)"
              else
                echo "$br not present (already gone / never pushed) — nothing to delete."
              fi
            done
          done
          exit 0

  cleanup:
    name: Reap orphan arc VMs (final global sweep)
    needs: [discover, run-arc]
    # Runs after every matrix job regardless of outcome (or if the matrix was
    # skipped). The ONLY place the cross-job global statbus-arc-* sweep is safe —
    # no sibling VM is live once all matrix jobs have finished. Catches orphans
    # from any job that died before its own per-job reap.
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Install hcloud + reap any leftover statbus-arc-* VMs
        # ONE fully best-effort step that ALWAYS exits 0 — housekeeping must never
        # fail the workflow conclusion (a failed arc already reds its own run-arc
        # matrix job, which the conclusion ANDs in; this can't MASK that). Scope:
        # only statbus-arc-* — production hosts + install-recovery's
        # statbus-recovery-* are not prefixed that way, so the filter is safe.
        env:
          HCLOUD_CLI_VERSION: "1.64.1"
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set +e
          curl -fsSL \
            "https://github.com/hetznercloud/cli/releases/download/v${HCLOUD_CLI_VERSION}/hcloud-linux-amd64.tar.gz" \
            -o /tmp/hcloud.tar.gz \
            && sudo tar -C /usr/local/bin -xzf /tmp/hcloud.tar.gz hcloud
          if ! command -v hcloud >/dev/null 2>&1; then
            echo "hcloud CLI unavailable — skipping global reap (best-effort)."
            exit 0
          fi
          orphans=$(hcloud server list --output noheader --output columns=name 2>/dev/null \
            | grep '^statbus-arc-' || true)
          if [ -z "$orphans" ]; then
            echo "No orphan arc VMs to reap."
            exit 0
          fi
          echo "Orphan arc VMs found — reaping:"
          echo "$orphans"
          echo "$orphans" | xargs -r -n1 hcloud server delete
          exit 0
