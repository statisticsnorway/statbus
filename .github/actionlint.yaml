# actionlint config — https://github.com/rhysd/actionlint/blob/main/docs/config.md
# Custom self-hosted runner labels, so actionlint does not flag `runs-on:
# [self-hosted, <label>]` as an unknown GitHub-hosted label.
#
# `niue` is the containerized self-hosted runner on niue.statbus.org (STATBUS-069,
# doc-026). Introduced with the first workflow migrated onto it (notify-all-clouds);
# the pg_regress trusted leg and the seq/docker-maintenance/slot-deploy jobs follow.
self-hosted-runner:
  labels:
    - niue
