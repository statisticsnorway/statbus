<!DOCTYPE html>
<!--
  StatBus maintenance/upgrade page
  Served by Caddy as a static file — works when the app is down.

  Features:
  - Multilingual support (en, nb, fr, ru, ar, tr, el)
  - RTL support for Arabic
  - Live upgrade progress log
  - "Check Now" button with countdown
  - Auto-redirect to return URL when healthy
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatBus — Upgrading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.rtl { direction: rtl; }
        .container {
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        .progress {
            background: #1e293b;
            color: #a5f3fc;
            border-radius: 8px;
            padding: 1rem;
            text-align: left;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            display: none;
            margin-bottom: 1.5rem;
        }
        .countdown {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }
        .check-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .check-btn:hover { background: #2563eb; }
        .warning {
            color: #f59e0b;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1 id="headline"></h1>
        <p class="subtitle" id="message"></p>
        <pre class="progress" id="progress"></pre>
        <p class="countdown" id="countdown"></p>
        <p><button class="check-btn" id="checkNowBtn"></button></p>
        <p class="warning" id="warning"></p>
    </div>

    <!-- Administrator contact — generated by ./sb config generate when ADMINISTRATOR_CONTACT is set.
         Absent in development (ADMINISTRATOR_CONTACT empty). Safe to fail silently. -->
    <script src="contact.js" onerror="void 0"></script>
    <script>
        var translations = {
            'en': {
                title: "StatBus is upgrading",
                message: "This should only take a few minutes. The page will refresh automatically.",
                countdown: "Checking again in {0} seconds.",
                checkNow: "Check Now",
                warning: "Upgrade is taking longer than expected. Please contact your administrator.",
                digits: "0123456789"
            },
            'nb': {
                title: "StatBus oppgraderes",
                message: "Dette tar vanligvis bare noen minutter. Siden oppdateres automatisk.",
                countdown: "Sjekker igjen om {0} sekunder.",
                checkNow: "Sjekk Nå",
                warning: "Oppgraderingen tar lengre tid enn forventet. Kontakt administratoren din.",
                digits: "0123456789"
            },
            'fr': {
                title: "StatBus est en cours de mise à jour",
                message: "Cela ne devrait prendre que quelques minutes. La page se rafraîchira automatiquement.",
                countdown: "Vérification dans {0} secondes.",
                checkNow: "Vérifier Maintenant",
                warning: "La mise à jour prend plus de temps que prévu. Veuillez contacter votre administrateur.",
                digits: "0123456789"
            },
            'ru': {
                title: "StatBus обновляется",
                message: "Это займёт всего несколько минут. Страница обновится автоматически.",
                countdown: "Повторная проверка через {0} секунд.",
                checkNow: "Проверить Сейчас",
                warning: "Обновление занимает больше времени, чем ожидалось. Обратитесь к администратору.",
                digits: "0123456789"
            },
            'ar': {
                title: "جاري تحديث StatBus",
                message: "سيستغرق هذا بضع دقائق فقط. سيتم تحديث الصفحة تلقائياً.",
                countdown: "التحقق مرة أخرى في {0} ثوان.",
                checkNow: "تحقق الآن",
                warning: "يستغرق التحديث وقتاً أطول من المتوقع. يرجى الاتصال بالمسؤول.",
                digits: "٠١٢٣٤٥٦٧٨٩"
            },
            'tr': {
                title: "StatBus güncelleniyor",
                message: "Bu sadece birkaç dakika sürecektir. Sayfa otomatik olarak yenilenecektir.",
                countdown: "{0} saniye sonra tekrar kontrol edilecek.",
                checkNow: "Şimdi Kontrol Et",
                warning: "Güncelleme beklenenden uzun sürüyor. Lütfen yöneticinize başvurun.",
                digits: "0123456789"
            },
            'el': {
                title: "Το StatBus αναβαθμίζεται",
                message: "Αυτό θα διαρκέσει μόνο λίγα λεπτά. Η σελίδα θα ανανεωθεί αυτόματα.",
                countdown: "Έλεγχος ξανά σε {0} δευτερόλεπτα.",
                checkNow: "Ελέγξτε Τώρα",
                warning: "Η αναβάθμιση διαρκεί περισσότερο από το αναμενόμενο. Επικοινωνήστε με τον διαχειριστή.",
                digits: "0123456789"
            }
        };

        // Detect language
        var params = new URLSearchParams(window.location.search);
        var userLang = params.get('locale') || navigator.language || 'en';
        var langCode = userLang.toLowerCase().substring(0, 2);
        var t = translations[langCode] || translations['en'];

        // RTL
        if (langCode === 'ar') document.body.classList.add('rtl');

        // Optional administrator contact (set by ./sb config generate from ADMINISTRATOR_CONTACT)
        var adminContact = (typeof window.STATBUS_ADMIN_CONTACT === 'string' && window.STATBUS_ADMIN_CONTACT)
            ? window.STATBUS_ADMIN_CONTACT : '';

        // Apply translations
        document.getElementById('headline').textContent = t.title;
        document.getElementById('message').textContent = t.message;
        document.getElementById('checkNowBtn').textContent = t.checkNow;

        // Digit translation (for Arabic)
        function localizeDigits(n) {
            return n.toString().split('').map(function(d) {
                return t.digits[parseInt(d, 10)];
            }).join('');
        }

        // State
        var progressEl = document.getElementById('progress');
        var countdownEl = document.getElementById('countdown');
        var warningEl = document.getElementById('warning');
        var startTime = Date.now();
        var TEN_MINUTES = 10 * 60 * 1000;
        var checkInterval = 5; // seconds between health checks
        var timer = checkInterval;
        var countdownHandle;

        // Return URL from query parameter
        var returnPath = params.get('return') || '/';

        // Fetch upgrade progress log
        function fetchProgress() {
            fetch('/upgrade-progress.log', { cache: 'no-store' })
                .then(function(resp) { return resp.ok ? resp.text() : ''; })
                .then(function(text) {
                    if (text.trim()) {
                        progressEl.style.display = 'block';
                        progressEl.textContent = text;
                        progressEl.scrollTop = progressEl.scrollHeight;
                    }
                })
                .catch(function() {});
        }

        // Check if services are back.
        // Redirects only when BOTH signals clear: app returns 200 AND no upgrade row
        // is in an active state (scheduled or in_progress). This closes two race windows:
        //   Window A: scheduled_at written, service not yet picked up (~poll-interval lag)
        //   Window B: maintenance file removed but completed_at not yet written (ms gap)
        // If the REST probe is unreachable or returns a non-2xx (e.g. 401 session expired,
        // 503 during migration), we fail safe — stay on maintenance page.
        function checkHealth() {
            var appStatus = '?';
            var upgradeStatus = '?';

            var appProbe = fetch('/', { cache: 'no-store' })
                .then(function(r) { appStatus = r.status; return { ok: r.ok }; })
                .catch(function() { appStatus = 'err'; return { ok: false }; });

            var upgradeProbe = fetch(
                '/rest/upgrade?state=in.(scheduled,in_progress)&select=state&limit=1',
                { cache: 'no-store', credentials: 'include' }
            ).then(function(r) {
                if (!r.ok) { upgradeStatus = 'unknown'; return { unknown: true }; }
                return r.json().then(function(rows) {
                    upgradeStatus = rows.length > 0 ? 'active' : 'idle';
                    return { active: rows.length > 0 };
                });
            }).catch(function() { upgradeStatus = 'unknown'; return { unknown: true }; });

            Promise.all([appProbe, upgradeProbe]).then(function(results) {
                var app = results[0];
                var upgrade = results[1];
                var decision, reason;

                if (upgrade.unknown) {
                    decision = 'stay'; reason = 'upgrade REST probe failed or returned non-2xx';
                } else if (upgrade.active) {
                    decision = 'stay'; reason = 'upgrade row in scheduled/in_progress state';
                } else if (!app.ok) {
                    decision = 'stay'; reason = 'app returned ' + appStatus;
                } else {
                    decision = 'redirect'; reason = 'app=200 and no active upgrade row';
                }

                console.log('[maintenance-check] app=' + appStatus + ' upgrade=' + upgradeStatus +
                    ' decision=' + decision + ' reason=' + reason);

                if (decision === 'redirect') {
                    window.location.replace(decodeURIComponent(returnPath));
                } else {
                    startCountdown();
                }
            });

            if (Date.now() - startTime > TEN_MINUTES) {
                warningEl.textContent = adminContact ? t.warning + ': ' + adminContact : t.warning;
                warningEl.style.display = 'block';
            }
        }

        // Countdown display
        function updateCountdown() {
            countdownEl.innerHTML = t.countdown.replace('{0}',
                '<strong>' + localizeDigits(timer) + '</strong>');
        }

        function startCountdown() {
            timer = checkInterval;
            updateCountdown();
            clearInterval(countdownHandle);
            countdownHandle = setInterval(function() {
                timer--;
                updateCountdown();
                if (timer <= 0) {
                    clearInterval(countdownHandle);
                    checkHealth();
                }
            }, 1000);
        }

        // "Check Now" button
        document.getElementById('checkNowBtn').addEventListener('click', function() {
            clearInterval(countdownHandle);
            checkHealth();
        });

        // Start
        fetchProgress();
        setInterval(fetchProgress, 3000);
        startCountdown();
    </script>
</body>
</html>
