.8594" x="496.89" y="475.3672">The one planned binary-swap restart resumes the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.4976" x="496.89" y="490.6777">same attempt; any other mid-upgrade restart is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.1387" x="496.89" y="505.9883">treated as died &#8594; roll back to the snapshot.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="46" id="ent0006"><path d="M439.82,620.7283 L439.82,707.281 L960.8056,707.281 L960.8056,630.7283 L950.8056,620.7283 L439.82,620.7283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M950.8056,620.7283 L950.8056,630.7283 L960.8056,630.7283 L950.8056,620.7283" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="456.4219" x="445.82" y="638.2966">chk_upgrade_state_attributes enforces the timestamp columns per state</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="444.3292" x="445.82" y="653.6072">(e.g. completed &#8658; completed_at NOT NULL, error NULL; rolled_back &#8658;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="499.9856" x="445.82" y="668.9177">rolled_back_at + error NOT NULL; failed &#8658; error NOT NULL, no rolled_back_at).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="378.0474" x="445.82" y="684.2283">rolled_back = snapshot restored, healthy at the old version.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="339.6504" x="445.82" y="699.5388">failed = restore also failed, needs hands-on recovery.</text></g><!--link *start* to available--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="17" id="lnk4"><path d="M906.31,63.8583 C906.31,80.5883 906.31,110.0783 906.31,134.1083" fill="none" id="*start*-to-available" style="stroke:#1565C0;stroke-width:1;"/><polygon fill="#1565C0" points="906.31,140.1083,910.31,131.1083,906.31,135.1083,902.31,131.1083,906.31,140.1083" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.6318" x="907.31" y="107.0566">service poll discovers a release</text></g><!--link available to scheduled--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="19" id="lnk6"><path d="M866.36,168.3583 C827.98,172.3583 771.11,184.4683 738.31,220.4883 C723.18,237.0983 719.3741,256.9921 718.6941,276.0321" fill="none" id="available-to-scheduled" style="stroke:#1565C0;stroke-width:1;"/><polygon fill="#1565C0" points="718.48,282.0283,722.7987,273.1768,718.6585,277.0315,714.8038,272.8912,718.48,282.0283" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.2197" x="739.31" y="234.0566">operator/CI schedules</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113.8706" x="752.4846" y="249.3672">(scheduled_at set)</text></g><!--link available to skipped--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="20" id="lnk8"><path d="M946.1,185.1183 C983.8,204.6083 1039.68,238.4783 1074.31,282.4883 C1092.98,306.1983 1102.3082,333.8041 1107.8782,356.3041" fill="none" id="available-to-skipped" style="stroke:#1565C0;stroke-width:1;"/><polygon fill="#1565C0" points="1109.32,362.1283,1111.0401,352.4308,1108.1185,357.2748,1103.2745,354.3532,1109.32,362.1283" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="90.981" x