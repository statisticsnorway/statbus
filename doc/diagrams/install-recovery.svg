ing" textLength="325.0898" x="1477.0625" y="687.9082">Prerequisites -&gt; Repository -&gt; Binary -&gt; Configuration</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="194.0039" x="1477.0625" y="702.041">-&gt; Credentials -&gt; Generated env</text><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="61.5723" x="1608.8213" y="734.5723"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="41.5723" x="1618.8213" y="756.1738">Images</text><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="66.6875" x="1606.2637" y="788.7051"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="46.6875" x="1616.2637" y="810.3066">Services</text><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="336.207" x="1471.5039" y="842.8379"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="316.207" x="1481.5039" y="864.4395">Backup ownership (heal pre-upgrade-* dir ownership)</text><path d="M1849.291,886.9707 L1849.291,964.5234 L1829.291,968.5234 L1849.291,972.5234 L1849.291,1050.0762 A0,0 0 0 0 1849.291,1050.0762 L2456.5098,1050.0762 A0,0 0 0 0 2456.5098,1050.0762 L2456.5098,896.9707 L2446.5098,886.9707 L1849.291,886.9707 A0,0 0 0 0 1849.291,886.9707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2446.5098,886.9707 L2446.5098,896.9707 L2456.5098,896.9707 L2446.5098,886.9707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="483.8755" x="1855.291" y="904.5391">The install-recovery LOCUS. Real, production-sourced failures handled here:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.2871" x="1855.291" y="919.8496">&#8226;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="426.48" x="1866.6914" y="919.8496">scenario 03 &#8212; orphan-migrate-subprocess-cleaned-on-install</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.5327" x="2293.1714" y="919.8496">: a killed migrate</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="389.416" x="1863.5176" y="935.1602">subprocess orphans a psql backend -&gt; Phase 1 terminates it.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.2871" x="1855.291" y="950.4707">&#8226;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="406.7197" x="1866.6914" y="950.4707">scenario 06 &#8212; advisory-lock-zombie-terminated-on-install</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.0986" x="2273.4111" y="950.4707">: a dead-PID zombie holds</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="522.1138" x="1863.5176" y="965.7813">the migrate_up advisory lock with application_name='' (rune PID 9962) -&gt; Phase 2</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.978" x="1863.5176" y="981.0918">PID-liveness probe + empty-app catch-all.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.2871" x="1855.291" y="996.4023">&#8226;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="370.7603" x="1866.6914" y="996.4023">scenario 07 &#8212; install-tolerates-busy-worker-sessions</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.1689" x="2237.4517" y="996.4023">: a live worker legitimately</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="443.5679" x="1863.5176" y="1011.7129">holds advisory locks -&gt; excluded from the holder count, no false-fail.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.2871" x="1855.291" y="1027.0234">&#8226;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="409.0493" x="1866.6914" y="1027.0234">scenario 09 &#8212; install-fixup-session-check-parses-correctly</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.2349" x="2275.7407" y="1027.0234">: checkSessionsClean's</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="437.6011" x="1863.5176" y="1042.334">bool::text parse ('t' vs 'true') -&gt; the install-fixup session step passes.</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="379.3672" x="1449.9238" y="944.3906"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="114.8848" x="1459.9238" y="965.9922">Database sessions</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="359.3672" x="1459.9238" y="980.125">checkSessionsClean ? : cleanOrphanSessions &#8212; install.go:561</text><path d="M1815.3271,1116.2109 L1815.3271,1147.832 L1795.3271,1151.832 L1815.3271,1155.832 L1815.3271,1187.4531 A0,0 0 0 0 1815.3271,1187.4531 L2298.1445,1187.4531 A0,0 0 0 0 2298.1445,1187.4531 L2298.1445,1126.2109 L2288.1445,1116.2109 L1815.3271,1116.2109 A0,0 0 0 0 1815.3271,1116.2109" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2288.1445,1116.2109 L2288.1445,1126.2109 L2298.1445,1126.2109 L2288.1445,1116.2109" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="346.7788" x="1821.3271" y="1133.7793">scenario 13 &#8212; migration-vs-worker-lock-bounded</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.0386" x="2168.106" y="1133.7793">: a worker holding</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="432.4595" x="1821.3271" y="1149.0898">AccessShareLock on a stats-history table would park the migration's</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="441.9365" x="1821.3271" y="1164.4004">AccessExclusiveLock indefinitely; quiescing the clients before the DDL</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.0034" x="1821.3271" y="1179.7109">window keeps the upgrade bounded (no hang).</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="311.4395" x="1483.8877" y="1127.6992"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="130.6758" x="1493.8877" y="1149.3008">[DDL] QuiesceClients</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="156.9668" x="1628.3604" y="1149.3008">&#8212; stop worker / app / rest</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="88.1016" x="1493.8877" y="1163.4336">(install.go:614)</text><path d="M1831.6191,1210.6865 L1831.6191,1234.6523 L1811.6191,1238.6523 L1831.6191,1242.6523 L1831.6191,1266.6182 A0,0 0 0 0 1831.6191,1266.6182 L2362.9199,1266.6182 A0,0 0 0 0 2362.9199,1266.6182 L2362.9199,1220.6865 L2352.9199,1210.6865 L1831.6191,1210.6865 A0,0 0 0 0 1831.6191,1210.6865" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2352.9199,1210.6865 L2352.9199,1220.6865 L2362.9199,1220.6865 L2352.9199,1210.6865" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="361.6641" x="1837.6191" y="1228.2549">scenario 10 &#8212; seed-restore-gated-off-populated-db</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.5005" x="2203.3965" y="1228.2549">(DATA-LOSS GRADE):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="510.3008" x="1837.6191" y="1243.5654">the gate MUST classify DB content and route a populated DB to migrate-forward,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.7456" x="1837.6191" y="1258.876">never to the destructive seed restore.</text><rect fill="#E3F2FD" height="62.3984" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="344.0234" x="1467.5957" y="1207.4531"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="28.8691" x="1477.5957" y="1229.0547">Seed</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="323.4023" x="1477.5957" y="1243.1875">checkSeedRestored ? : runSeedRestore &#8212; install.go:562</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="324.0234" x="1477.5957" y="1257.3203">GATE: populated DB =&gt; SKIP (never overwrite real data)</text><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="279.3301" x="1499.9424" y="1289.8516"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="66.3164" x="1509.9424" y="1311.4531">Migrations</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="189.2168" x="1580.0557" y="1311.4531">&#8212; runMigrations (install.go:563)</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="355.5313" x="1461.8418" y="1343.9844"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="130.418" x="1471.8418" y="1365.5859">[DDL] ResumeClients</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="201.3164" x="1606.0566" y="1365.5859">&#8212; restart exactly what we stopped</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="88.1016" x="1471.8418" y="1379.7188">(install.go:595)</text><polygon fill="#ECEFF1" points="1539.168,1070.0762,1740.0469,1070.0762,1752.0469,1082.0762,1740.0469,1094.0762,1539.168,1094.0762,1527.168,1082.0762,1539.168,1070.0762" style="stroke:#90A4AE;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="1643.6074" y="1104.7109">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="200.8789" x="1539.168" y="1086.2334">need Seed or Migrations? (check fails)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="90.1592" x="1752.0469" y="1079.7559">already migrated</text><polygon fill="#ECEFF1" points="1639.6074,1412.25,1651.6074,1424.25,1639.6074,1436.25,1627.6074,1424.25,1639.6074,1412.25" style="stroke:#90A4AE;stroke-width:0.5;"/><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="251.5273" x="1513.8438" y="1456.25"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="231.5273" x="1523.8438" y="1477.8516">JWT secret -&gt; Users -&gt; Trusted signers</text><path d="M1829.6533,1500.3828 L1829.6533,1539.6592 L1809.6533,1543.6592 L1829.6533,1547.6592 L1829.6533,1586.9355 A0,0 0 0 0 1829.6533,1586.9355 L2392.5908,1586.9355 A0,0 0 0 0 2392.5908,1586.9355 L2392.5908,1510.3828 L2382.5908,1500.3828 L1829.6533,1500.3828 A0,0 0 0 0 1829.6533,1500.3828" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2382.5908,1500.3828 L2382.5908,1510.3828 L2392.5908,1510.3828 L2382.5908,1500.3828" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.2871" x="1835.6533" y="1517.9512">&#8226;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="353.7866" x="1847.0537" y="1517.9512">scenario 05 &#8212; systemd-failed-unit-reset-on-install</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.689" x="2200.8403" y="1517.9512">: the unit is in `failed`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="467.8667" x="1843.8799" y="1533.2617">state (StartLimit trip) -&gt; `systemctl --user reset-failed` + enable + start.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.2871" x="1835.6533" y="1548.5723">&#8226;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="372.9756" x="1847.0537" y="1548.5723">scenario 28 &#8212; drifted-unit-reconciled-on-healthy-box</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.5615" x="2220.0293" y="1548.5723">: the on-disk unit drifted</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="469.479" x="1843.8799" y="1563.8828">from the repo template on a healthy (active) box -&gt; rewrite from template<