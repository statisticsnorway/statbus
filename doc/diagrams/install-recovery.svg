textLength="562.2695" x="2319.353" y="638.7197">step-table &#8212; install.go:536 (each step: check ? OK : run; idempotent, re-runnable)</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="345.0898" x="2343.4917" y="660.6729"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="325.0898" x="2353.4917" y="682.2744">Prerequisites -&gt; Repository -&gt; Binary -&gt; Configuration</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="194.0039" x="2353.4917" y="696.4072">-&gt; Credentials -&gt; Generated env</text><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="61.5723" x="2485.2505" y="728.9385"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="41.5723" x="2495.2505" y="750.54">Images</text><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="66.6875" x="2482.6929" y="783.0713"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="46.6875" x="2492.6929" y="804.6729">Services</text><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="336.207" x="2347.9331" y="837.2041"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="316.207" x="2357.9331" y="858.8057">Backup ownership (heal pre-upgrade-* dir ownership)</text><path d="M2725.7202,881.3369 L2725.7202,958.8896 L2705.7202,962.8896 L2725.7202,966.8896 L2725.7202,1044.4424 A0,0 0 0 0 2725.7202,1044.4424 L3307.0278,1044.4424 A0,0 0 0 0 3307.0278,1044.4424 L3307.0278,891.3369 L3297.0278,881.3369 L2725.7202,881.3369 A0,0 0 0 0 2725.7202,881.3369" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M3297.0278,881.3369 L3297.0278,891.3369 L3307.0278,891.3369 L3297.0278,881.3369" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="519.2764" x="2731.7202" y="898.9053">TEST COVERAGE &#8212; the install-recovery LOCUS (real, production-sourced failures):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="560.3076" x="2731.7202" y="914.2158">TEST orphan-migrate-subprocess-cleaned-on-install (03): a killed migrate subprocess's</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="301.0947" x="2739.9468" y="929.5264">orphaned psql backend is terminated (Phase 1).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="555.1533" x="2731.7202" y="944.8369">TEST advisory-lock-zombie-terminated-on-install (06): a dead-PID zombie holding the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="510.5737" x="2739.9468" y="960.1475">migrate_up advisory lock with application_name='' (rune PID 9962) is terminated</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.1572" x="2739.9468" y="975.458">(Phase 2 PID-liveness + empty-app catch-all).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="531.7051" x="2731.7202" y="990.7686">TEST install-tolerates-busy-worker-sessions (07): a live worker legitimately holding</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="410.3633" x="2739.9468" y="1006.0791">advisory locks is excluded from the holder count &#8212; no false-fail.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="559.3491" x="2731.7202" y="1021.3896">TEST install-fixup-session-check-parses-correctly (09): checkSessionsClean's bool::text</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="435.938" x="2739.9468" y="1036.7002">parse ('t' vs 'true') is correct, so the install-fixup session step passes.</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="379.3672" x="2326.353" y="938.7568"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="114.8848" x="2336.353" y="960.3584">Database sessions</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="359.3672" x="2336.353" y="974.4912">checkSessionsClean ? : cleanOrphanSessions &#8212; install.go:561</text><path d="M2691.7563,1112.9199 L2691.7563,1136.8857 L2671.7563,1140.8857 L2691.7563,1144.8857 L2691.7563,1168.8516 A0,0 0 0 0 2691.7563,1168.8516 L3263.752,1168.8516 A0,0 0 0 0 3263.752,1168.8516 L3263.752,1122.9199 L3253.752,1112.9199 L2691.7563,1112.9199 A0,0 0 0 0 2691.7563,1112.9199" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M3253.752,1112.9199 L3253.752,1122.9199 L3263.752,1122.9199 L3253.752,1112.9199" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="550.9956" x="2697.7563" y="1130.4883">TEST migration-vs-worker-lock-bounded (13): a worker holding AccessShareLock on a</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="502.5439" x="2697.7563" y="1145.7988">stats-history table would park the migration's AccessExclusiveLock indefinitely;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="538.4272" x="2697.7563" y="1161.1094">quiescing the clients before the DDL window keeps the upgrade BOUNDED (no hang).</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="311.4395" x="2360.3169" y="1116.7529"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="130.6758" x="2370.3169" y="1138.3545">[DDL] QuiesceClients</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="156.9668" x="2504.7896" y="1138.3545">&#8212; stop worker / app / rest</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="88.1016" x="2370.3169" y="1152.4873">(install.go:614)</text><path d="M2708.0483,1192.085 L2708.0483,1216.0508 L2688.0483,1220.0508 L2708.0483,1224.0508 L2708.0483,1248.0166 A0,0 0 0 0 2708.0483,1248.0166 L3279.8853,1248.0166 A0,0 0 0 0 3279.8853,1248.0166 L3279.8853,1202.085 L3269.8853,1192.085 L2708.0483,1192.085 A0,0 0 0 0 2708.0483,1192.085" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M3269.8853,1192.085 L3269.8853,1202.085 L3279.8853,1202.085 L3269.8853,1192.085" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="550.8369" x="2714.0483" y="1209.6533">TEST seed-restore-gated-off-populated-db (10) &#8212; DATA-LOSS GRADE: the gate MUST</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="494.9331" x="2714.0483" y="1224.9639">classify DB content and route a populated DB to migrate-forward, never to the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.7842" x="2714.0483" y="1240.2744">destructive seed restore.</text><rect fill="#E3F2FD" height="62.3984" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="344.0234" x="2344.0249" y="1188.8516"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="28.8691" x="2354.0249" y="1210.4531">Seed</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="323.4023" x="2354.0249" y="1224.5859">checkSeedRestored ? : runSeedRestore &#8212; install.go:562</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="324.0234" x="2354.0249" y="1238.7188">GATE: populated DB =&gt; SKIP (never overwrite real data)</text><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="279.3301" x="2376.3716" y="1271.25"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="66.3164" x="2386.3716" y="1292.8516">Migrations</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="189.2168" x="2456.4849" y="1292.8516">&#8212; runMigrations (install.go:563)</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="355.5313" x="2338.271" y="1325.3828"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="130.418" x="2348.271" y="1346.9844">[DDL] ResumeClients</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="201.3164" x="2482.4858" y="1346.9844">&#8212; restart exactly what we stopped</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="88.1016" x="2348.271" y="1361.1172">(install.go:595)</text><polygon fill="#ECEFF1" points="2415.5972,1064.4424,2616.4761,1064.4424,2628.4761,1076.4424,2616.4761,1088.4424,2415.5972,1088.4424,2403.5972,1076.4424,2415.5972,1064.4424" style="stroke:#90A4AE;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="2520.0366" y="1099.0771">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="200.8789" x="2415.5972" y="1080.5996">need Seed or Migrations? (check fails)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="90.1592" x="2628.4761" y="1074.1221">already migrated</text><polygon fill="#ECEFF1" points="2516.0366,1393.6484,2528.0366,1405.6484,2516.0366,1417.6484,2504.0366,1405.6484,2516.0366,1393.6484" style="stroke:#90A4AE;stroke-width:0.5;"/><rect fill="#E3F2FD" height="34.1328" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="251.5273" x="2390.2729" y="1437.6484"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="231.5273" x="2400.2729" y="1459.25">JWT secret -&gt; Users -&gt; Trusted signers</text><path d="M2706.0825,1481.7813 L2706.0825,1521.0576 L2686.0825,1525.0576 L2706.0825,1529.0576 L2706.0825,1568.334 A0,0 0 0 0 2706.0825,1568.334 L3290.5195,1568.334 A0,0 0 0 0 3290.5195,1568.334 L3290.5195,1491.7813 L3280.5195,1481.7813 L2706.0825,1481.7813 A0,0 0 0 0 2706.0825,1481.7813" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M3280.5195,1481.7813 L3280.5195,1491.7813 L3290.5195,1491.7813 L3280.5195,1481.7813" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="517.7974" x="2712.0825" y="1499.3496">TEST systemd-failed-unit-reset-on-install (05): a unit in `failed` state (StartLimit</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="444.3105" x="2720.3091" y="1514.6602">trip) is recovered via `systemctl --user reset-failed` + enable + start.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="563.437" x="2712.0825" y="1529.9707">TEST drifted-unit-reconciled-on-healthy-box (28): an on-disk unit drifted from the repo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="529.2549" x="2720.3091" y="1545.2813">template on a healt