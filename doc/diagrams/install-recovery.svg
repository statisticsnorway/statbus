able?</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="167.293" x="1786.3264" y="408.6211"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="124.207" x="1796.3264" y="430.2227">StateDBUnreachable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="147.293" x="1796.3264" y="444.3555">step-table starts services</text><polygon fill="#ECEFF1" points="2038.7322,352.4863,2170.7214,352.4863,2182.7214,364.4863,2170.7214,376.4863,2038.7322,376.4863,2026.7322,364.4863,2038.7322,352.4863" style="stroke:#90A4AE;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="2108.7268" y="387.1211">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="131.9893" x="2038.7322" y="368.6436">no public.upgrade table?</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="262.2148" x="1973.6194" y="408.6211"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="176.332" x="1983.6194" y="430.2227">StateLegacyNoUpgradeTable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="62.0859" x="2163.7483" y="430.2227">-&gt; REFUSE</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="141.832" x="1983.6194" y="444.3555">(pre-1.0, tracked #65.6)</text><ellipse cx="2104.7268" cy="502.8867" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="2104.7268" cy="502.8867" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#ECEFF1" points="2351.0762,352.4863,2476.8188,352.4863,2488.8188,364.4863,2476.8188,376.4863,2351.0762,376.4863,2339.0762