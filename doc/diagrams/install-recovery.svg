A4AE;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="4152.3337" y="374.1533">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="125.7427" x="4085.4624" y="355.6758">scheduled row present?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="99.0483" x="4223.2051" y="349.1982">nothing scheduled</text><path d="M4326.447,395.6533 L4326.447,434.9297 L4306.447,438.9297 L4326.447,442.9297 L4326.447,482.2061 A0,0 0 0 0 4326.447,482.2061 L4834.9724,482.2061 A0,0 0 0 0 4834.9724,482.2061 L4834.9724,405.6533 L4824.9724,395.6533 L4326.447,395.6533 A0,0 0 0 0 4326.447,395.6533" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4824.9724,395.6533 L4824.9724,405.6533 L4834.9724,405.6533 L4824.9724,395.6533" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.1172" x="4332.447" y="413.2217">Hands off to the UPGRADE pipeline &#8212; see the</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="118.1426" x="4623.6775" y="413.2217">upgrade-timeline</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="55.9736" x="4745.9333" y="413.2217">diagram,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="458.7959" x="4332.447" y="428.5322">&#167; Execute upgrade (pre-swap). Install does NOT run the step-table here;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.5024" x="4332.447" y="443.8428">executeUpgrade writes its own service-held flag.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="487.5254" x="4332.447" y="459.1