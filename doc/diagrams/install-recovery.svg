" font-size="13" lengthAdjust="spacing" textLength="456.5488" x="1819.5137" y="220.6348">max_connections saturated: host-side psql fails with "too many clients";</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="457.1899" x="1819.5137" y="235.9453">the docker-exec superuser path still terminates the orphan backends so</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="370.0303" x="1819.5137" y="251.2559">Detect can run. (cleanOrphanSessions, install.go:293-301)</text><rect fill="#E3F2FD" height="48.2656" rx="12.5" ry="12.5" style="stroke:#1565C0;stroke-width:0.5;" width="307.8125" x="1485.7012" y="199.2441"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="276.8613" x="1495.7012" y="220.8457">cleanOrphanSessions &#8212; pre-detect, best-effort</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="287.8125" x="1495.7012" y="234.9785">(docker-exec peer-auth bypass) &#8212; install.go:293</text><polygon fill="#ECEFF1" points="1522.8318,141.6211,1756.3831,141.6211,1768.3831,153.6211,1756.3831,165.6211,1522.8318,165.6211,1510.8318,153.6211,1522.8318,141.6211" style="stroke:#90A4AE;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="1643.6074" y="176.2559">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="233.5513" x="1522.8318" y="157.7783">services up AND connection pool not clean?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="67.6812" x="1768.3831" y="151.3008">clean / fresh</text><polygon fill="#ECEFF1" points="1639.6074,278.998,1651.6074,290.998,1639.6074,302.998,1627.6074,290.998,1639.6074,278.998" style="stroke:#90A4AE;stroke-width:0.5;"/><rect fill="none" height="306.8203" style="strok