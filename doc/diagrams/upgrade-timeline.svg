y-1="part3" data-entity-2="part4" id="msg9"><polygon fill="#1565C0" points="1008.4585,591.7441,1018.4585,595.7441,1008.4585,599.7441,1012.4585,595.7441" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="581.8511" x2="1014.4585" y1="595.7441" y2="595.7441"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.189" x="588.8511" y="591.002">claim row WHERE state='scheduled' &#8594; in_progress</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1149.6206" x="0" y="624.3994"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1149.6206" y1="624.3994" y2="624.3994"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1149.6206" y1="627.3994" y2="627.3994"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="427.0229" x="361.2988" y="613.7441"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="408.7383" x="367.2988" y="630.3125">Execute upgrade (pre-swap &#8212; mutex held, Holder="service")</text><path d="M480.3862,654.0547 L590.6528,654.0547 L590.6528,661.3652 L580.6528,671.3652 L480.3862,671.3652 L480.3862,654.0547" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="232.1738" style="stroke:#90A4AE;stroke-width:1.5;" width="649.2344" x="480.3862" y="654.0547"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="65.2666" x="495.3862" y="667.623">pre-swap</text><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg10"><line style="stroke:#1565C0;stroke-width:1;" x1="581.8511" x2="623.8511" y1="692.6758" y2="692.6758"/><line style="stroke:#1565C0;stroke-width:1;" x1="623.8511" x2="623.8511" y1="692.6758" y2="705.6758"/><line style="stroke:#1565C0;stroke-width:1;" x1="582.8511" x2="623.8511" y1="705.6758" y2="705.6758"/><polygon fill="#1565C