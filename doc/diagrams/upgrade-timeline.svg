l="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="99.3945" x="146.4326" y="79.5117">systemd (user)</text></g><g class="participant participant-tail" data-entity-uid="part2" data-qualified-name="systemd" id="part2-tail"><rect fill="#E3F2FD" height="30.4883" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="113.3945" x="139.4326" y="3243.1035"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="99.3945" x="146.4326" y="3263.6387">systemd (user)</text></g><g class="participant participant-head" data-entity-uid="part3" data-qualified-name="service" id="part3-head"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="182.9297" x="664.9214" y="42.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="109.0742" x="701.8491" y="63.0234">Upgrade Service</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.9297" x="671.9214" y="79.5117">statbus-upgrade@$USER</text></g><g class="participant participant-tail" data-entity-uid="part3" data-qualified-name="service" id="part3-tail"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="182.9297" x="664.9214" y="3243.1035"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="109.0742" x="701.8491" y="3263.6387">Upgrade Service</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.9297" x="671.9214" y="3280.127">statbus-upgrade@$USER</text></g><g class="participant participant-head" data-entity-uid="part4" data-qualified-name="db" id="part4-head"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="198.3242" x="1435.5034" y="42.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.8496" x="1496.2407" y="63.0234">PostgreSQL</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="184.3242" x="1442.5034" y="79.5117">public.upgrade + snapshot</text></g><g class="participant participant-tail" data-entity-uid="part4" data-qualified-name="db" id="part4-tail"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="198.3242" x="1435.5034" y="3243.1035"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.8496" x="1496.2407" y="3263.6387">PostgreSQL</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="184.3242" x="1442.5034" y="3280.127">public.upgrade + snapshot</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1663.8276" x="0" y="121.1201"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="121.1201" y2="121.1201"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="124.1201" y2="124.1201"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="421.583" x="621.1223" y="110.4648"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="403.2983" x="627.1223" y="127.0332">Fresh install &#8212; seed restore (first boot, before any upgrade)</text><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg1"><polygon fill="#1565C0" points="1522.6655,176.3965,1532.6655,180.3965,1522.6655,184.3965,1526.6655,180.3965" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="77.2163" x2="1528.6655" y1="180.3965" y2="180.3965"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.8418" x="84.2163" y="160.3438">./sb install (StateFresh) &#8212; Seed step:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="571.4541" x="84.2163" y="175.6543">./sb db seed fetch (pull statbus-seed:&lt;commit_short&gt;) + pg_restore --single-transaction</text></g><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg2"><polygon fill="#1565C0" points="1522.6655,205.707,1532.6655,209.707,1522.6655,213.707,1526.6655,209.707" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="77.2163" x2="1528.6655" y1="209.707" y2="209.707"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="413.042" x="84.2163" y="204.9648">./sb migrate up &#8212; apply only the migrations newer than the seed</text></g><path d="M5,222.707 L5,277.707 L1608,277.707 L1608,232.707 L1598,222.707 L5,222.707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1598,222.707 L1598,232.707 L1608,232.707 L1598,222.707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="493.3081" x="541.5918" y="240.2754">Fresh DB only: checkSeedRestored gates the Seed step OFF when the DB holds</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.644" x="541.5918" y="255.5859">user data or applied migrations &#8212; a seed restore never overwrites a populated DB.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="494.6602" x="541.5918" y="270.8965">Seed CREATION is a CI/dev activity &#8212; see DEVELOPMENT.md &#167; Database seed.</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1663.8276" x="0" y="304.2939"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="304.2939" y2="304.2939"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="307.2939" y2="307.2939"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="100.4868" x="781.6704" y="293.6387"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="82.2021" x="787.6704" y="310.207">Service boot</text><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg3"><polygon fill="#1565C0" points="744.3862,344.2598,754.3862,348.2598,744.3862,352.2598,748.3862,348.2598" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="196.1299" x2="750.3862" y1="348.2598" y2="348.2598"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="431.5264" x="203.1299" y="343.5176">start statbus-upgrade@$USER.service (Type=notify, Restart=always)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg4"><polygon fill="#1565C0" points="1522.6655,388.8809,1532.6655,392.8809,1522.6655,396.8809,1526.6655,392.8809" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="392.8809" y2="392.8809"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="253.3413" x="763.3862" y="372.8281">advisory lock + LISTEN upgrade channel</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.4814" x="763.3862" y="388.1387">(cheap, bounded init)</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg5"><polygon fill="#1565C0" points="207.1299,433.502,197.1299,437.502,207.1299,441.502,203.1299,437.502" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="201.1299" x2="755.3862" y1="437.502" y2="437.502"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.2939" x="213.1299" y="417.4492">sd_notify READY=1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="536.2563" x="213.1299" y="432.7598">(emitted here &#8212; heavy recovery below runs in the ACTIVE phase under WatchdogSec)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg6"><polygon fill="#1565C0" points="1522.6655,462.8125,1532.6655,466.8125,1522.6655,470.8125,1526.6655,466.8125" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="466.8125" y2="466.8125"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="405.6152" x="763.3862" y="462.0703">boot migrate up &#8212; bring schema to HEAD (schema-skew guard)</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg7"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="496.123" y2="496.123"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="496.123" y2="509.123"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="509.123" y2="509.123"/><polygon fill="#1565C0" points="767.3862,505.123,757.3862,509.123,767.3862,513.123,763.3862,509.123" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="388.0322" x="763.3862" y="491.3809">recoverFromFlag &#8212; reconcile a flag left on disk (flag-DRIVEN)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg8"><polygon fill="#1565C0" points="1522.6655,549.7441,1532.6655,553.7441,1522.6655,557.7441,1526.6655,553.7441" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="553.7441" y2="553.7441"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="462.6426" x="763.3862" y="533.6914">completeInProgressUpgrade &#8212; reconcile an in_progress row with NO flag</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="399.7119" x="763.3862" y="549.002">(flag-INDEPENDENT belt; the SOLE recovery for a pre-flight kill)</text></g><path d="M663,566.7441 L663,637.7441 L1626,637.7441 L1626,576.7441 L1616,566.7441 L663,566.7441" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1616,566.7441 L1616,576.7441 L1626,576.7441 L1616,566.7441" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="536.834" x="845.687" y="584.3125">Two-layer boot recovery. recoverFromFlag handles a kill AFTER the flag exists (Phase</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="580.0234" x="845.687" y="599.623">ladder: PreSwap / PostSwap / Resuming). completeInProgressUpgrade handles a kill BEFORE</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="589.5322" x="845.687" y="614.9336">the flag exists &#8212; the claim -&gt; writeUpgradeFlag window (see &#167; Execute upgrade (pre-swap)).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="507.876" x="845.687" y="630.2441">It rolls such an orphan to a named terminal state via verifyUpgradeGroundTruth.</text><path d="M120,647.9863 L120,764.9863 L1609,764.9863 L1609,657.9863 L1599,647.9863 L120,647.9863" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M1599,647.9863 L1599,657.9863 L1609,657.9863 L1599,647.9863" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.1118" x="571.5188" y="665.5547">TEST COVERAGE &#8212; boot</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="577.3574" x="571.5188" y="680.8652">TEST startup-exceeds-timeoutstartsec (18): startup past TimeoutStartSec stays bounded &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="522.3359" x="579.7454" y="696.1758">heavy work runs post-READY=1 under WatchdogSec, never the static start budget.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="575.0278" x="571.5188" y="711.4863">TEST advisory-lock-before-db-ready (25): an advisory-lock attempt before the DB is ready</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="389.5557" x="579.7454" y="726.7969">exits 42 and systemd restarts cleanly &#8212; no start-loop wedge.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="529.312" x="571.5188" y="742.1074">NO TEST (gap): the belt rolling a flagless in_progress row to terminal is unproven &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="397.4395" x="579.7454" y="757.418">see the preflight-kill gap under &#167; Execute upgrade (pre-swap).</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1663.8276" x="0" y="790.8154"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="790.8154" y2="790.8154"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="793.8154" y2="793.8154"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="153.8643" x="754.9817" y="780.1602"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="135.5796" x="760.9817" y="796.7285">Schedule + dispatch</text><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg9"><polygon fill="#1565C0" points="1522.6655,846.0918,1532.6655,850.0918,1522.6655,854.0918,1526.6655,850.0918" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="77.2163" x2="1528.6655" y1="850.0918" y2="850.0918"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.5054" x="84.2163" y="830.0391">./sb upgrade apply-latest &#8594;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.6675" x="84.2163" y="845.3496">UPDATE state='scheduled' + NOTIFY</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg10"><polygon fill="#1565C0" points="767.3862,875.4023,757.3862,879.4023,767.3862,883.4023,763.3862,879.4023" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="761.3862" x2="1533.6655" y1="879.4023" y2="879.4023"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.7915" x="773.3862" y="874.6602">NOTIFY wakes the listener</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg11"><polygon fill="#1565C0" points="1522.6655,920.0234,1532.6655,924.0234,1522.6655,928.0234,1526.6655,924.0234" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="924.0234" y2="924.0234"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.189" x="763.3862" y="903.9707">claim row WHERE state='scheduled' &#8594; in_progress</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6587" x="763.3862" y="919.2813">(started_at set, error=NULL &#8212; NO flag on disk yet)</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1663.8276" x="0" y="952.6787"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="952.6787" y2="952.6787"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="955.6787" y2="955.6787"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="208.7144" x="727.5566" y="942.0234"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="190.4297" x="733.5566" y="958.5918">Execute upgrade (pre-swap)</text><path d="M654.9214,982.334 L1142.1118,982.334 L1142.1118,989.6445 L1132.1118,999.6445 L654.9214,999.6445 L654.9214,982.334" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="46.6211" style="stroke:#90A4AE;stroke-width:1.5;" width="988.9063" x="654.9214" y="982.334"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="442.1904" x="669.9214" y="995.9023">pre-flight &#8212; NO flag on disk yet (row is in_progress, error=NULL)</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg12"><polygon fill="#1565C0" points="1522.6655,1016.9551,1532.6655,1020.9551,1522.6655,1024.9551,1526.6655,1020.9551" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="1020.9551" y2="1020.9551"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="439.0039" x="763.3862" y="1016.2129">pre-flight checks &#8212; downgrade guard, release assets, disk, signature</text></g><path d="M663,1040.9551 L663,1111.9551 L1626,1111.9551 L1626,1050.9551 L1616,1040.9551 L663,1040.9551" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1616,1040.9551 L1616,1050.9551 L1626,1050.9551 L1616,1040.9551" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="564.7637" x="856.3733" y="1058.5234">Flag-absent window &#8212; spans the claim above through pre-flight, until writeUpgradeFlag.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="558.7144" x="856.3733" y="1073.834">A kill HERE leaves the row in_progress | error=NULL with NO flag: recoverFromFlag finds</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="568.1597" x="856.3733" y="1089.1445">nothing to reconcile, so completeInProgressUpgrade (&#167; Service boot) is the ONLY recovery</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="388.2544" x="856.3733" y="1104.4551">&#8212; it rolls the row back with a named reason at the next boot.</text><path d="M663,1122.1973 L663,1177.1973 L1626,1177.1973 L1626,1132.1973 L1616,1122.1973 L663,1122.1973" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M1616,1122.1973 L1616,1132.1973 L1626,1132.1973 L1616,1122.1973" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="594.1787" x="843.3638" y="1139.7656">NO TEST (gap): preflight-kill &#8212; a kill in the claim -&gt; writeUpgradeFlag window must converge</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="502.8105" x="851.5903" y="1155.0762">the row to a named terminal state via the belt at next boot. Candidate scenario:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.9546" x="851.5903" y="1170.3867">killed-by-system-during-preflight-before-flag.</text><path d="M654.9214,1190.1289 L1132.6284,1190.1289 L1132.6284,1197.4395 L1122.6284,1207.4395 L654.9214,1207.4395 L654.9214,1190.1289" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="202.8633" style="stroke:#90A4AE;stroke-width:1.5;" width="988.9063" x="654.9214" y="1190.1289"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="432.707" x="669.9214" y="1203.6973">mutex held &#8212; Holder="service", flock LOCK_EX on the marker fd</text><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg13"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="1228.75" y2="1228.75"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="1228.75" y2="1241.75"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="1241.75" y2="1241.75"/><polygon fill="#1565C0" points="767.3862,1237.75,757.3862,1241.75,767.3862,1245.75,763.3862,1241.75" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="437.7788" x="763.3862" y="1224.0078">writeUpgradeFlag &#8212; acquireFlock opens the marker (Phase=PreSwap)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg14"><polygon fill="#1565C0" points="1522.6655,1267.0605,1532.6655,1271.0605,1522.6655,1275.0605,1526.6655,1271.0605" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="1271.0605" y2="1271.0605"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.2896" x="763.3862" y="1266.3184">maintenance mode on</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg15"><polygon fill="#1565C0" points="1522.6655,1296.3711,1532.6655,1300.3711,1522.6655,1304.3711,1526.6655,1300.3711" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="1300.3711" y2="1300.3711"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216.6646" x="763.3862" y="1295.6289">take DB snapshot -&gt; backup_path</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg16"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="1329.6816" y2="1329.6816"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="1329.6816" y2="1342.6816"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="1342.6816" y2="1342.6816"/><polygon fill="#1565C0" points="767.3862,1338.6816,757.3862,1342.6816,767.3862,1346.6816,763.3862,1342.6816" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171.3169" x="763.3862" y="1324.9395">git checkout target commit</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg17"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="1371.9922" y2="1371.9922"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="1371.9922" y2="1384.9922"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="1384.9922" y2="1384.9922"/><polygon fill="#1565C0" points="767.3862,1380.9922,757.3862,1384.9922,767.3862,1388.9922,763.3862,1384.9922" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.9224" x="763.3862" y="1367.25">replaceBinaryOnDisk -&gt; stamp Phase=PostSwap</text></g><path d="M663,1404.9922 L663,1444.9922 L1626,1444.9922 L1626,1414.9922 L1616,1404.9922 L663,1404.9922" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1616,1404.9922 L1616,1414.9922 L1626,1414.9922 L1616,1404.9922" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="447.6367" x="916.1333" y="1422.5605">Fail-fast: any step (pre- or post-swap) that errors OR hangs aborts the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="448.6396" x="916.1333" y="1437.8711">single attempt and routes to rollback (&#167; Complete / rollback). No retry.</text><path d="M663,1455.6133 L663,1572.6133 L1626,1572.6133 L1626,1465.6133 L1616,1455.6133 L663,1455.6133" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M1616,1455.6133 L1616,1465.6133 L1626,1465.6133 L1616,1455.6133" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.582" x="849.2227" y="1473.1816">TEST COVERAGE &#8212; pre-swap (mutex held)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="582.4609" x="849.2227" y="1488.4922">TEST preswap-backup-kill (21): a kill during the DB snapshot converges the row to a named</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="549.5483" x="857.4492" y="1503.8027">terminal &#8212; rolled_back, or failed if the restore also fails &#8212; never stranded in_progress.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="543.4038" x="849.2227" y="1519.1133">TEST preswap-checkout-kill (22): a kill during git checkout converges to terminal; the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.4072" x="857.4492" y="1534.4238">unswapped binary keeps serving the old version.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="565.3794" x="849.2227" y="1549.7344">TEST binary-swap-kill (16): a kill at the replaceBinaryOnDisk pivot is recovered (PostSwap</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="535.2026" x="857.4492" y="1565.0449">resume or rollback) &#8212; never a half-swapped row that lies about the running version.</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1663.8276" x="0" y="1598.4424"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="1598.4424" y2="1598.4424"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="1601.4424" y2="1601.4424"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="438.5503" x="612.6387" y="1587.7871"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="420.2656" x="618.6387" y="1604.3555">Binary-swap restart + resume (post-swap, on the NEW binary)</text><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg18"><polygon fill="#1565C0" points="207.1299,1638.4082,197.1299,1642.4082,207.1299,1646.4082,203.1299,1642.4082" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="201.1299" x2="755.3862" y1="1642.4082" y2="1642.4082"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.7212" x="213.1299" y="1637.666">exit 42 &#8212; self-update, request the ONE planned respawn</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg19"><polygon fill="#1565C0" points="744.3862,1667.7188,754.3862,1671.7188,744.3862,1675.7188,748.3862,1671.7188" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="196.1299" x2="750.3862" y1="1671.7188" y2="1671.7188"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.5859" x="203.1299" y="1666.9766">restart unit on the new binary</text></g><path d="M663,1684.7188 L663,1770.7188 L1626,1770.7188 L1626,1694.7188 L1616,1684.7188 L663,1684.7188" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1616,1684.7188 L1616,1694.7188 L1626,1694.7188 L1616,1684.7188" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="611.8252" x="830.0464" y="1702.2871">The new binary BOOTS FRESH &#8212; nothing continues in memory. recoverFromFlag (service.go:682)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="561.1328" x="830.0464" y="1717.5977">READS the flag's persisted Phase to learn where the prior process died. Phase progresses</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="620.8135" x="830.0464" y="1732.9082">PreSwap "" (:197) -&gt; PostSwap "post_swap" (stamped :403, before exit 42) -&gt; Resuming (stamped</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="612.7139" x="830.0464" y="1748.2188">:4339, as resume commits). The SAME dispatch runs on EVERY boot &#8212; the planned exit-42 here,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="203.0806" x="830.0464" y="1763.5293">or any unplanned-death restart.</text><path d="M644.9214,1783.2715 L707.0601,1783.2715 L707.0601,1790.582 L697.0601,1800.582 L644.9214,1800.582 L644.9214,1783.2715" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="352.0156" style="stroke:#90A4AE;stroke-width:1.5;" width="1008.9063" x="644.9214" y="1783.2715"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="17.1387" x="659.9214" y="1796.8398">alt</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="494.2749" x="722.0601" y="1795.9063">[flag.Phase = PostSwap &#8212; the PLANNED exit-42 handoff (the ONE legitimate continue)]</text><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg20"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="1821.8926" y2="1821.8926"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="1821.8926" y2="1834.8926"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="1834.8926" y2="1834.8926"/><polygon fill="#1565C0" points="767.3862,1830.8926,757.3862,1834.8926,767.3862,1838.8926,763.3862,1834.8926" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="374.626" x="763.3862" y="1817.1504">resumePostSwap (:774) -&gt; stamp Phase=Resuming (:4339)</text></g><path d="M654.9214,1849.8926 L1082.8818,1849.8926 L1082.8818,1857.2031 L1072.8818,1867.2031 L654.9214,1867.2031 L654.9214,1849.8926" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="189.8633" style="stroke:#90A4AE;stroke-width:1.5;" width="988.9063" x="654.9214" y="1849.8926"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="382.9604" x="669.9214" y="1863.4609">applyPostSwap &#8212; remaining steps run on the new binary</text><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg21"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="1888.5137" y2="1888.5137"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="1888.5137" y2="1901.5137"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="1901.5137" y2="1901.5137"/><polygon fill="#1565C0" points="767.3862,1897.5137,757.3862,1901.5137,767.3862,1905.5137,763.3862,1901.5137" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.0884" x="763.3862" y="1883.7715">config generate + docker compose pull</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg22"><polygon fill="#1565C0" points="1522.6655,1926.8242,1532.6655,1930.8242,1522.6655,1934.8242,1526.6655,1930.8242" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="1930.8242" y2="1930.8242"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.5117" x="763.3862" y="1926.082">start DB + wait health + reconnect</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg23"><polygon fill="#1565C0" points="1522.6655,1956.1348,1532.6655,1960.1348,1522.6655,1964.1348,1526.6655,1960.1348" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="1960.1348" y2="1960.1348"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="98.8203" x="763.3862" y="1955.3926">./sb migrate up</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg24"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="1989.4453" y2="1989.4453"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="1989.4453" y2="2002.4453"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="2002.4453" y2="2002.4453"/><polygon fill="#1565C0" points="767.3862,1998.4453,757.3862,2002.4453,767.3862,2006.4453,763.3862,2002.4453" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.9014" x="763.3862" y="1984.7031">start app services + health check</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg25"><polygon fill="#1565C0" points="1522.6655,2027.7559,1532.6655,2031.7559,1522.6655,2035.7559,1526.6655,2031.7559" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2031.7559" y2="2031.7559"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.6172" x="763.3862" y="2027.0137">maintenance off + archive backup</text></g><line style="stroke:#90A4AE;stroke-width:1;stroke-dasharray:2,2;" x1="644.9214" x2="1653.8276" y1="2047.7559" y2="2047.7559"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="313.5752" x="649.9214" y="2058.3906">[flag.Phase = PreSwap &#8212; died BEFORE the binary swap]</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg26"><polygon fill="#1565C0" points="1522.6655,2079.0215,1532.6655,2083.0215,1522.6655,2087.0215,1526.6655,2083.0215" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2083.0215" y2="2083.0215"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="458.0659" x="763.3862" y="2078.2793">recoveryRollback (:822) -&gt; roll back to snapshot (&#167; Complete / rollback)</text></g><line style="stroke:#90A4AE;stroke-width:1;stroke-dasharray:2,2;" x1="644.9214" x2="1653.8276" y1="2092.0215" y2="2092.0215"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="424.918" x="649.9214" y="2102.6563">[flag.Phase = Resuming &#8212; died DURING the resume (the one-shot LATCH)]</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg27"><polygon fill="#1565C0" points="1522.6655,2123.2871,1532.6655,2127.2871,1522.6655,2131.2871,1526.6655,2127.2871" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2127.2871" y2="2127.2871"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="498.8687" x="763.3862" y="2122.5449">recoveryRollback (:755) -&gt; roll back, NEVER re-resume (&#167; Complete / rollback)</text></g><path d="M124,2147.2871 L124,2218.2871 L827,2218.2871 L827,2157.2871 L817,2147.2871 L124,2147.2871" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M817,2147.2871 L817,2157.2871 L827,2157.2871 L817,2147.2871" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="608.7783" x="166.8201" y="2164.8555">recoverFromFlag is a 3-WAY DISPATCH on the persisted flag.Phase &#8212; "detect where you died -&gt;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="557.4067" x="166.8201" y="2180.166">jump to the right action", not a linear continue. PostSwap is the one legitimate continue;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="580.9438" x="166.8201" y="2195.4766">PreSwap and Resuming both roll back. Resuming is the latch: any non-planned restart while</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="426.8926" x="166.8201" y="2210.7871">in_progress =&gt; died =&gt; rollback, never an infinite re-resume loop.</text><path d="M663,2228.5293 L663,2437.5293 L1626,2437.5293 L1626,2238.5293 L1616,2228.5293 L663,2228.5293" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M1616,2228.5293 L1616,2238.5293 L1626,2238.5293 L1616,2228.5293" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="355.5195" x="791.7097" y="2246.0977">TEST COVERAGE &#8212; phase dispatch + post-swap resume</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="606.855" x="791.7097" y="2261.4082">TEST resume-died-rolled-back-no-retry (29): a death during Phase=Resuming rolls back to the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="595.2769" x="799.9363" y="2276.7188">snapshot (UPGRADE_DIED_DURING_RESUME) and NEVER re-resumes &#8212; the one-shot latch (the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="159.5864" x="799.9363" y="2292.0293">Resuming branch above).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="697.4868" x="791.7097" y="2307.3398">TEST mid-migration-kill (17) / between-migrations (23) / migrate-killed-after-commit-before-recorded (08):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="587.5771" x="799.9363" y="2322.6504">a kill anywhere in migrate converges to a coherent terminal; the canonical commit&lt;-&gt;record</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="557.4893" x="799.9363" y="2337.9609">window RESTORES, never re-applies ("relation already exists" is the deterministic break).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="611.5713" x="791.7097" y="2353.2715">TEST migration-exceeds-unit-timeout (12) / migration-vs-worker-lock-bounded (13): a slow or</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="627.6626" x="799.9363" y="2368.582">worker-locked migration stays BOUNDED (heartbeat / pre-DDL quiesce) &#8212; never an infinite wedge.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="577.3447" x="791.7097" y="2383.8926">TEST killed-during-container-restart (15) / watchdog-fires-during-reconnect (19): a kill or</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="560.4282" x="799.9363" y="2399.2031">stall in the restart + reconnect tail is recovered; the watchdog fires on a hung reconnect.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="614.5801" x="791.7097" y="2414.5137">TEST archivebackup-watchdog (26) / archivebackup-resume-active-phase (27): the active-phase</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="602.2212" x="799.9363" y="2429.8242">archive-backup tar is watchdog-covered &#8212; a long-but-advancing backup is not falsely reaped.</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1663.8276" x="0" y="2463.2217"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="2463.2217" y2="2463.2217"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1663.8276" y1="2466.2217" y2="2466.2217"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="151.7886" x="756.0195" y="2452.5664"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="133.5039" x="762.0195" y="2469.1348">Complete / rollback</text><path d="M15,2492.877 L77.1387,2492.877 L77.1387,2500.1875 L67.1387,2510.1875 L15,2510.1875 L15,2492.877" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="499.8789" style="stroke:#90A4AE;stroke-width:1.5;" width="1638.8276" x="15" y="2492.877"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="17.1387" x="30" y="2506.4453">alt</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="118.7227" x="92.1387" y="2505.5117">[all steps succeeded]</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg28"><polygon fill="#1565C0" points="1522.6655,2527.498,1532.6655,2531.498,1522.6655,2535.498,1526.6655,2531.498" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2531.498" y2="2531.498"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="241.0649" x="763.3862" y="2526.7559">mark completed_at (state=completed)</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg29"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="2560.8086" y2="2560.8086"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="2560.8086" y2="2573.8086"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="2573.8086" y2="2573.8086"/><polygon fill="#1565C0" points="767.3862,2569.8086,757.3862,2573.8086,767.3862,2577.8086,763.3862,2573.8086" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.644" x="763.3862" y="2556.0664">removeUpgradeFlag (mutex released)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg30"><polygon fill="#1565C0" points="1522.6655,2599.1191,1532.6655,2603.1191,1522.6655,2607.1191,1526.6655,2603.1191" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2603.1191" y2="2603.1191"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.0669" x="763.3862" y="2598.377">supersede older rows + notify UI</text></g><g class="message" data-entity-1="part3" data-entity-2="part1" id="msg31"><polygon fill="#1565C0" points="88.2163,2628.4297,78.2163,2632.4297,88.2163,2636.4297,84.2163,2632.4297" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="82.2163" x2="755.3862" y1="2632.4297" y2="2632.4297"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="127.0928" x="94.2163" y="2627.6875">Slack callback &#8212; OK</text></g><line style="stroke:#90A4AE;stroke-width:1;stroke-dasharray:2,2;" x1="15" x2="1653.8276" y1="2641.4297" y2="2641.4297"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="275.1772" x="20" y="2652.0645">[any step failed or hung (one attempt, NO retry)]</text><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg32"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="2676.6953" y2="2676.6953"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="2676.6953" y2="2689.6953"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="2689.6953" y2="2689.6953"/><polygon fill="#1565C0" points="767.3862,2685.6953,757.3862,2689.6953,767.3862,2693.6953,763.3862,2689.6953" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.7573" x="763.3862" y="2671.9531">rollback() &#8212; restore git + restore DB snapshot</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg33"><polygon fill="#1565C0" points="1522.6655,2715.0059,1532.6655,2719.0059,1522.6655,2723.0059,1526.6655,2719.0059" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2719.0059" y2="2719.0059"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.5781" x="763.3862" y="2714.2637">restart services (docker compose up)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg34"><polygon fill="#1565C0" points="1522.6655,2759.627,1532.6655,2763.627,1522.6655,2767.627,1526.6655,2763.627" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2763.627" y2="2763.627"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.2686" x="763.3862" y="2743.5742">wait for DB health (30s)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="754.2793" x="763.3862" y="2758.8848">SYMMETRIC with applyPostSwap (service.go:3780) &#8212; must NOT reconnect before the DB is ready (the scenario-21 race)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg35"><polygon fill="#1565C0" points="1522.6655,2788.9375,1532.6655,2792.9375,1522.6655,2796.9375,1526.6655,2792.9375" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2792.9375" y2="2792.9375"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="475.4966" x="763.3862" y="2788.1953">reconnect (re-acquire authority lock) + write terminal state (bounded retry)</text></g><path d="M654.9214,2807.9375 L717.0601,2807.9375 L717.0601,2815.248 L707.0601,2825.248 L654.9214,2825.248 L654.9214,2807.9375" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="90.8867" style="stroke:#90A4AE;stroke-width:1.5;" width="988.9063" x="654.9214" y="2807.9375"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="17.1387" x="669.9214" y="2821.5059">alt</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="279.2217" x="732.0601" y="2820.5723">[snapshot restored cleanly AND services healthy]</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg36"><polygon fill="#1565C0" points="1522.6655,2842.5586,1532.6655,2846.5586,1522.6655,2850.5586,1526.6655,2846.5586" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2846.5586" y2="2846.5586"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.9038" x="763.3862" y="2841.8164">state=rolled_back (+ error) &#8212; healthy at old version</text></g><line style="stroke:#90A4AE;stroke-width:1;stroke-dasharray:2,2;" x1="654.9214" x2="1643.8276" y1="2855.5586" y2="2855.5586"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="111.2031" x="659.9214" y="2866.1934">[restore also failed]</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg37"><polygon fill="#1565C0" points="1522.6655,2886.8242,1532.6655,2890.8242,1522.6655,2894.8242,1526.6655,2890.8242" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1528.6655" y1="2890.8242" y2="2890.8242"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.6099" x="763.3862" y="2886.082">state=failed (+ error) &#8212; needs hands-on</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg38"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="2942.4453" y2="2942.4453"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="2942.4453" y2="2955.4453"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="2955.4453" y2="2955.4453"/><polygon fill="#1565C0" points="767.3862,2951.4453,757.3862,2955.4453,767.3862,2959.4453,763.3862,2955.4453" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.3438" x="763.3862" y="2922.3926">removeUpgradeFlag &#8212; ONLY on a landed write</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="483.5708" x="763.3862" y="2937.7031">(else KEEP: dead-PID breadcrumb -&gt; StateCrashedUpgrade / belt reconciles)</text></g><g class="message" data-entity-1="part3" data-entity-2="part1" id="msg39"><polygon fill="#1565C0" points="88.2163,2980.7559,78.2163,2984.7559,88.2163,2988.7559,84.2163,2984.7559" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="82.2163" x2="755.3862" y1="2984.7559" y2="2984.7559"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.5215" x="94.2163" y="2980.0137">Slack callback &#8212; FAILED siren (fires regardless of the write)</text></g><path d="M663,3004.7559 L663,3228.7559 L1626,3228.7559 L1626,3014.7559 L1616,3004.7559 L663,3004.7559" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><path d="M1616,3004.7559 L1616,3014.7559 L1626,3014.7559 L1616,3004.7559" fill="#FFF9C4" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.6475" x="827.136" y="3022.3242">TEST COVERAGE &#8212; complete / rollback</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="552.4302" x="827.136" y="3037.6348">TEST killed-during-rollback (24): a kill mid-rollback() still converges to a terminal state</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.8418" x="835.3625" y="3052.9453">on the next recovery pass.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="414.8574" x="827.136" y="3068.2559">GAP -&gt; FIX (scenario 21 RED; guard = preswap-backup-kill (21)):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="605.0776" x="827.136" y="3083.5664">ROOT: rollback() restarted the DB then reconnected with NO DB-health-wait &#8212; asymmetric with</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="566.3379" x="835.3625" y="3098.877">applyPostSwap's waitForDBHealth(30s) (service.go:3780) &#8212; so the reconnect raced the DB</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="584.2002" x="835.3625" y="3114.1875">restart and transiently failed. The terminal UPDATE was then single-shot, silently swallowed,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="599.2822" x="835.3625" y="3129.498">and the flag removed unconditionally -&gt; row stranded in_progress. The retry alone would only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.7729" x="835.3625" y="3144.8086">have papered over the missing wait.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="597.9873" x="827.136" y="3160.1191">FIX (1) add waitForDBHealth(30s) after restart, before reconnect &#8212; the root fix, symmetric with</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="591.3032" x="835.3625" y="3175.4297">the normal path (drawn above). (2) the terminal write retries the FULL reconnect (re-acquiring</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="618.4077" x="835.3625" y="3190.7402">the upgrade_daemon AUTHORITY lock, service.go:2660 / 1922) + markTerminal on exhaustion +</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="601.5674" x="835.3625" y="3206.0508">removeUpgradeFlag ONLY on a landed write (KEEP on failure). On lock-contention, YIELD to the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="342.9258" x="835.3625" y="3221.3613">authority &#8212; the belt reconciles; never bypass the lock.</text><?plantuml-src fLhjRjj8bltlfoYu5mW5cqfivzE9ZPKjAX7QaJoIt3q10hXBOadYc2BPBDAAiBl0_fe76Cmxp7lCeyoJxBctgYXAbhozs7GZYCZwk7K_pZtt5b-8LbdCqpmgP14zAg7LxwLA9ag4aPpbSY6cQIx2TFAopF0pL7uHBLGS9Qgv29i7ByHehiHl5nU_YR5CGYrahaI1HnEiDuwLIEH2XIARIwsq-DT__rqyA9NHY8M84g5NoKGies9EJx3ORp_zz1iac1HHceYvmdQvfd4xzXOw5PCqn4xfOg6IGek9J6XRMkTGAxLpqZ__8JwHe9U7a9sa3uOZlzSV1UAwt_ibw8sw_PxmYdcag_E7QOc3u6JuNpn6kfInA9Gk_4dwg78vKs8XiyOv5bFulH9J6SLbhlme-OizI9P6IG7nyZoYTKGcO-MlL1odIv6aB33z8Ld49prHYSoZrDTnERiKtgTUxx9nBZx134kPXz368rvBB4XgTgF5ejI5o7A8T8dbfZch7IBJeCzthK6hDme2_9A56JfFu_1OuEGymihS52qhBDiaIR5KjGDKif3v0vR5D2EiDwEJYqzbmZidQ-4kXR6FrH1sKngBaNT0XH4KsXH37D0w3DJvCafq8UFOpnLFMxrqE-kNx4MwIRw6HRO7LfOgoSTOAnYEpHE8H0Pe7kY7ACaaZHdBoSCiJyial4vZUFPFdO3-guse0k0_3iWghJnFbtRioPktRwvVyUERQAfku5HNQGudjUy_l6gzRWNy_bRcHJI9CkXYOqXjYVgGRQc2iyvffyt3FkDvzdJ0TT3fdDG6x93ZlmuEYgX040uHsrUb5dSc8iJ8HeJmT9JCOWhw_36Qg6Ds17yguI1fedmzJujZaQTnJ6eJHIfq8ZDwsZWuoDRYYyD-1aCNsFkbkEuUakDDy6vpZ5xfGY46FTWfR_0W-sXpd9DoQ8JwJkOkngNsRK3_-x_T3OE1cM-6RCw_JNKnozNmJpVVamon6qsQTgOugWx0qyFnmS75XUZaIi-TM