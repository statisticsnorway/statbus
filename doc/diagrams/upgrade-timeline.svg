temd (user)</text></g><g class="participant participant-tail" data-entity-uid="part2" data-qualified-name="systemd" id="part2-tail"><rect fill="#E3F2FD" height="30.4883" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="113.3945" x="139.4326" y="2090.8711"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="99.3945" x="146.4326" y="2111.4063">systemd (user)</text></g><g class="participant participant-head" data-entity-uid="part3" data-qualified-name="service" id="part3-head"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="182.9297" x="664.9214" y="42.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="109.0742" x="701.8491" y="63.0234">Upgrade Service</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.9297" x="671.9214" y="79.5117">statbus-upgrade@$USER</text></g><g class="participant participant-tail" data-entity-uid="part3" data-qualified-name="service" id="part3-tail"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="182.9297" x="664.9214" y="2090.8711"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="109.0742" x="701.8491" y="2111.4063">Upgrade Service</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.9297" x="671.9214" y="2127.8945">statbus-upgrade@$USER</text></g><g class="participant participant-head" data-entity-uid="part4" data-qualified-name="db" id="part4-head"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="198.3242" x="1143.8667" y="42.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.8496" x="1204.604" y="63.0234">PostgreSQL</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="184.3242" x="1150.8667" y="79.5117">public.upgrade + snapshot</text></g><g class="participant participant-tail" data-entity-uid="part4" data-qualified-name="db" id="part4-tail"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="198.3242" x="1143.8667" y="2090.8711"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.8496" x="1204.604" y="2111.4063">PostgreSQL</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="184.3242" x="1150.8667" y="2127.8945">public.upgrade + snapshot</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1372.1909" x="0" y="121.1201"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1372.1909" y1="121.1201" y2="121.1201"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1372.1909" y1="124.1201" y2="124.1201"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="421.583" x="475.304" y="110.4648"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="403.2983" x="481.304" y="127.0332">Fresh install &#8212; seed restore (first boot, before any upgrade)</text><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg1"><polygon fill="#1565C0" points="1231.0288,176.3965,1241.0288,180.3965,1231.0288,184.3965,1235.0288,180.3965" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="77.2163" x2="1237.0288" y1="180.3965" y2="180.3965"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.8418" x="84.2163" y="160.3438">./sb install (StateFresh) &#8212; Seed step:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="571.4541" x="84.2163" y="175.6543">./sb db seed fetch (pull statbus-seed:&lt;commit_short&gt;) + pg_restore --single-transaction</text></g><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg2"><polygon fill="#1565C0" points="1231.0288,205.707,1241.0288,209.707,1231.0288,213.707,1235.0288,209.707" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="77.2163" x2="1237.0288" y1="209.707" y2="209.707"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="413.042" x="84.2163" y="204.9648">./sb migrate up &#8212; apply only the migrations newer than the seed</text></g><path d="M5,222.707 L5,277.707 L1317,277.707 L1317,232.707 L1307,222.707 L5,222.707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1307,222.707 L1307,232.707 L1317,232.707 L1307,222.707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="493.3081" x="395.7734" y="240.2754">Fresh DB only: checkSeedRestored gates the Seed step OFF when the DB holds</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.644" x="395.7734" y="255.5859">user data or applied migrations &#8212; a seed restore never overwrites a populated DB.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="494.6602" x="395.7734" y="270.8965">Seed CREATION is a CI/dev activity &#8212; see DEVELOPMENT.md &#167; Database seed.</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1372.1909" x="0" y="304.2939"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1372.1909" y1="304.2939" y2="304.2939"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1372.1909" y1="307.2939" y2="307.2939"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="100.4868" x="635.8521" y="293.6387"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="82.2021" x="641.8521" y="310.207">Service boot</text><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg3"><polygon fill="#1565C0" points="744.3862,344.2598,754.3862,348.2598,744.3862,352.2598,748.3862,348.2598" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="196.1299" x2="750.3862" y1="348.2598" y2="348.2598"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="431.5264" x="203.1299" y="343.5176">start statbus-upgrade@$USER.service (Type=notify, Restart=always)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg4"><polygon fill="#1565C0" points="1231.0288,388.8809,1241.0288,392.8809,1231.0288,396.8809,1235.0288,392.8809" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1237.0288" y1="392.8809" y2="392.8809"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="253.3413" x="763.3862" y="372.8281">advisory lock + LISTEN upgrade channel</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.4814" x="763.3862" y="388.1387">(cheap, bounded init)</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg5"><polygon fill="#1565C0" points="207.1299,433.502,197.1299,437.502,207.1299,441.502,203.1299,437.502" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="201.1299" x2="755.3862" y1="437.502" y2="437.502"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.2939" x="213.1299" y="417.4492">sd_notify READY=1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="536.2563" x="213.1299" y="432.7598">(emitted here &#8212; heavy recovery below runs in the ACTIVE phase under WatchdogSec)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg6"><polygon fill="#1565C0" points="1231.0288,462.8125,1241.0288,466.8125,1231.0288,470.8125,1235.0288,466.8125" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1237.0288" y1="466.8125" y2="466.8125"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="405.6152" x="763.3862" y="462.0703">boot migrate up &#8212; bring schema to HEAD (schema-skew guard)</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg7"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="496.123" y2="496.123"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="496.123" y2="509.123"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="509.123" y2="509.123"/><polygon fill="#1565C0" points="767.3862,505.123,757.3862,509.123,767.3862,513.123,763.3862,509.123" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="388.0322" x="763.3862" y="491.3809">recoverFromFlag &#8212; reconcile a flag left on disk (flag-DRIVEN)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg8"><polygon fill="#1565C0" points="1231.0288,549.7441,1241.0288,553.7441,1231.0288,557.7441,1235.0288,553.7441" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1237.0288" y1="553.7441" y2="553.7441"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="462.6426" x="763.3862" y="533.6914">completeInProgressUpgrade &#8212; reconcile an in_progress row with NO flag</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="399.7119" x="763.3862" y="549.002">(flag-INDEPENDENT belt; the SOLE recovery for a pre-flight kill)</text></g><path d="M663,566.7441 L663,637.7441 L1335,637.7441 L1335,576.7441 L1325,566.7441 L663,566.7441" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1325,566.7441 L1325,576.7441 L1335,576.7441 L1325,566.7441" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="536.834" x="699.8687" y="584.3125">Two-layer boot recovery. recoverFromFlag handles a kill AFTER the flag exists (Phase</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="580.0234" x="699.8687" y="599.623">ladder: PreSwap / PostSwap / Resuming). completeInProgressUpgrade handles a kill BEFORE</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="589.5322" x="699.8687" y="614.9336">the flag exists &#8212; the claim -&gt; writeUpgradeFlag window (see &#167; Execute upgrade (pre-swap)).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="507.876" x="699.8687" y="630.2441">It rolls such an orphan to a named terminal state via verifyUpgradeGroundTruth.</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1372.1909" x="0" y="663.6416"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1372.1909" y1="663.6416" y2="663.6416"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1372.1909" y1="666.6416" y2="666.6416"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="153.8643" x="609.1633" y="652.9863"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="135.5796" x="615.1633" y="669.5547">Schedule + dispatch</text><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg9"><polygon fill="#1565C0" points="1231.0288,718.918,1241.0288,722.918,1231.0288,726.918,1235.0288,722.918" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="77.2163" x2="1237.0288" y1="722.918" y2="722.918"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.5054" x="84.2163" y="702.8652">./sb upgrade apply-latest &#8594;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.6675" x="84.2163" y="718.1758">UPDATE state='scheduled' + NOTIFY</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg10"><polygon fill="#1565C0" points="767.3862,748.2285,757.3862,752.2285,767.3862,756.2285,763.3862,752.2285" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="761.3862" x2="1242.0288" y1="752.2285" y2="752.2285"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.7915" x="773.3862" y="747.4863">NOTIFY wakes the listener</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg11"><polygon fill="#1565C0" points="1231.0288,792.8496,1241.0288,796.8496,1231.0288,800.8496,1235.0288,796.8496" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1237.0288" y1="796.8496" y2="796.8496"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.189" x="763.3862" y="776.7969">claim row WHERE state='scheduled' &#8594; in_progress</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6587" x="763.3862" y="792.1074">(started_at set, error=NULL &#8212; NO flag on disk yet)</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1372.1909" x="0" y="825.5049"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1372.1909" y1="825.5049" y2="825.5049"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1372.1909" y1="828.5049" y2="828.5049"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="208.7144" x="581.7383" y="814.8496"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="190.4297" x="587.7383" y="831.418">Execute upgrade (pre-swap)</text><path d="M654.9214,855.1602 L1142.1118,855.1602 L1142.1118,862.4707 L1132.1118,872.4707 L654.9214,872.4707 L654.9214,855.1602" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="46.6211" style="stroke:#90A4AE;stroke-width:1.5;" width="697.2695" x="654.9214" y="855.1602"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="442.1904" x="669.9214" y="868.7285">pre-flight &#8212; NO flag on disk yet (row is in_progress, error=NULL)</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg12"><polygon fill="#1565C0" points="1231.0288,889.7813,1241.0288,893.7813,1231.0288,897.7813,1235.0288,893.7813" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="1237.0288" y1="893.7813" y2="893.7813"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="439.0039" x="763.3862" y="889.0391">pre-flight checks &#8212; downgrade guard, release assets, disk, signature</text></g><path d="M663,913.7813 L663,984.7813 L1335,984.7813 L1335,923.7813 L1325,913.7813 L663,913.7813" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1325,913.7813 L1325,923.7813 L1335,923.7813 L1325,913.7813" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="564.7637" x="710.5549" y="931.3496">Flag-absent window &#8212; spans the claim above through pre-flight, until writeUpgradeFlag.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="558.7144" x="710.5549" y="946.6602">A kill HERE leaves the row in_progress | error=NULL with NO flag: recoverFromFlag finds</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="568.1597" x="710.5549" y="961.9707">nothing to reconcile, so completeInProgressUpgrade (&#167; Service boot) is the ONLY recovery</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="388.2544" x="710.5549" y="977.2813">&#8212; it rolls the row back with a named reason at the next boot.</text><path d="M654.9214,997.0234 L1132.6284,997.0234 L1132.6284,1004.334 L1122.6284,1014.334 L654.9214,1014.334 L654.9214,997.0234" fill="#ECEFF1" style="stroke:#90A4AE;stroke-width:1.5;"/><rect fill="none" height="202.8633" style="stroke:#90A4AE;stroke-width:1.5;" width="697.2695" x="654.9214" y="997.0234"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="432.707" x="669.9214" y="1010.5918">mutex held &#8212; Holder="service", flock LOCK_EX on the marker fd</text><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg13"><line style="stroke:#1565C0;stroke-width:1;" x1="756.3862" x2="798.3862" y1="1035.6445" y2="1035.6445"/><line style="stroke:#1565C0;stroke-width:1;" x1="798.3862" x2="798.3862" y1="1035.6445" y2="1048.6445"/><line style="stroke:#1565C0;stroke-width:1;" x1="757.3862" x2="798.3862" y1="1048.6445" y2="1048.6445"/><polygon fill="#1565C0" points="767.3862,1044.6445,757.3862,1048.6445,767.3862,1052.6445,763.3862,1048.6445" style="stroke:#1565C0;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="437.7788" x="763.3862" y="1030.9023">writeUpgradeFlag &#8212; acquireFlock opens the marker (Phase=PreSwap)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg14"><polygon fill="#1565C0" points="1231.0288,1073.9551,1241.0288,1077.9551,1231.0288,1081.9551,1235.0288,1077.9551" s