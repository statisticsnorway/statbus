<g class="participant participant-tail" data-entity-uid="part4" data-qualified-name="db" id="part4-tail"><rect fill="#E3F2FD" height="46.9766" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="198.3242" x="921.2964" y="1777.2129"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.8496" x="982.0337" y="1797.748">PostgreSQL</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="184.3242" x="928.2964" y="1814.2363">public.upgrade + snapshot</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1149.6206" x="0" y="121.1201"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1149.6206" y1="121.1201" y2="121.1201"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1149.6206" y1="124.1201" y2="124.1201"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="421.583" x="364.0188" y="110.4648"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="403.2983" x="370.0188" y="127.0332">Fresh install &#8212; seed restore (first boot, before any upgrade)</text><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg1"><polygon fill="#1565C0" points="1008.4585,176.3965,1018.4585,180.3965,1008.4585,184.3965,1012.4585,180.3965" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="77.2163" x2="1014.4585" y1="180.3965" y2="180.3965"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.8418" x="84.2163" y="160.3438">./sb install (StateFresh) &#8212; Seed step:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="571.4541" x="84.2163" y="175.6543">./sb db seed fetch (pull statbus-seed:&lt;commit_short&gt;) + pg_restore --single-transaction</text></g><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg2"><polygon fill="#1565C0" points="1008.4585,205.707,1018.4585,209.707,1008.4585,213.707,1012.4585,209.707" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="77.2163" x2="1014.4585" y1="209.707" y2="209.707"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="413.042" x="84.2163" y="204.9648">./sb migrate up &#8212; apply only the migrations newer than the seed</text></g><path d="M5,222.707 L5,277.707 L1094,277.707 L1094,232.707 L1084,222.707 L5,222.707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1084,222.707 L1084,232.707 L1094,232.707 L1084,222.707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="493.3081" x="284.4883" y="240.2754">Fresh DB only: checkSeedRestored gates the Seed step OFF when the DB holds</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.644" x="284.4883" y="255.5859">user data or applied migrations &#8212; a seed restore never overwrites a populated DB.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="494.6602" x="284.4883" y="270.8965">Seed CREATION is a CI/dev activity &#8212; see DEVELOPMENT.md &#167; Database seed.</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1149.6206" x="0" y="304.2939"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1149.6206" y1="304.2939" y2="304.2939"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1149.6206" y1="307.2939" y2="307.2939"/><rect fill="#EEEEEE" height="23.3105" style="stroke:#000000;stroke-width:2;" width="100.4868" x="524.5669" y="293.6387"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="82.2021" x="530.5669" y="310.207">Service boot</text><g cla